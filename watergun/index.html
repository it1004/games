<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFO 물풍선 격추 게임 - SF 비주얼 업그레이드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 모바일 터치 오버플로우 방지 및 스크롤 금지 */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            background-color: #03001e;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }
        /* 캔버스가 브라우저 테두리에 빈틈없이 완벽하게 밀착하도록 절대 좌표 배치 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }
    </style>
</head>
<body class="relative">

    <!-- 게임 로비 / 시작 화면 -->
    <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/85 z-20 transition-opacity duration-300 px-4 text-center">
        <div class="bg-slate-950/90 border-2 border-cyan-500 rounded-2xl p-8 max-w-md w-full shadow-[0_0_50px_rgba(6,182,212,0.5)] backdrop-blur-md">
            <div class="text-6xl mb-4 animate-bounce">🛸🎈</div>
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-teal-300 to-blue-500 mb-2 tracking-wider">
                UFO 디펜스: 스페셜
            </h1>
            <p class="text-cyan-200/70 text-xs mb-6">
                아름답고 치명적인 우주 침략자들로부터 지구를 수호하세요!
            </p>
            
            <div class="bg-slate-900/80 rounded-lg p-4 mb-6 text-left text-xs space-y-2 text-slate-300 border border-slate-800">
                <p class="font-bold text-cyan-400 text-sm mb-1">🎮 조작 가이드</p>
                <p>• <b>PC/모바일 공통:</b> 발사대를 마우스/손가락으로 <b>아래 방향으로 길게 드래그</b>하여 각도와 세기를 정한 후 발사하세요.</p>
                <p>• 발사대 높이가 올라가 조작 반경이 대폭 넓어졌습니다.</p>
                <p>• 바람의 동풍/서풍 풍속을 보정해 격추 정밀도를 높이세요!</p>
            </div>

            <button id="btn-start" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-cyan-500/20 active:scale-95 transition-all text-lg tracking-wide border border-cyan-400/30">
                출격 대기 완료
            </button>
        </div>
    </div>

    <!-- 게임 화면 HUD 오버레이 -->
    <div id="hud" class="absolute inset-x-0 top-0 p-4 flex justify-between items-start pointer-events-none z-10">
        <!-- 왼쪽 정보 (점수, 라이프) -->
        <div class="flex flex-col gap-2">
            <div class="bg-slate-950/70 backdrop-blur-md text-white px-4 py-2 rounded-xl border border-cyan-500/30 flex items-center gap-2 shadow-[0_0_15px_rgba(6,182,212,0.15)]">
                <span class="text-xs text-cyan-400 font-bold">SCORE</span>
                <span id="hud-score" class="text-2xl font-black text-cyan-300 tracking-wider">0</span>
            </div>
            <div class="bg-slate-950/70 backdrop-blur-md text-white px-4 py-2 rounded-xl border border-cyan-500/30 flex items-center gap-1 shadow-[0_0_15px_rgba(6,182,212,0.15)]">
                <span class="text-xs text-slate-400 mr-1">LIFE</span>
                <div id="hud-hearts" class="flex gap-1 text-red-500 text-lg">
                    ❤️❤️❤️
                </div>
            </div>
        </div>

        <!-- 중앙 정보 (스테이지, 바람 정보) -->
        <div class="flex flex-col items-center gap-2">
            <div class="bg-slate-950/70 backdrop-blur-md text-white px-5 py-1.5 rounded-full border border-yellow-500/30 shadow-[0_0_15px_rgba(234,179,8,0.15)]">
                <span class="text-xs text-slate-400 font-bold mr-1">STAGE</span>
                <span id="hud-stage" class="text-sm font-black text-yellow-400">1</span>
            </div>
            <!-- 바람 안내판 -->
            <div class="bg-slate-950/70 backdrop-blur-md text-white px-3 py-1.5 rounded-lg border border-slate-800 flex items-center gap-1.5 text-xs">
                <span class="text-slate-400">WIND:</span>
                <span id="hud-wind" class="font-bold text-emerald-400">무풍 (0)</span>
                <span id="hud-wind-arrow" class="inline-block transition-transform duration-300">➖</span>
            </div>
        </div>

        <!-- 오른쪽 정보 (최고 기록 및 일시정지) -->
        <div class="flex flex-col items-end gap-2 pointer-events-auto">
            <div class="bg-slate-950/70 backdrop-blur-md text-white px-4 py-2 rounded-xl border border-yellow-500/30 text-right shadow-[0_0_15px_rgba(234,179,8,0.15)]">
                <span class="text-[10px] text-yellow-500 block font-bold leading-none tracking-wider">BEST</span>
                <span id="hud-best" class="text-lg font-black text-yellow-300">0</span>
            </div>
        </div>
    </div>

    <!-- 게임 오버 화면 오버레이 -->
    <div id="gameover-screen" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-20 p-4 text-center">
        <div class="bg-slate-950 border-2 border-red-500 rounded-2xl p-8 max-w-md w-full shadow-[0_0_50px_rgba(239,68,68,0.45)] backdrop-blur-md">
            <div class="text-5xl mb-4">💥👾</div>
            <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-amber-500 mb-1">지구 방위 실패</h2>
            <p class="text-slate-400 text-sm mb-6">UFO들이 포위망을 돌파했습니다!</p>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-900/80 rounded-xl p-3 border border-slate-800">
                    <span class="text-xs text-slate-400 block">최종 점수</span>
                    <span id="go-score" class="text-2xl font-black text-white">0</span>
                </div>
                <div class="bg-slate-900/80 rounded-xl p-3 border border-slate-800">
                    <span class="text-xs text-slate-400 block">도달 스테이지</span>
                    <span id="go-stage" class="text-2xl font-black text-yellow-400">1</span>
                </div>
            </div>

            <button id="btn-restart" class="w-full bg-gradient-to-r from-red-500 via-rose-600 to-amber-600 hover:from-red-400 hover:to-amber-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg active:scale-95 transition-all text-lg">
                인류의 구원 복수전
            </button>
        </div>
    </div>

    <!-- 메인 캔버스 -->
    <canvas id="gameCanvas"></canvas>

    <script>
        // --- 사운드 시스템 (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'launch') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'hit') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
                
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(1500, now);
                osc2.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                gain2.gain.setValueAtTime(0.15, now);
                gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc2.start(now);
                osc2.stop(now + 0.1);
            } else if (type === 'miss') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.linearRampToValueAtTime(60, now + 0.4);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'levelup') {
                const notes = [261.6, 329.6, 392.0, 523.3];
                notes.forEach((freq, idx) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.type = 'sine';
                    o.frequency.setValueAtTime(freq, now + idx * 0.08);
                    g.gain.setValueAtTime(0.2, now + idx * 0.08);
                    g.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.15);
                    o.start(now + idx * 0.08);
                    o.stop(now + idx * 0.08 + 0.15);
                });
            }
        }

        // --- 게임 전역 및 상태 관리 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const state = {
            score: 0,
            bestScore: parseInt(localStorage.getItem('ufo_best_score')) || 0,
            lives: 3,
            stage: 1,
            isGameOver: false,
            isPlaying: false,
            wind: 0, 
            screenShake: 0,
            stars: [],
            meteors: [],
            planet: { x: 0, y: 0, radius: 0 } // 저 너머 신비로운 행성
        };

        // 해상도 조절 및 기기 픽셀 비 대응
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            
            initStars();
            
            // 저 너머 먼 배경 고리행성 위치 계산
            state.planet.x = window.innerWidth * 0.8;
            state.planet.y = window.innerHeight * 0.18;
            state.planet.radius = Math.min(window.innerWidth * 0.06, 50);

            if (launcher) {
                launcher.init();
            }
        }
        window.addEventListener('resize', resizeCanvas);

        // 화려한 빛의 별무리 초기화
        function initStars() {
            state.stars = [];
            const count = Math.floor((window.innerWidth * window.innerHeight) / 5000); // 밀도 상향 조정
            for (let i = 0; i < count; i++) {
                // 빛나는 푸른빛, 노란빛, 하얀빛 별 랜덤 부여
                const colors = ['#ffffff', '#bae6fd', '#fef08a', '#e0f2fe', '#f472b6'];
                state.stars.push({
                    x: Math.random() * window.innerWidth,
                    // 온 화면을 촘촘히 덮도록 y 범위를 바닥 끝까지 확장 (0.75 -> 1.0)
                    y: Math.random() * window.innerHeight, 
                    radius: Math.random() * 1.8 + 0.4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    opacity: Math.random() * 0.85 + 0.15,
                    pulseSpeed: Math.random() * 0.03 + 0.01
                });
            }
        }

        // --- 물리 엔진 매개변수 통합 조정 ---
        const PHYSICS = {
            gravity: 0.22,           
            windFactor: 0.003,       
            speedMultiplier: 0.22    
        };

        // --- 게임 오브젝트들 ---

        // 1. 새총 발사대 (Sling)
        const launcher = {
            x: 0, 
            y: 0, 
            radius: 25,
            dragStart: null,
            dragCurrent: null,
            maxDrag: 180, 
            active: true,

            init() {
                this.x = window.innerWidth / 2;
                // 발사대 높이를 바닥에서 충분히 높여(180px) 모바일 드래그 조작 반경 완전 확보
                this.y = window.innerHeight - 180;
            },

            draw() {
                // 발사기 밑받침 기계식 트러스 타워 묘사 (우주선에 있는 레이저 전송기 느낌으로 설계)
                ctx.save();
                ctx.strokeStyle = '#1e293b';
                ctx.lineWidth = 10;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(this.x - 25, window.innerHeight);
                ctx.lineTo(this.x, this.y);
                ctx.lineTo(this.x + 25, window.innerHeight);
                ctx.stroke();

                // 미래형 홀로그램 기계 디테일
                ctx.strokeStyle = 'rgba(6, 182, 212, 0.4)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x - 15, window.innerHeight);
                ctx.lineTo(this.x, this.y + 10);
                ctx.lineTo(this.x + 15, window.innerHeight);
                ctx.stroke();

                // 조준선(드래그 상태일 때)
                if (this.dragStart && this.dragCurrent) {
                    const dx = this.dragCurrent.x - this.dragStart.x;
                    const dy = this.dragCurrent.y - this.dragStart.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);
                    
                    const drawDist = Math.min(dist, this.maxDrag);
                    const pushX = Math.cos(angle) * drawDist;
                    const pushY = Math.sin(angle) * drawDist;

                    const vx = -pushX * PHYSICS.speedMultiplier;
                    const vy = -pushY * PHYSICS.speedMultiplier;
                    
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(6, 182, 212, 0.8)'; // 홀로그램 발광 레이저 조준선
                    ctx.setLineDash([8, 4]);
                    ctx.lineWidth = 3.5;
                    
                    let tempX = this.x;
                    let tempY = this.y;
                    let tempVx = vx;
                    let tempVy = vy;
                    
                    ctx.moveTo(tempX, tempY);
                    for (let i = 0; i < 45; i++) {
                        tempVx += state.wind * PHYSICS.windFactor;
                        tempVy += PHYSICS.gravity;
                        tempX += tempVx;
                        tempY += tempVy;
                        if (tempY > window.innerHeight || tempX < 0 || tempX > window.innerWidth) break;
                        ctx.lineTo(tempX, tempY);
                    }
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();

                    // 당겨진 네온 광학 고무줄
                    ctx.save();
                    ctx.strokeStyle = '#0284c7';
                    ctx.lineWidth = 5;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#06b6d4';
                    ctx.beginPath();
                    ctx.moveTo(this.x - 22, this.y - 10);
                    ctx.lineTo(this.x + pushX, this.y + pushY);
                    ctx.lineTo(this.x + 22, this.y - 10);
                    ctx.stroke();
                    ctx.restore();

                    // 당겨져서 부풀어 오른 고탄력 물풍선
                    ctx.save();
                    ctx.beginPath();
                    ctx.fillStyle = '#3b82f6';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#3b82f6';
                    ctx.arc(this.x + pushX, this.y + pushY, 16, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.moveTo(this.x + pushX + Math.cos(angle)*16, this.y + pushY + Math.sin(angle)*16);
                    ctx.lineTo(this.x + pushX + Math.cos(angle)*24, this.y + pushY + Math.sin(angle)*24);
                    ctx.strokeStyle = '#1d4ed8';
                    ctx.lineWidth = 6;
                    ctx.stroke();
                    ctx.restore();
                } else {
                    // 대기 상태의 풍선
                    ctx.save();
                    ctx.beginPath();
                    ctx.fillStyle = '#3b82f6';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#3b82f6';
                    ctx.arc(this.x, this.y, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                // 멋진 아크 모양의 런처 링 프레임
                ctx.save();
                ctx.strokeStyle = '#475569';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 25, Math.PI, 0, true);
                ctx.stroke();

                // 중심 발광 코어
                ctx.beginPath();
                ctx.fillStyle = '#06b6d4';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#06b6d4';
                ctx.arc(this.x, this.y + 15, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        };

        // 2. 물풍선 (Balloon - 발사된 객체들)
        class Balloon {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = 15;
                this.active = true;
                this.rotation = Math.atan2(vy, vx);
                this.wobble = 0;
            }

            update() {
                this.vx += state.wind * PHYSICS.windFactor; 
                this.vy += PHYSICS.gravity;                 
                this.x += this.vx;
                this.y += this.vy;
                this.rotation = Math.atan2(this.vy, this.vx);
                this.wobble += 0.25; 

                // 비행 중 시원하게 뿜어져 나오는 물기포 꼬리(Trail) 연출
                if (Math.random() < 0.6) {
                    particles.push(new WaterTrailParticle(this.x, this.y));
                }

                if (this.y > window.innerHeight + 50 || this.x < -100 || this.x > window.innerWidth + 100) {
                    this.active = false;
                    decreaseLife(); 
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 역동적인 물출렁임 기믹
                const scaleX = 1.3 + Math.sin(this.wobble) * 0.1;
                const scaleY = 0.8 - Math.sin(this.wobble) * 0.08;
                ctx.scale(scaleX, scaleY);

                // 영롱한 물결 질감 래디얼 그라데이션
                const grad = ctx.createRadialGradient(-3, -3, 2, 0, 0, this.radius);
                grad.addColorStop(0, '#e0f2fe');
                grad.addColorStop(0.3, '#38bdf8');
                grad.addColorStop(0.8, '#0284c7');
                grad.addColorStop(1, '#0369a1');

                ctx.beginPath();
                ctx.fillStyle = grad;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#0ea5e9';
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // 뒤쪽 매듭 부분 묘사
                ctx.beginPath();
                ctx.moveTo(-this.radius, -5);
                ctx.lineTo(-this.radius - 6, -8);
                ctx.lineTo(-this.radius - 6, 8);
                ctx.lineTo(-this.radius, 5);
                ctx.fillStyle = '#0369a1';
                ctx.fill();

                ctx.restore();
            }
        }

        // 물풍선 비행 시 발산되는 꼬리 기포 파티클
        class WaterTrailParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.radius = Math.random() * 4 + 2;
                this.alpha = 0.7;
                this.decay = Math.random() * 0.03 + 0.02;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = 'rgba(186, 230, 253, 0.6)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 3. UFO 비행체 클래스 (SF 비주얼 테마 개정)
        class UFO {
            constructor() {
                this.reset();
            }

            reset() {
                this.radius = Math.random() * 6 + 18; 
                this.direction = Math.random() > 0.5 ? 1 : -1;
                this.x = this.direction === 1 ? -60 : window.innerWidth + 60;
                
                this.y = Math.random() * (window.innerHeight * 0.3) + 70;
                
                const baseSpeed = Math.random() * 1.5 + 1.2;
                this.vx = this.direction * (baseSpeed + (state.stage * 0.2));
                this.vy = 0;
                this.active = true;

                const roll = Math.random();
                if (roll < 0.2 && state.stage >= 2) {
                    this.type = 'fast'; 
                    this.vx *= 1.5;
                    this.color = '#eab308';
                    this.glow = 'rgba(234, 179, 8, 0.9)';
                    this.hp = 1;
                    this.maxHp = 1;
                    this.scoreVal = 300;
                } else if (roll < 0.45 && state.stage >= 3) {
                    this.type = 'heavy'; 
                    this.color = '#c084fc';
                    this.glow = 'rgba(192, 132, 252, 0.9)';
                    this.hp = 2; 
                    this.maxHp = 2;
                    this.vx *= 0.8;
                    this.scoreVal = 250;
                } else {
                    this.type = 'normal'; 
                    this.color = '#34d399';
                    this.glow = 'rgba(52, 211, 153, 0.9)';
                    this.hp = 1;
                    this.maxHp = 1;
                    this.scoreVal = 100;
                }

                this.sineOffset = Math.random() * Math.PI * 2;
                this.sineAmplitude = Math.random() * 1.6 + 0.4; 
                this.anglePulse = 0;
            }

            update() {
                this.vy = Math.sin(Date.now() * 0.0035 + this.sineOffset) * this.sineAmplitude;
                this.x += this.vx;
                this.y += this.vy;
                this.anglePulse += 0.05;

                if (this.type === 'fast' && Math.random() < 0.25) {
                    particles.push(new EngineFireParticle(this.x - this.vx * 1.5, this.y));
                }

                if ((this.direction === 1 && this.x > window.innerWidth + 80) || 
                    (this.direction === -1 && this.x < -80)) {
                    this.active = false;
                    decreaseLife(); 
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.glow;

                if (this.type === 'fast') {
                    // [디자인 1] 스텔스 고속 삼각 전투기
                    ctx.translate(this.x, this.y);
                    if (this.vx < 0) ctx.scale(-1, 1);

                    const flameLen = 15 + Math.sin(Date.now() * 0.1) * 8;
                    const fGrad = ctx.createLinearGradient(-this.radius * 1.2, 0, -this.radius * 2.2, 0);
                    fGrad.addColorStop(0, '#f97316');
                    fGrad.addColorStop(1, 'rgba(239, 68, 68, 0)');
                    ctx.fillStyle = fGrad;
                    ctx.beginPath();
                    ctx.moveTo(-this.radius, -this.radius * 0.3);
                    ctx.lineTo(-this.radius - flameLen, 0);
                    ctx.lineTo(-this.radius, this.radius * 0.3);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.moveTo(this.radius * 1.4, 0);
                    ctx.lineTo(-this.radius * 1.1, -this.radius * 0.7);
                    ctx.lineTo(-this.radius * 0.7, 0);
                    ctx.lineTo(-this.radius * 1.1, this.radius * 0.7);
                    ctx.closePath();
                    ctx.fillStyle = '#1e293b';
                    ctx.strokeStyle = '#fbbf24';
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                    ctx.fill();

                    ctx.beginPath();
                    ctx.ellipse(this.radius * 0.1, -this.radius * 0.1, this.radius * 0.5, this.radius * 0.3, -Math.PI / 8, 0, Math.PI * 2);
                    ctx.fillStyle = '#38bdf8';
                    ctx.fill();

                } else if (this.type === 'heavy') {
                    // [디자인 2] 대형 장갑 크루저 & 쉴드 아우라
                    ctx.translate(this.x, this.y);

                    if (this.hp > 1) {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.radius * 1.8, 0, Math.PI * 2);
                        ctx.strokeStyle = 'rgba(168, 85, 247, 0.4)';
                        ctx.lineWidth = 3;
                        ctx.stroke();

                        ctx.fillStyle = 'rgba(168, 85, 247, 0.05)';
                        ctx.fill();
                    }

                    ctx.beginPath();
                    ctx.fillStyle = 'rgba(244, 63, 94, 0.8)';
                    ctx.arc(0, -this.radius * 0.3, this.radius * 0.6, Math.PI, 0);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.radius * 1.5, this.radius * 0.5, 0, 0, Math.PI * 2);
                    ctx.fillStyle = '#334155';
                    ctx.strokeStyle = '#c084fc';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.fill();

                    ctx.beginPath();
                    ctx.ellipse(0, this.radius * 0.3, this.radius * 1.1, this.radius * 0.2, 0, 0, Math.PI * 2);
                    ctx.fillStyle = '#581c87';
                    ctx.fill();

                    const flash = Math.floor(Date.now() / 100) % 4;
                    for (let i = -2; i <= 2; i++) {
                        ctx.beginPath();
                        ctx.fillStyle = (flash === Math.abs(i)) ? '#f43f5e' : 'rgba(255, 255, 255, 0.8)';
                        ctx.arc(i * (this.radius * 0.5), this.radius * 0.05, 3.5, 0, Math.PI * 2);
                        ctx.fill();
                    }

                } else {
                    // [디자인 3] 우아하고 날렵한 반중력 원반형 UFO
                    ctx.translate(this.x, this.y);

                    ctx.save();
                    ctx.rotate(this.anglePulse * 0.5);
                    ctx.strokeStyle = 'rgba(52, 211, 153, 0.6)';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.radius * 1.5, this.radius * 0.6, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();

                    ctx.beginPath();
                    ctx.fillStyle = 'rgba(16, 185, 129, 0.85)';
                    ctx.ellipse(0, -this.radius * 0.2, this.radius * 0.65, this.radius * 0.5, 0, Math.PI, 0, false);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.radius * 1.3, this.radius * 0.35, 0, 0, Math.PI * 2);
                    ctx.fillStyle = '#1e293b';
                    ctx.strokeStyle = '#34d399';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.fill();

                    ctx.beginPath();
                    ctx.fillStyle = '#020617';
                    ctx.arc(0, -this.radius * 0.2, 4, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.fillStyle = '#34d399';
                    ctx.ellipse(0, this.radius * 0.25, 6, 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        // 스텔스 UFO 전용 엔진 잔상 화염 파티클
        class EngineFireParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y + (Math.random() - 0.5) * 8;
                this.radius = Math.random() * 5 + 3;
                this.alpha = 1;
                this.decay = Math.random() * 0.05 + 0.04;
            }
            update() {
                this.alpha -= this.decay;
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#f97316';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#f97316';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 4. 물줄기 터지는 입자 파편 이펙트 (Particles)
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color || '#38bdf8';
                this.radius = Math.random() * 4.5 + 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 7 + 2.5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 1; 
                this.alpha = 1;
                this.decay = Math.random() * 0.025 + 0.015;
                this.gravity = 0.18;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 5. 무작위 신비로운 별똥별 (Shooting Star)
        class ShootingStar {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * window.innerWidth * 0.8;
                this.y = 0;
                this.len = Math.random() * 80 + 50;
                this.speed = Math.random() * 12 + 10;
                this.angle = Math.PI / 4 + (Math.random() * 0.1 - 0.05);
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.active = false;
                this.opacity = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            trigger() {
                this.reset();
                this.active = true;
            }
            update() {
                if (!this.active) return;
                this.x += this.vx;
                this.y += this.vy;
                this.opacity -= this.decay;
                if (this.opacity <= 0) {
                    this.active = false;
                }
            }
            draw() {
                if (!this.active) return;
                ctx.save();
                ctx.strokeStyle = `rgba(186, 230, 253, ${this.opacity})`;
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#38bdf8';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.vx * 1.5, this.y - this.vy * 1.5);
                ctx.stroke();
                ctx.restore();
            }
        }

        // --- 전역 인스턴스 어레이 구성 ---
        let balloons = [];
        let ufos = [];
        let particles = [];
        let shootingStars = [new ShootingStar(), new ShootingStar()];

        function updateWind() {
            if (Math.random() < 0.4) {
                state.wind = Math.round((Math.random() * 10 - 5) * 10) / 10;
            } else {
                state.wind = 0; 
            }

            const windText = document.getElementById('hud-wind');
            const arrowSpan = document.getElementById('hud-wind-arrow');

            if (state.wind === 0) {
                windText.textContent = "무풍 (0)";
                windText.className = "font-bold text-emerald-400";
                arrowSpan.textContent = "➖";
                arrowSpan.style.transform = "rotate(0deg)";
            } else {
                const dir = state.wind > 0 ? "동풍 ▶" : "◀ 서풍";
                windText.textContent = `${dir} (${Math.abs(state.wind)})`;
                windText.className = "font-bold text-yellow-400 animate-pulse";
                arrowSpan.textContent = "➔";
                arrowSpan.style.transform = state.wind > 0 ? "rotate(0deg)" : "rotate(180deg)";
            }
        }

        function spawnUFOIfNeeded() {
            const desiredCount = Math.min(1 + Math.floor(state.stage / 2), 4); 
            while (ufos.filter(u => u.active).length < desiredCount) {
                const u = new UFO();
                ufos.push(u);
            }
        }

        function decreaseLife() {
            state.lives--;
            playSound('miss');
            state.screenShake = 22; 

            const heartsContainer = document.getElementById('hud-hearts');
            heartsContainer.innerHTML = '❤️'.repeat(Math.max(0, state.lives)) + '🖤'.repeat(Math.max(0, 3 - state.lives));

            if (state.lives <= 0) {
                triggerGameOver();
            }
        }

        function triggerGameOver() {
            state.isGameOver = true;
            state.isPlaying = false;
            
            if (state.score > state.bestScore) {
                state.bestScore = state.score;
                localStorage.setItem('ufo_best_score', state.bestScore);
                document.getElementById('hud-best').textContent = state.bestScore;
            }

            document.getElementById('go-score').textContent = state.score;
            document.getElementById('go-stage').textContent = state.stage;
            document.getElementById('gameover-screen').classList.remove('hidden');
        }

        function addScore(points) {
            state.score += points;
            document.getElementById('hud-score').textContent = state.score;

            const expectedStage = Math.floor(state.score / 1000) + 1;
            if (expectedStage > state.stage) {
                state.stage = expectedStage;
                document.getElementById('hud-stage').textContent = state.stage;
                playSound('levelup');
                updateWind(); 
            }
        }

        function checkCollisions() {
            for (let b of balloons) {
                if (!b.active) continue;

                for (let u of ufos) {
                    if (!u.active) continue;

                    const dx = b.x - u.x;
                    const dy = b.y - u.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < b.radius + (u.radius * 1.2)) {
                        b.active = false; 
                        u.hp--;

                        createSplashes(b.x, b.y, b.vx, b.vy, u.color);
                        playSound('hit');
                        state.screenShake = 12; 

                        if (u.hp <= 0) {
                            u.active = false;
                            addScore(u.scoreVal);
                            u.reset();
                        } else {
                            u.x += b.vx * 0.35;
                        }
                    }
                }
            }
        }

        function createSplashes(x, y, vx, vy, ufoColor) {
            const splashColors = ['#e0f2fe', '#60a5fa', '#0284c7', '#06b6d4', ufoColor];
            const pCount = Math.floor(Math.random() * 15) + 25; 
            for (let i = 0; i < pCount; i++) {
                const color = splashColors[Math.floor(Math.random() * splashColors.length)];
                particles.push(new Particle(x, y, color));
            }
        }

        // --- 마우스 & 터치 통합 포인터 컨트롤 로직 ---
        function setupControls() {
            canvas.addEventListener('pointerdown', (e) => {
                if (!state.isPlaying || state.isGameOver) return;
                
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX - rect.left;
                const clientY = e.clientY - rect.top;

                const distToLauncher = Math.hypot(clientX - launcher.x, clientY - launcher.y);
                
                if (distToLauncher < 110) {
                    launcher.dragStart = { x: launcher.x, y: launcher.y };
                    launcher.dragCurrent = { x: clientX, y: clientY };
                    e.preventDefault();
                }
            });

            window.addEventListener('pointermove', (e) => {
                if (launcher.dragStart && launcher.dragCurrent) {
                    const rect = canvas.getBoundingClientRect();
                    const clientX = e.clientX - rect.left;
                    const clientY = e.clientY - rect.top;
                    
                    launcher.dragCurrent = { x: clientX, y: clientY };
                }
            });

            window.addEventListener('pointerup', (e) => {
                if (launcher.dragStart && launcher.dragCurrent) {
                    const dx = launcher.dragCurrent.x - launcher.dragStart.x;
                    const dy = launcher.dragCurrent.y - launcher.dragStart.y;
                    const dist = Math.hypot(dx, dy);
                    const angle = Math.atan2(dy, dx);
                    
                    const appliedDist = Math.min(dist, launcher.maxDrag);
                    
                    const vx = -Math.cos(angle) * appliedDist * PHYSICS.speedMultiplier;
                    const vy = -Math.sin(angle) * appliedDist * PHYSICS.speedMultiplier;

                    if (appliedDist > 12) {
                        const b = new Balloon(launcher.x, launcher.y, vx, vy);
                        balloons.push(b);
                        playSound('launch');
                    }

                    launcher.dragStart = null;
                    launcher.dragCurrent = null;
                }
            });
        }

        // --- 메인 게임 루프 ---
        function loop() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

            // 화면 뒤흔들기(Screen Shake) 효과 연출
            ctx.save();
            if (state.screenShake > 0) {
                const dx = (Math.random() - 0.5) * state.screenShake;
                const dy = (Math.random() - 0.5) * state.screenShake;
                ctx.translate(dx, dy);
                state.screenShake *= 0.9; 
                if (state.screenShake < 0.2) state.screenShake = 0;
            }

            // 1. 깊은 심우주 오로라 빛 그라데이션 배경 그리기
            const skyGrad = ctx.createLinearGradient(0, 0, 0, window.innerHeight);
            skyGrad.addColorStop(0, '#020012'); 
            skyGrad.addColorStop(0.5, '#090122'); 
            skyGrad.addColorStop(1, '#020012'); 
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            // 2. 신비로운 일렁이는 성운(Nebula) 연출 (2개의 거대 타원 글로우)
            drawNebula();

            // 3. 고리 행성 그리기
            drawPlanet();

            // 4. 배경 별빛 가동 및 반짝임
            state.stars.forEach(s => {
                s.opacity += (Math.random() - 0.5) * s.pulseSpeed;
                s.opacity = Math.max(0.15, Math.min(s.opacity, 1.0));
                ctx.fillStyle = s.color;
                ctx.globalAlpha = s.opacity;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0; 
            });

            // 5. 확률적인 별똥별 격발 및 갱신
            if (Math.random() < 0.008) {
                const idleStar = shootingStars.find(st => !st.active);
                if (idleStar) idleStar.trigger();
            }
            shootingStars.forEach(st => {
                st.update();
                st.draw();
            });

            if (state.isPlaying) {
                spawnUFOIfNeeded();

                ufos = ufos.filter(u => u.active);
                ufos.forEach(u => {
                    u.update();
                    u.draw();
                });

                balloons = balloons.filter(b => b.active);
                balloons.forEach(b => {
                    b.update();
                    b.draw();
                });

                checkCollisions();

                // 파티클 업데이트
                particles = particles.filter(p => p.alpha > 0);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
            }

            // 6. 무기 발사체 새총 렌더링
            launcher.draw();

            ctx.restore();

            requestAnimationFrame(loop);
        }

        // 일렁이는 은하 가스 성운 그리기
        function drawNebula() {
            ctx.save();
            const glowPulse = Math.sin(Date.now() * 0.001) * 10;
            
            // 왼쪽 보랏빛 성운
            const radGrad1 = ctx.createRadialGradient(
                window.innerWidth * 0.25, window.innerHeight * 0.3, 20,
                window.innerWidth * 0.25, window.innerHeight * 0.3, 160 + glowPulse
            );
            radGrad1.addColorStop(0, 'rgba(147, 51, 234, 0.15)');
            radGrad1.addColorStop(1, 'rgba(147, 51, 234, 0)');
            ctx.fillStyle = radGrad1;
            ctx.beginPath();
            ctx.arc(window.innerWidth * 0.25, window.innerHeight * 0.3, 160 + glowPulse, 0, Math.PI * 2);
            ctx.fill();

            // 오른쪽 테알/네온빛 성운
            const radGrad2 = ctx.createRadialGradient(
                window.innerWidth * 0.75, window.innerHeight * 0.25, 20,
                window.innerWidth * 0.75, window.innerHeight * 0.25, 140 - glowPulse
            );
            radGrad2.addColorStop(0, 'rgba(6, 182, 212, 0.12)');
            radGrad2.addColorStop(1, 'rgba(6, 182, 212, 0)');
            ctx.fillStyle = radGrad2;
            ctx.beginPath();
            ctx.arc(window.innerWidth * 0.75, window.innerHeight * 0.25, 140 - glowPulse, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // 신비로운 거대 고리 행성 그리기
        function drawPlanet() {
            ctx.save();
            const p = state.planet;
            
            const pGrad = ctx.createRadialGradient(
                p.x - p.radius * 0.3, p.y - p.radius * 0.3, p.radius * 0.1,
                p.x, p.y, p.radius
            );
            pGrad.addColorStop(0, '#f472b6'); 
            pGrad.addColorStop(0.5, '#701a75');
            pGrad.addColorStop(1, '#2e1065');

            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(244, 114, 182, 0.4)';

            ctx.beginPath();
            ctx.fillStyle = pGrad;
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'rgba(244, 114, 182, 0.25)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius + 1, 0, Math.PI * 2);
            ctx.stroke();

            ctx.shadowBlur = 8;
            ctx.shadowColor = '#f472b6';
            ctx.strokeStyle = 'rgba(244, 114, 182, 0.55)';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.ellipse(p.x, p.y, p.radius * 2.1, p.radius * 0.25, -Math.PI / 7, 0, Math.PI * 2);
            ctx.stroke();

            ctx.restore();
        }

        // --- 게임 리셋 및 실행 트리거 ---
        function resetGame() {
            state.score = 0;
            state.lives = 3;
            state.stage = 1;
            state.isGameOver = false;
            state.isPlaying = true;
            state.wind = 0;
            state.screenShake = 0;

            balloons = [];
            ufos = [];
            particles = [];

            document.getElementById('hud-score').textContent = "0";
            document.getElementById('hud-stage').textContent = "1";
            document.getElementById('hud-best').textContent = state.bestScore;
            document.getElementById('hud-hearts').innerHTML = '❤️❤️❤️';
            
            updateWind();
            launcher.init();
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            audioCtx.resume();
            
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').classList.add('hidden');
            }, 300);

            resetGame();
        });

        document.getElementById('btn-restart').addEventListener('click', () => {
            document.getElementById('gameover-screen').classList.add('hidden');
            resetGame();
        });

        setInterval(() => {
            if (state.isPlaying && !state.isGameOver) {
                updateWind();
            }
        }, 8000);

        // 초기 시작 동작
        resizeCanvas();
        launcher.init();
        setupControls();
        
        document.getElementById('hud-best').textContent = state.bestScore;

        requestAnimationFrame(loop);

    </script>
</body>
</html>
