<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구구단 마스터 🎮 - 신나는 구구단 공부방</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #f8fafc;
        }
        .kids-font {
            font-family: 'Gaegu', cursive;
        }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 2s infinite;
        }
        @keyframes pop-in {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: pop-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen text-slate-800 antialiased selection:bg-purple-200">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <header class="text-center mb-8 animate-pop-in">
            <div class="inline-flex items-center gap-3 bg-white px-6 py-2.5 rounded-full shadow-md border border-purple-100 mb-4 hover:scale-105 transition duration-300">
                <span class="text-3xl animate-bounce-slow">✨</span>
                <span class="kids-font text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500">신나는 배움 놀이터</span>
                <span class="text-3xl animate-bounce-slow">✨</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight flex justify-center items-center gap-2">
                <span class="kids-font text-purple-600">구구단</span>
                <span class="text-pink-500 kids-font">마스터!</span>
                <span class="text-3xl md:text-4xl">🎮</span>
            </h1>
            <p class="text-slate-500 mt-2 text-sm md:text-base">원리를 이해하고 게임으로 재미있게 마스터하는 똑똑한 구구단 공부방</p>
        </header>

        <nav class="grid grid-cols-4 gap-2 mb-8 bg-white p-2 rounded-2xl shadow-md border border-slate-100">
            <button onclick="switchTab('study')" id="tab-study" class="nav-tab py-3 px-2 md:px-4 rounded-xl text-center font-bold text-sm md:text-base flex flex-col md:flex-row items-center justify-center gap-2 transition-all duration-300 bg-gradient-to-r from-purple-500 to-indigo-500 text-white shadow-md">
                <i class="fa-solid fa-graduation-cap text-lg"></i>
                <span>개념 학습</span>
            </button>
            <button onclick="switchTab('practice')" id="tab-practice" class="nav-tab py-3 px-2 md:px-4 rounded-xl text-center font-bold text-sm md:text-base flex flex-col md:flex-row items-center justify-center gap-2 transition-all duration-300 text-slate-600 hover:bg-slate-50">
                <i class="fa-solid fa-square-check text-lg"></i>
                <span>일일 연습</span>
            </button>
            <button onclick="switchTab('game')" id="tab-game" class="nav-tab py-3 px-2 md:px-4 rounded-xl text-center font-bold text-sm md:text-base flex flex-col md:flex-row items-center justify-center gap-2 transition-all duration-300 text-slate-600 hover:bg-slate-50">
                <i class="fa-solid fa-circle-play text-lg animate-pulse text-pink-500"></i>
                <span>스피드 도전</span>
            </button>
            <button onclick="switchTab('stats')" id="tab-stats" class="nav-tab py-3 px-2 md:px-4 rounded-xl text-center font-bold text-sm md:text-base flex flex-col md:flex-row items-center justify-center gap-2 transition-all duration-300 text-slate-600 hover:bg-slate-50">
                <i class="fa-solid fa-chart-line text-lg"></i>
                <span>성적&오답</span>
            </button>
        </nav>

        <main id="app-content" class="bg-white rounded-3xl p-6 md:p-8 shadow-xl border border-slate-100 min-h-[500px] flex flex-col justify-between">
            
            <!-- Dynamic Content gets loaded here via JavaScript -->
            <div id="screen-container" class="w-full h-full"></div>

        </main>
        
        <footer class="text-center mt-8 text-slate-400 text-xs">
            <p>© 2026 구구단 마스터. All Rights Reserved. 즐겁게 학습하고 멋진 수학 왕이 되세요!</p>
        </footer>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4 hidden">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl border border-slate-100 scale-95 opacity-0 transition-all duration-300 ease-out transform" id="modal-card">
            <div class="text-center">
                <div class="w-16 h-16 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4" id="modal-icon">
                    💡
                </div>
                <h3 class="text-xl font-bold text-slate-900 mb-2" id="modal-title">알림</h3>
                <p class="text-slate-600 text-sm mb-6" id="modal-message">내용</p>
                <button onclick="closeModal()" class="w-full bg-gradient-to-r from-purple-500 to-indigo-500 text-white font-bold py-3 px-4 rounded-xl shadow-md hover:from-purple-600 hover:to-indigo-600 transition duration-300">
                    확인했습니다
                </button>
            </div>
        </div>
    </div>

    <script>
        // State variables
        let currentTab = 'study';
        let currentStudyRange = 9; // Max table range (9, 12, or 19)
        let selectedStudyStep = 2; // Selected multiplication step (e.g. 2 dan)
        let selectedVisualCard = null; // Currently highlighted visual equation
        
        // Practice mode state
        let practiceSelectedSteps = [2, 3, 4, 5, 6, 7, 8, 9];
        let practiceQuestions = [];
        let currentPracticeIndex = 0;
        let practiceScore = 0;
        let practiceTotalQuestions = 10;
        let practiceOptions = [];

        // Game mode state
        let gameStatus = 'idle'; // idle, playing, gameover
        let gameTimer = null;
        let gameTimeLeft = 30; // 30 seconds limit
        let gameScore = 0;
        let gameCombo = 0;
        let gameMaxCombo = 0;
        let gameLives = 3;
        let gameCurrentQuestion = { num1: 2, num2: 3, answer: 6 };
        let gameOptions = [];
        let highScores = JSON.parse(localStorage.getItem('gugudan_high_scores')) || { '9': 0, '12': 0, '19': 0 };

        // Statistics state
        let statsData = JSON.parse(localStorage.getItem('gugudan_stats')) || {
            correct: {},
            incorrect: {},
            wrongList: [] // list of incorrect formulas
        };

        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                const playTone = (freq, waveType, duration, delay) => {
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    osc.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    
                    osc.type = waveType;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                    gainNode.gain.setValueAtTime(0.12, ctx.currentTime + delay);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
                    
                    osc.start(ctx.currentTime + delay);
                    osc.stop(ctx.currentTime + delay + duration);
                };

                if (type === 'correct') {
                    // Quick happy notes (C5 -> E5 -> G5)
                    playTone(523.25, 'triangle', 0.1, 0);
                    playTone(659.25, 'triangle', 0.1, 0.08);
                    playTone(783.99, 'triangle', 0.18, 0.16);
                } else if (type === 'incorrect') {
                    // Short low buzzer (F3 -> C3)
                    playTone(174.61, 'sawtooth', 0.15, 0);
                    playTone(130.81, 'sawtooth', 0.2, 0.1);
                } else if (type === 'click') {
                    // Soft light sound
                    playTone(587.33, 'sine', 0.05, 0);
                } else if (type === 'gameover') {
                    // Melancholic ending scale
                    playTone(493.88, 'sine', 0.15, 0);
                    playTone(440.00, 'sine', 0.15, 0.15);
                    playTone(349.23, 'sine', 0.15, 0.3);
                    playTone(261.63, 'sine', 0.35, 0.45);
                } else if (type === 'victory') {
                    // Celebration fan-fare
                    playTone(523.25, 'triangle', 0.1, 0);
                    playTone(659.25, 'triangle', 0.1, 0.1);
                    playTone(783.99, 'triangle', 0.1, 0.2);
                    playTone(1046.50, 'triangle', 0.25, 0.3);
                }
            } catch (e) {
                console.warn('Audio Context error or not initialized.', e);
            }
        };

        const showModal = (title, message, icon = '💡') => {
            const modal = document.getElementById('custom-modal');
            const card = document.getElementById('modal-card');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            document.getElementById('modal-icon').innerText = icon;

            modal.classList.remove('hidden');
            setTimeout(() => {
                card.classList.remove('scale-95', 'opacity-0');
                card.classList.add('scale-100', 'opacity-100');
            }, 50);
        };

        const closeModal = () => {
            const modal = document.getElementById('custom-modal');
            const card = document.getElementById('modal-card');
            card.classList.remove('scale-100', 'opacity-100');
            card.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
            playSound('click');
        };

        const switchTab = (tabName) => {
            playSound('click');
            // Clean up game states
            if (currentTab === 'game' && gameTimer) {
                clearInterval(gameTimer);
                gameStatus = 'idle';
            }

            currentTab = tabName;
            
            // Update Tab UI styles
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.className = "nav-tab py-3 px-2 md:px-4 rounded-xl text-center font-bold text-sm md:text-base flex flex-col md:flex-row items-center justify-center gap-2 transition-all duration-300 text-slate-600 hover:bg-slate-50";
            });

            const activeTabButton = document.getElementById(`tab-${tabName}`);
            activeTabButton.className = "nav-tab py-3 px-2 md:px-4 rounded-xl text-center font-bold text-sm md:text-base flex flex-col md:flex-row items-center justify-center gap-2 transition-all duration-300 bg-gradient-to-r from-purple-500 to-indigo-500 text-white shadow-md";

            renderScreen();
        };

        const renderScreen = () => {
            const container = document.getElementById('screen-container');
            
            if (currentTab === 'study') {
                renderStudyScreen(container);
            } else if (currentTab === 'practice') {
                renderPracticeScreen(container);
            } else if (currentTab === 'game') {
                renderGameScreen(container);
            } else if (currentTab === 'stats') {
                renderStatsScreen(container);
            }
        };

        const renderStudyScreen = (container) => {
            let limit = currentStudyRange;
            let optionsHtml = '';
            
            // Generate Range selector tab buttons
            const rangeOptions = [9, 12, 19];
            let rangeSelectorHtml = rangeOptions.map(r => `
                <button onclick="setStudyRange(${r})" class="px-4 py-2 font-bold text-sm rounded-lg transition-all ${currentStudyRange === r ? 'bg-purple-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}">
                    ${r === 9 ? '기본 구구단 (9단)' : r === 12 ? '똑똑이 (12단)' : '천재 수학자 (19단)'}
                </button>
            `).join('');

            // Steps Buttons (2단, 3단...)
            let stepsHtml = '';
            for (let i = 2; i <= limit; i++) {
                stepsHtml += `
                    <button onclick="selectStudyStep(${i})" class="w-12 h-12 md:w-14 md:h-14 flex items-center justify-center rounded-2xl font-black text-lg transition duration-300 ${selectedStudyStep === i ? 'bg-gradient-to-br from-purple-500 to-indigo-500 text-white shadow-lg scale-110 ring-4 ring-purple-200' : 'bg-white border-2 border-slate-100 text-slate-700 hover:border-purple-300 hover:text-purple-600 shadow-sm'}">
                        ${i}단
                    </button>
                `;
            }

            // Calculations list in active step
            let mathRowsHtml = '';
            const subMax = currentStudyRange === 19 ? 19 : 9; // Show standard 1 to 9 multiplier, or up to 19 if in 19dan mode
            for (let i = 1; i <= subMax; i++) {
                const stepResult = selectedStudyStep * i;
                const activeCardClass = (selectedVisualCard === i) ? 'ring-4 ring-pink-400 bg-pink-50 border-pink-200 scale-[1.03]' : 'bg-white border-slate-100 hover:border-purple-200 hover:bg-purple-50/50';
                mathRowsHtml += `
                    <div onclick="selectVisualFormula(${i})" class="flex items-center justify-between p-4 border-2 rounded-2xl cursor-pointer transition-all duration-300 shadow-sm ${activeCardClass}">
                        <div class="flex items-center gap-3">
                            <span class="text-xl md:text-2xl font-black text-slate-800 kids-font">${selectedStudyStep}</span>
                            <span class="text-slate-400 font-bold">×</span>
                            <span class="text-xl md:text-2xl font-black text-slate-800 kids-font">${i}</span>
                            <span class="text-slate-400 font-bold">=</span>
                        </div>
                        <span class="text-2xl md:text-3xl font-black text-purple-600 kids-font">${stepResult}</span>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="flex flex-col gap-6 animate-pop-in">
                    <!-- Top section selector -->
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-purple-50/60 p-4 rounded-2xl border border-purple-100">
                        <span class="font-bold text-purple-800 flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> 공부할 단수를 골라보세요!
                        </span>
                        <div class="flex flex-wrap gap-2">
                            ${rangeSelectorHtml}
                        </div>
                    </div>

                    <!-- Steps Selector -->
                    <div class="flex flex-wrap gap-2 md:gap-3 py-2 justify-center">
                        ${stepsHtml}
                    </div>

                    <!-- Layout splitting formulas list and concept visualizer -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start mt-4">
                        <!-- Formula List -->
                        <div class="flex flex-col gap-3">
                            <h3 class="font-bold text-slate-800 flex items-center gap-2 px-1">
                                <span class="bg-purple-100 text-purple-600 w-6 h-6 rounded-full inline-flex items-center justify-center text-xs">📖</span>
                                ${selectedStudyStep}단 정복하기 (터치해서 원리 보기)
                            </h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-1 gap-2.5 max-h-[460px] overflow-y-auto custom-scrollbar pr-1">
                                ${mathRowsHtml}
                            </div>
                        </div>

                        <!-- Conceptual visualizer card -->
                        <div class="bg-gradient-to-br from-indigo-50/50 to-purple-50/50 rounded-3xl p-6 border border-indigo-100/60 sticky top-6">
                            <div class="text-center mb-4">
                                <span class="text-xs bg-indigo-100 text-indigo-700 font-extrabold px-3 py-1 rounded-full uppercase tracking-wider">개념 비주얼라이저</span>
                                <h4 class="text-xl font-bold text-slate-800 mt-2">나눗셈과 곱셈의 원리</h4>
                                <p class="text-xs text-slate-500 mt-1">이모지 상자들로 배움을 눈으로 확인하세요!</p>
                            </div>
                            
                            <div id="visualizer-content" class="min-h-[220px] flex flex-col justify-center items-center bg-white rounded-2xl p-6 border border-slate-100 shadow-inner">
                                <!-- Visualizer internal content rendered separately -->
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Auto-select first index visual helper if none selected
            if (!selectedVisualCard) {
                selectVisualFormula(1);
            } else {
                updateStudyVisualizer();
            }
        };

        const setStudyRange = (r) => {
            playSound('click');
            currentStudyRange = r;
            selectedStudyStep = 2; // reset
            selectedVisualCard = 1;
            renderScreen();
        };

        const selectStudyStep = (step) => {
            playSound('click');
            selectedStudyStep = step;
            selectedVisualCard = 1;
            renderScreen();
        };

        const selectVisualFormula = (num) => {
            playSound('click');
            selectedVisualCard = num;
            
            // Re-render just the list selection active state to be optimized
            const elements = document.getElementById('screen-container').querySelectorAll('.grid > div');
            renderScreen(); // Simple re-draw of entire state keeps visual sync perfect
        };

        const updateStudyVisualizer = () => {
            const visualizer = document.getElementById('visualizer-content');
            if (!visualizer) return;

            const n1 = selectedStudyStep;
            const n2 = selectedVisualCard;
            const result = n1 * n2;

            // Generate boxes structure represent rows * cols
            let blocksHtml = '';
            
            // Limit representation rendering if indices are ridiculously huge (like in 19dan, to prevent layout crash)
            const isLarge = (n1 * n2 > 40);
            const emojis = ['🍎', '⭐️', '👾', '🎨', '🧩', '🍭', '🍕', '🚀', '🍔', '🍦'];
            const randomEmoji = emojis[n1 % emojis.length];

            if (isLarge) {
                // Simplified block view for large numbers
                blocksHtml = `
                    <div class="text-center">
                        <div class="grid grid-cols-5 gap-2 max-w-[280px] justify-center mx-auto max-h-[200px] overflow-y-auto p-2">
                            ${Array(result).fill(0).map(() => `<span class="text-lg md:text-xl transform hover:scale-125 transition duration-200 cursor-pointer">${randomEmoji}</span>`).join('')}
                        </div>
                        <p class="text-xs text-slate-400 mt-3">${randomEmoji}가 총 ${result}개 있어요!</p>
                    </div>
                `;
            } else {
                // Grouped view
                let groups = '';
                for (let g = 0; g < n2; g++) {
                    let items = '';
                    for (let item = 0; item < n1; item++) {
                        items += `<span class="text-lg animate-bounce-slow" style="animation-delay: ${item * 0.1}s">${randomEmoji}</span>`;
                    }
                    groups += `
                        <div class="flex flex-col items-center justify-center p-2.5 bg-purple-50/80 rounded-xl border border-purple-200/50 shadow-sm relative">
                            <div class="grid grid-cols-2 gap-1">${items}</div>
                            <span class="absolute -top-2 -right-2 bg-purple-600 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">${n1}</span>
                        </div>
                    `;
                }

                blocksHtml = `
                    <div class="flex flex-col items-center gap-4">
                        <div class="flex flex-wrap gap-3 justify-center max-w-[320px]">
                            ${groups}
                        </div>
                        <div class="text-sm font-bold text-slate-600 mt-1">
                            ${n1}개씩 묶음이 <span class="text-pink-500 font-extrabold text-lg">${n2}개</span> 있어요
                        </div>
                    </div>
                `;
            }

            visualizer.innerHTML = `
                <div class="w-full text-center">
                    <div class="mb-4">
                        <span class="kids-font text-3xl font-black text-indigo-600">${n1}</span>
                        <span class="text-slate-400 font-bold mx-2">×</span>
                        <span class="kids-font text-3xl font-black text-indigo-600">${n2}</span>
                        <span class="text-slate-400 font-bold mx-2">=</span>
                        <span class="kids-font text-4xl font-black text-pink-500 animate-pulse underline decoration-wavy decoration-indigo-200 decoration-3">${result}</span>
                    </div>
                    <div class="w-full border-t border-slate-100 my-4"></div>
                    ${blocksHtml}
                </div>
            `;
        };

        const renderPracticeScreen = (container) => {
            // First screen: Settings configuration for Practice
            if (practiceQuestions.length === 0) {
                let optionsCheckboxes = '';
                for (let i = 2; i <= 9; i++) {
                    const isChecked = practiceSelectedSteps.includes(i) ? 'checked' : '';
                    optionsCheckboxes += `
                        <label class="flex items-center justify-between p-3 border-2 rounded-2xl cursor-pointer hover:bg-slate-50 hover:border-purple-300 transition duration-200 ${practiceSelectedSteps.includes(i) ? 'border-purple-500 bg-purple-50/30' : 'border-slate-100'}">
                            <span class="font-extrabold text-slate-700 kids-font text-lg">${i}단</span>
                            <input type="checkbox" value="${i}" ${isChecked} onchange="togglePracticeStep(${i})" class="w-5 h-5 text-purple-600 border-slate-300 rounded focus:ring-purple-500">
                        </label>
                    `;
                }

                container.innerHTML = `
                    <div class="max-w-xl mx-auto flex flex-col gap-6 animate-pop-in">
                        <div class="text-center">
                            <span class="text-3xl">📝</span>
                            <h3 class="text-2xl font-black text-slate-800 mt-2">일일 연습 세팅</h3>
                            <p class="text-sm text-slate-500 mt-1">오늘 마스터하고 싶은 구구단 범위를 골라보세요!</p>
                        </div>

                        <div class="border border-slate-100 bg-white rounded-3xl p-5 shadow-sm">
                            <h4 class="font-bold text-slate-800 mb-4 flex justify-between items-center">
                                <span>연습 단수 선택 (복수 선택 가능)</span>
                                <span class="text-xs text-purple-600 font-medium cursor-pointer hover:underline" onclick="selectAllPractice(true)">모두 선택</span>
                            </h4>
                            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2.5">
                                ${optionsCheckboxes}
                            </div>

                            <div class="mt-6">
                                <h4 class="font-bold text-slate-800 mb-2">총 문항 수</h4>
                                <div class="grid grid-cols-3 gap-2">
                                    ${[5, 10, 20].map(n => `
                                        <button onclick="setPracticeTotal(${n})" class="py-2.5 font-bold rounded-xl border-2 transition ${practiceTotalQuestions === n ? 'bg-purple-600 border-purple-600 text-white shadow-md' : 'border-slate-100 text-slate-600 hover:bg-slate-50'}">
                                            ${n}문제
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <button onclick="startPractice()" class="w-full bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-600 hover:to-indigo-600 text-white font-extrabold py-4 rounded-2xl shadow-lg shadow-purple-200 hover:scale-[1.01] transition-all duration-300 text-lg flex items-center justify-center gap-2">
                            <i class="fa-solid fa-play"></i> 연습 시작하기!
                        </button>
                    </div>

                const list = statsData.wrongList.slice(-8); // Get latest 8 wrong formulas
                
                wrongQuestionsHtml = list.map((item, index) => `
                    <div class="flex justify-between items-center p-3 bg-rose-50/50 hover:bg-rose-50 border border-rose-100 rounded-xl transition duration-200">
                        <div class="flex items-center gap-3">
                            <span class="bg-rose-100 text-rose-600 text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center">${index + 1}</span>
                            <span class="kids-font font-black text-slate-800 text-lg">${item.num1} × ${item.num2} = ?</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="retryWrongQuestion(${item.num1}, ${item.num2}, ${index})" class="px-3.5 py-1.5 text-xs font-bold text-white bg-gradient-to-r from-rose-500 to-pink-500 rounded-lg hover:from-rose-600 hover:to-pink-600 shadow-sm transition">
                                다시 풀기
                            </button>
                        </div>
                    </div>
                `).join('');
            } else {
                wrongQuestionsHtml = `
                    <div class="text-center p-8 border-2 border-dashed border-slate-100 rounded-2xl">
                        <span class="text-4xl">🎉</span>
                        <h5 class="font-bold text-slate-600 mt-2">오답 노트가 텅 비었어요!</h5>
                        <p class="text-xs text-slate-400 mt-1">모든 문제를 다 맞혔거나 아직 풀지 않았어요.</p>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 animate-pop-in">
                    <!-- Progress Grid -->
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-slate-800 flex items-center gap-2">
                                <i class="fa-solid fa-chart-line text-purple-500"></i> 단수별 마스터 진행율
                            </h3>
                            <button onclick="resetStats()" class="text-xs text-slate-400 hover:text-rose-500 font-bold transition">기록 초기화</button>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-1 gap-3 max-h-[460px] overflow-y-auto custom-scrollbar pr-1">
                            ${statsItemsHtml}
                        </div>
                    </div>

                    <!-- Incorrect Notes Grid -->
                    <div>
                        <div class="mb-4">
                            <h3 class="font-bold text-slate-800 flex items-center gap-2">
                                <i class="fa-solid fa-triangle-exclamation text-rose-500"></i> 똑똑 오답 노트 (복습 공간)
                            </h3>
                            <p class="text-xs text-slate-400 mt-1">최근에 오답이 있었던 문제들입니다. 완벽하게 학습해 봐요!</p>
                        </div>
                        <div class="flex flex-col gap-2.5 max-h-[460px] overflow-y-auto custom-scrollbar pr-1">
                            ${wrongQuestionsHtml}
                        </div>
                    </div>
                </div>
            `;
        };

        const recordStat = (num1, num2, isCorrect) => {
            // Log core stats per step
            if (!statsData.correct[num1]) statsData.correct[num1] = 0;
            if (!statsData.incorrect[num1]) statsData.incorrect[num1] = 0;

            if (isCorrect) {
                statsData.correct[num1]++;
                // If it exists in wrongList, remove it to show mastery progression
                statsData.wrongList = statsData.wrongList.filter(item => !(item.num1 === num1 && item.num2 === num2));
            } else {
                statsData.incorrect[num1]++;
                // Add to wrong list if not already logged
                const alreadyExists = statsData.wrongList.some(item => item.num1 === num1 && item.num2 === num2);
                if (!alreadyExists) {
                    statsData.wrongList.push({ num1, num2 });
                }
            }

            localStorage.setItem('gugudan_stats', JSON.stringify(statsData));
        };

        const retryWrongQuestion = (num1, num2, index) => {
            playSound('click');
            const result = num1 * num2;
            
            // Generate basic choices
            const choices = new Set();
            choices.add(result);
            while (choices.size < 4) {
                const offset = Math.floor(Math.random() * 5) - 2;
                let distractor = result + (offset * num1);
                if (distractor <= 0 || distractor === result) {
                    distractor = num1 * (Math.floor(Math.random() * 9) + 1);
                }
                choices.add(distractor);
            }
            const opts = Array.from(choices).sort(() => Math.random() - 0.5);

            // Dynamically overlay a small puzzle modal
            const optionsButtons = opts.map(o => `
                <button onclick="submitRetryAnswer(${num1}, ${num2}, ${o}, ${index})" class="p-3 font-bold border rounded-xl hover:bg-slate-50 transition">${o}</button>
            `).join('');

            const overlay = document.createElement('div');
            overlay.id = 'retry-overlay';
            overlay.className = "fixed inset-0 bg-slate-900/40 flex items-center justify-center z-50 p-4";
            overlay.innerHTML = `
                <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl animate-pop-in text-center">
                    <span class="text-3xl">🔥</span>
                    <h3 class="text-lg font-bold text-slate-800 mt-2 mb-4">다시 도전: ${num1} × ${num2}</h3>
                    <div class="grid grid-cols-2 gap-2.5 mb-5">
                        ${optionsButtons}
                    </div>
                    <button onclick="closeRetryOverlay()" class="text-sm font-semibold text-slate-400 hover:text-slate-600 transition">창 닫기</button>
                </div>
            `;
            document.body.appendChild(overlay);
        };

        const submitRetryAnswer = (num1, num2, answer, listIndex) => {
            const isCorrect = (num1 * num2 === answer);
            const overlay = document.getElementById('retry-overlay');
            if (overlay) overlay.remove();

            if (isCorrect) {
                playSound('correct');
                // Remove from wrongList
                statsData.wrongList.splice(listIndex, 1);
                statsData.correct[num1] = (statsData.correct[num1] || 0) + 1;
                localStorage.setItem('gugudan_stats', JSON.stringify(statsData));
                showModal('정답입니다!', '오답 노트에서 이 문제가 사라졌어요! 대단합니다.', '🎉');
            } else {
                playSound('incorrect');
                showModal('어이쿠, 아쉬워요!', '다음에 다시 차근차근 확인해 봐요!', '💪');
            }
            renderScreen();
        };

        const closeRetryOverlay = () => {
            playSound('click');
            const overlay = document.getElementById('retry-overlay');
            if (overlay) overlay.remove();
        };

        const resetStats = () => {
            playSound('click');
            statsData = { correct: {}, incorrect: {}, wrongList: [] };
            localStorage.setItem('gugudan_stats', JSON.stringify(statsData));
            showModal('초기화 완료', '모든 누적 성적표 데이터와 오답 기록이 청소되었습니다.', '🧹');
            renderScreen();
        };

        const triggerConfetti = () => {
            confetti({
                particleCount: 120,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#a855f7', '#ec4899', '#6366f1', '#3b82f6', '#f59e0b']
            });
        };

        window.onload = function() {
            renderScreen();
        };
    </script>
</body>
</html>
