<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>애니팡 (Anipang Style Game)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
    <style>
        * {
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: 'Jua', 'Nunito', sans-serif;
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            overflow: hidden;
        }

        /* Glassmorphism & Game Frame styling */
        .game-frame {
            background: rgba(18, 25, 44, 0.85);
            backdrop-filter: blur(8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.2);
        }

        .board-cell {
            background: #0f172a;
            border-radius: 16px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.8), inset 0 -1px 2px rgba(255,255,255,0.08);
        }

        .board-cell:nth-child(even) {
            background: #1e293b;
        }

        .tile {
            transition: transform 0.22s ease-out, top 0.22s ease-out, left 0.22s ease-out;
            cursor: pointer;
            will-change: transform, top, left;
        }

        .tile.selected {
            transform: scale(1.18);
            filter: drop-shadow(0 0 15px #ffe600) drop-shadow(0 8px 12px rgba(0,0,0,0.5));
            z-index: 30;
        }

        .tile-3d-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
            overflow: visible;
        }

        .tile.pop {
            animation: popAnim 0.35s ease-out forwards;
        }

        @keyframes popAnim {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3) rotate(10deg); opacity: 0.9; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Floating Score Particle */
        .score-float {
            position: absolute;
            font-family: 'Jua', sans-serif;
            font-weight: bold;
            color: #ffe600;
            text-shadow: 0 2px 6px rgba(0,0,0,0.9), 0 0 10px #ff3366;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 50;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            50% { opacity: 1; transform: translateY(-30px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-60px) scale(1); }
        }

        /* Fever FX Background */
        .fever-active {
            animation: feverGlow 0.5s infinite alternate ease-in-out;
        }

        @keyframes feverGlow {
            from { box-shadow: 0 0 15px #ff2a6d, inset 0 0 20px #ff2a6d; }
            to { box-shadow: 0 0 35px #ffe600, inset 0 0 40px #ffe600; }
        }

        /* Progress Bars */
        .progress-gloss {
            background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 100%);
        }

        /* Fire effect canvas behind bomb */
        #fxCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 40;
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-2 sm:p-4 select-none">

    <script>
        /* SOUND SYNTHESIZER USING WEB AUDIO API */
        class SoundEngine {
            constructor() {
                this.ctx = null;
                this.enabled = true;
            }

            init() {
                if (!this.ctx) {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (AudioCtx) {
                        this.ctx = new AudioCtx();
                    }
                }
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            playTone(freq, type = 'sine', duration = 0.1, gainVal = 0.1, freqEnd = null) {
                if (!this.enabled || !this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();

                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    if (freqEnd !== null) {
                        osc.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), this.ctx.currentTime + duration);
                    }

                    gain.gain.setValueAtTime(gainVal, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);

                    osc.connect(gain);
                    gain.connect(this.ctx.destination);

                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                } catch (e) {}
            }

            playSwap() {
                this.playTone(350, 'sine', 0.08, 0.1, 500);
            }

            playPop(multiplier = 1) {
                const baseFreq = Math.min(1200, 400 * multiplier);
                this.playTone(baseFreq, 'triangle', 0.12, 0.2, baseFreq * 1.5);
            }

            playBomb() {
                if (!this.enabled || !this.ctx) return;
                try {
                    const bufferSize = this.ctx.sampleRate * 0.4;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }

                    const noise = this.ctx.createBufferSource();
                    noise.buffer = buffer;

                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(800, this.ctx.currentTime);
                    filter.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.4);

                    const gain = this.ctx.createGain();
                    gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);

                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.ctx.destination);

                    noise.start();
                } catch (e) {}
            }

            playFever() {
                if (!this.enabled || !this.ctx) return;
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, idx) => {
                    setTimeout(() => {
                        this.playTone(freq, 'sine', 0.15, 0.2, freq * 1.2);
                    }, idx * 60);
                });
            }
        }

            {

                    <path d="M50 22 Q58 8 68 12" stroke="#ff9f43" stroke-width="5" fill="none" stroke-linecap="round"/>

                    <path d="M38 68 Q50 60 62 68" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" fill="none"/>
                </svg>` 
            }
        ];

        /* GAME STATE VARIABLES */
        const GRID_SIZE = 7;
        let board = [];
        let score = 0;
        let comboCount = 0;
        let maxCombo = 0;
        let timeLeft = 60;
        let timerInterval = null;
        let isPlaying = false;
        let isPaused = false;
        let isProcessing = false;
        let selectedTile = null; // {r, c}
        let bombGauge = 0; // 0 to 100
        let feverGauge = 0; // 0 to 100
        let isFeverMode = false;
        let feverTimer = null;
        let soundEngine = new SoundEngine();

        const boardContainer = document.getElementById('boardContainer');
        const scoreText = document.getElementById('scoreText');
        const timerBar = document.getElementById('timerBar');
        const timerText = document.getElementById('timerText');
        const bombBar = document.getElementById('bombBar');
        const bombBadge = document.getElementById('bombBadge');
        const bombReadyRing = document.getElementById('bombReadyRing');
        const feverBar = document.getElementById('feverBar');
        const feverBanner = document.getElementById('feverBanner');
        const comboOverlay = document.getElementById('comboOverlay');
        const comboText = document.getElementById('comboText');

        // Modals
        const startModal = document.getElementById('startModal');
        const gameOverModal = document.getElementById('gameOverModal');
        const pauseModal = document.getElementById('pauseModal');

        // Buttons
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('resumeBtn').addEventListener('click', togglePause);
        document.getElementById('quitBtn').addEventListener('click', () => {
            pauseModal.classList.add('hidden');
            startModal.classList.remove('hidden');
            isPlaying = false;
            clearInterval(timerInterval);
        });

        document.getElementById('soundToggle').addEventListener('click', (e) => {
            soundEngine.enabled = !soundEngine.enabled;
            e.target.innerText = soundEngine.enabled ? '🔊 SOUND ON' : '🔇 SOUND OFF';
        });

        bombBadge.addEventListener('click', triggerBombSkill);

        /* BOARD SETUP */
        function createBoardGrid() {
            boardContainer.innerHTML = '';
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'board-cell w-full h-full relative';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    boardContainer.appendChild(cell);
                }
            }
        }

        function initBoardLogic() {
            board = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                board[r] = [];
                for (let c = 0; c < GRID_SIZE; c++) {
                    let animalId;
                    do {
                        animalId = Math.floor(Math.random() * (ANIMAL_TYPES.length - 1)); // exclude bomb initially
                    } while (
                        (r >= 2 && board[r-1][c] === animalId && board[r-2][c] === animalId) ||
                        (c >= 2 && board[r][c-1] === animalId && board[r][c-2] === animalId)
                    );
                    board[r][c] = animalId;
                }
            }
            renderBoard();
        }

        function renderBoard() {
            // Remove existing tile elements
            document.querySelectorAll('.tile').forEach(el => el.remove());

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const animalId = board[r][c];
                    if (animalId === null) continue;

                    const tile = document.createElement('div');
                    tile.className = 'tile absolute flex items-center justify-center p-1 cursor-pointer';
                    tile.style.width = `calc(100% / ${GRID_SIZE})`;
                    tile.style.height = `calc(100% / ${GRID_SIZE})`;
                    tile.style.top = `${(r / GRID_SIZE) * 100}%`;
                    tile.style.left = `${(c / GRID_SIZE) * 100}%`;
                    tile.dataset.row = r;
                    tile.dataset.col = c;
                    tile.id = `tile-${r}-${c}`;

                    const animal = ANIMAL_TYPES[animalId];
                    tile.innerHTML = `<div class="tile-3d-wrapper">${animal.svg}</div>`;

                    // Touch & Click Event Listeners
                    tile.addEventListener('click', () => handleTileClick(r, c));

                    boardContainer.appendChild(tile);
                }
            }
        }

        function handleTileClick(r, c) {
            if (!isPlaying || isPaused || isProcessing) return;
            soundEngine.init();

            if (!selectedTile) {
                selectedTile = { r, c };
                highlightTile(r, c, true);
                soundEngine.playSwap();
            } else {
                const prev = selectedTile;
                highlightTile(prev.r, prev.c, false);
                selectedTile = null;

                // Check if adjacent
                const isAdjacent = (Math.abs(prev.r - r) + Math.abs(prev.c - c)) === 1;

                if (isAdjacent) {
                    swapTiles(prev.r, prev.c, r, c);
                } else {
                    selectedTile = { r, c };
                    highlightTile(r, c, true);
                    soundEngine.playSwap();
                }
            }
        }

        function highlightTile(r, c, enable) {
            const el = document.getElementById(`tile-${r}-${c}`);
            if (el) {
                if (enable) el.classList.add('selected');
                else el.classList.remove('selected');
            }
        }

        async function swapTiles(r1, c1, r2, c2) {
            isProcessing = true;

            // Swap values in matrix
            const temp = board[r1][c1];
            board[r1][c1] = board[r2][c2];
            board[r2][c2] = temp;

            renderBoard();
            soundEngine.playSwap();

            await new Promise(res => setTimeout(res, 230));

            // Check if match happens
            const matches = findMatches();
            if (matches.length > 0) {
                comboCount = 0;
                await processMatches(matches);
            } else {
                // Revert swap if no match
                const temp2 = board[r1][c1];
                board[r1][c1] = board[r2][c2];
                board[r2][c2] = temp2;
                renderBoard();
                isProcessing = false;
            }
        }

        function findMatches() {
            const matchedCoords = new Set();

            // Horizontal Matches
            for (let r = 0; r < GRID_SIZE; r++) {
                let matchLen = 1;
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (c < GRID_SIZE - 1 && board[r][c] !== null && board[r][c] === board[r][c+1]) {
                        matchLen++;
                    } else {
                        if (matchLen >= 3) {
                            for (let k = 0; k < matchLen; k++) {
                                matchedCoords.add(`${r},${c - k}`);
                            }
                        }
                        matchLen = 1;
                    }
                }
            }

            // Vertical Matches
            for (let c = 0; c < GRID_SIZE; c++) {
                let matchLen = 1;
                for (let r = 0; r < GRID_SIZE; r++) {
                    if (r < GRID_SIZE - 1 && board[r][c] !== null && board[r][c] === board[r+1][c]) {
                        matchLen++;
                    } else {
                        if (matchLen >= 3) {
                            for (let k = 0; k < matchLen; k++) {
                                matchedCoords.add(`${r - k},${c}`);
                            }
                        }
                        matchLen = 1;
                    }
                }
            }

            return Array.from(matchedCoords).map(str => {
                const [r, c] = str.split(',').map(Number);
                return { r, c };
            });
        }

        async function processMatches(matches) {
            comboCount++;
            if (comboCount > maxCombo) maxCombo = comboCount;

            // Score calculation
            const baseScore = matches.length * 100;
            const comboMultiplier = isFeverMode ? comboCount * 2.5 : comboCount;
            const earnedScore = Math.floor(baseScore * comboMultiplier);
            score += earnedScore;
            scoreText.innerText = score.toLocaleString();

            // Update Gauges
            updateBombGauge(matches.length * 5);
            updateFeverGauge(matches.length * 6);

            // Audio & Visual Effects
            soundEngine.playPop(1 + (comboCount * 0.12));
            showComboEffect(comboCount);

            // Trigger Pop Animations
            matches.forEach(({ r, c }) => {
                const el = document.getElementById(`tile-${r}-${c}`);
                if (el) {
                    el.classList.add('pop');
                    spawnScoreParticle(el, `+${earnedScore}`);
                    spawnSparkles(el);
                }
                board[r][c] = null;
            });

            await new Promise(res => setTimeout(res, 320));

            // Cascade Drop
            await dropTiles();

            // Refill New Tiles
            await refillBoard();

            // Recursive Match Check
            const nextMatches = findMatches();
            if (nextMatches.length > 0) {
                await processMatches(nextMatches);
            } else {
                isProcessing = false;
            }
        }

        async function dropTiles() {
            for (let c = 0; c < GRID_SIZE; c++) {
                let emptyRow = GRID_SIZE - 1;
                for (let r = GRID_SIZE - 1; r >= 0; r--) {
                    if (board[r][c] !== null) {
                        if (r !== emptyRow) {
                            board[emptyRow][c] = board[r][c];
                            board[r][c] = null;
                        }
                        emptyRow--;
                    }
                }
            }
            renderBoard();
            await new Promise(res => setTimeout(res, 200));
        }

        async function refillBoard() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (board[r][c] === null) {
                        board[r][c] = Math.floor(Math.random() * (ANIMAL_TYPES.length - 1));
                    }
                }
            }
            renderBoard();
            await new Promise(res => setTimeout(res, 200));
        }

        function updateBombGauge(amount) {
            bombGauge = Math.min(100, bombGauge + amount);
            bombBar.style.width = `${bombGauge}%`;
            if (bombGauge >= 100) {
                bombReadyRing.classList.remove('hidden');
                bombBadge.classList.add('animate-bounce');
            }
        }

        function triggerBombSkill() {
            if (!isPlaying || isPaused || isProcessing || bombGauge < 100) return;

            bombGauge = 0;
            bombBar.style.width = `0%`;
            bombReadyRing.classList.add('hidden');
            bombBadge.classList.remove('animate-bounce');

            soundEngine.playBomb();

            // Clear center 3x3 or random cross
            const centerR = 3, centerC = 3;
            const bombTargets = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (r === centerR || c === centerC) {
                        bombTargets.push({ r, c });
                    }
                }
            }

            // Launch fiery particle wave
            createFireballWave();
            processMatches(bombTargets);
        }

        function updateFeverGauge(amount) {
            if (isFeverMode) return;
            feverGauge = Math.min(100, feverGauge + amount);
            feverBar.style.width = `${feverGauge}%`;

            if (feverGauge >= 100) {
                activateFeverMode();
            }
        }

        function activateFeverMode() {
            isFeverMode = true;
            soundEngine.playFever();
            feverBanner.classList.add('fever-active');
            
            showComboEffect('FEVER TIME!');

            let duration = 6; // 6 seconds fever
            feverTimer = setInterval(() => {
                duration--;
                feverBar.style.width = `${(duration / 6) * 100}%`;
                if (duration <= 0) {
                    clearInterval(feverTimer);
                    isFeverMode = false;
                    feverGauge = 0;
                    feverBanner.classList.remove('fever-active');
                }
            }, 1000);
        }

        /* COMBO OVERLAY & PARTICLES */
        function showComboEffect(combo) {
            if (typeof combo === 'number' && combo <= 1) return;

            comboText.innerText = typeof combo === 'number' ? `COMBO x${combo}!` : combo;
            comboOverlay.style.opacity = '1';
            comboOverlay.style.transform = 'scale(1.2)';

            setTimeout(() => {
                comboOverlay.style.opacity = '0';
                comboOverlay.style.transform = 'scale(0.8)';
            }, 700);
        }

        function spawnScoreParticle(element, text) {
            const rect = element.getBoundingClientRect();
            const p = document.createElement('div');
            p.className = 'score-float';
            p.innerText = text;
            p.style.left = `${rect.left + rect.width / 4}px`;
            p.style.top = `${rect.top}px`;
            document.body.appendChild(p);

            setTimeout(() => p.remove(), 800);
        }

        const canvas = document.getElementById('fxCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function spawnSparkles(tileEl) {
            const rect = tileEl.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: centerX,
                    y: centerY,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    size: Math.random() * 6 + 3,
                    color: ['#FFE600', '#FF2A6D', '#00D2FC', '#8CE600'][Math.floor(Math.random() * 4)],
                    life: 1.0
                });
            }
        }

        function createFireballWave() {
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 16,
                    vy: (Math.random() - 0.5) * 16,
                    size: Math.random() * 12 + 4,
                    color: '#FF5722',
                    life: 1.2
                });
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;

                ctx.save();
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        function startGame() {
            soundEngine.init();
            score = 0;
            comboCount = 0;
            maxCombo = 0;
            timeLeft = 60;
            bombGauge = 0;
            feverGauge = 0;
            isFeverMode = false;

            scoreText.innerText = '0';
            timerText.innerText = '60';
            timerBar.style.width = '100%';
            bombBar.style.width = '0%';
            feverBar.style.width = '0%';

            startModal.classList.add('hidden');
            gameOverModal.classList.add('hidden');
            pauseModal.classList.add('hidden');

            isPlaying = true;
            isPaused = false;
            isProcessing = false;

            createBoardGrid();
            initBoardLogic();

            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (!isPlaying || isPaused) return;

            timeLeft--;
            timerText.innerText = timeLeft;
            timerBar.style.width = `${(timeLeft / 60) * 100}%`;

            if (timeLeft <= 10) {
                timerBar.style.background = 'linear-gradient(180deg, #ff4e50 0%, #f9d423 100%)';
            }

            if (timeLeft <= 0) {
                endGame();
            }
        }

        function togglePause() {
            if (!isPlaying) return;
            isPaused = !isPaused;

            if (isPaused) {
                pauseModal.classList.remove('hidden');
            } else {
                pauseModal.classList.add('hidden');
            }
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            if (feverTimer) clearInterval(feverTimer);

            // Save high score
            const highScore = localStorage.getItem('anipang_high_score') || 0;
            if (score > highScore) {
                localStorage.setItem('anipang_high_score', score);
            }

            document.getElementById('finalScore').innerText = score.toLocaleString();
            document.getElementById('finalCombo').innerText = `${maxCombo} x`;
            document.getElementById('highScoreText').innerText = Math.max(score, highScore).toLocaleString();

            gameOverModal.classList.remove('hidden');
        }

        window.onload = function() {
            createBoardGrid();
        };
    </script>
