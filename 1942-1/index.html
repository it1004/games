<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1942 - 레트로 아케이드 슈팅</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Retro Press Start 2P & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c0f1d;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .font-retro {
            font-family: 'Press Start 2P', cursive;
        }
        /* 네온 글로우 효과 */
        .neon-text-red {
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.8), 0 0 20px rgba(239, 68, 68, 0.4);
        }
        .neon-text-blue {
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.8), 0 0 20px rgba(59, 130, 246, 0.4);
        }
        /* 아케이드 캐비닛 베젤 느낌 */
        .arcade-frame {
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.9), 0 0 30px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white p-2">

<!-- 메인 콘솔 컨테이너 (PC 화면 크기를 대폭 키우기 위해 max-w-lg에서 md:max-w-2xl, lg:max-w-3xl로 반응형 확장) -->
<div class="relative w-full max-w-md md:max-w-2xl lg:max-w-3xl aspect-[3/4] bg-gray-950 rounded-2xl overflow-hidden border-4 border-gray-800 flex flex-col arcade-frame">
    
    <!-- 캔버스 영역 -->
    <canvas id="gameCanvas" class="absolute inset-0 w-full h-full block bg-[#03030c]"></canvas>

    <!-- 시작 스크린 오버레이 -->
    <div id="startScreen" class="absolute inset-0 flex flex-col justify-between p-6 bg-black/85 z-10 transition-opacity duration-300">
        <div class="flex justify-between items-center mt-2">
            <div></div>
            <!-- 시작 화면 사운드 토글 -->
            <button id="startSoundToggle" class="p-2 rounded-lg bg-gray-900/85 border border-gray-700/60 text-yellow-400 active:scale-95 transition pointer-events-auto flex items-center gap-1.5 text-[11px] font-bold">
                <span id="startSoundIcon">🔊</span>
                <span id="startSoundText">SOUND ON</span>
            </button>
        </div>

        <div class="text-center mt-4">
            <h2 class="text-gray-400 font-bold tracking-widest text-sm mb-2">PACIFIC THEATER</h2>
            <h1 class="text-5xl md:text-6xl lg:text-7xl font-black font-retro tracking-tighter text-red-500 neon-text-red">1942</h1>
            <p class="text-xs text-blue-400 font-semibold mt-2 tracking-wider">RETRO SHOOT 'EM UP</p>
        </div>

        <div class="flex flex-col items-center gap-4 my-auto">
            <div class="bg-gray-900/80 p-4 rounded-xl border border-gray-800 text-center w-full max-w-xs backdrop-blur-sm">
                <span class="text-[10px] text-gray-400 block mb-1">HIGH SCORE</span>
                <span id="bestScoreText" class="text-xl font-retro text-yellow-400">000,000</span>
            </div>

            <!-- 플레이 가이드 (PC / MOBILE) -->
            <div class="text-left text-xs text-gray-400 space-y-2 max-w-xs bg-black/40 p-4 rounded-lg border border-gray-900/60 w-full">
                <p class="font-bold text-gray-300 border-b border-gray-800 pb-1 mb-2">🎮 조작법 안내</p>
                <p class="flex justify-between"><span>키보드 이동:</span> <span class="text-blue-400 font-semibold">W A S D / 방향키</span></p>
                <p class="flex justify-between"><span>기본 사격:</span> <span class="text-blue-400 font-semibold">SPACE / 자동발사</span></p>
                <p class="flex justify-between"><span>루프 회피:</span> <span class="text-red-400 font-semibold">C 또는 V / 터치버튼</span></p>
                <p class="flex justify-between"><span>모바일 터치:</span> <span class="text-green-400 font-semibold">드래그 이동 & 자동사격</span></p>
            </div>
        </div>

        <div class="text-center mb-8 space-y-4">
            <button id="startButton" class="w-full max-w-xs py-4 bg-gradient-to-r from-red-600 to-amber-600 hover:from-red-500 hover:to-amber-500 active:scale-95 text-white font-retro text-lg rounded-xl shadow-lg border-b-4 border-red-800 transition transform duration-100 uppercase tracking-wider">
                Game Start
            </button>
            <p class="text-[9px] text-gray-500 animate-pulse">PRESS ENTER TO START</p>
        </div>
    </div>

    <!-- 인게임 HUD 오버레이 -->
    <div id="gameHUD" class="absolute top-0 left-0 right-0 p-4 flex justify-between items-start pointer-events-none z-5 select-none hidden">
        <!-- 스코어 & 회수 -->
        <div class="flex flex-col gap-1">
            <div class="bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-lg border border-white/10 flex items-center gap-2">
                <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Score</span>
                <span id="scoreVal" class="font-retro text-sm text-yellow-400">000,000</span>
            </div>
            <div class="flex gap-1.5 mt-1">
                <!-- 루프 회피 개수 -->
                <div class="bg-black/40 backdrop-blur-md px-2 py-1 rounded-md border border-white/10 flex items-center gap-1">
                    <span class="text-[9px] text-red-400 font-bold">LOOP:</span>
                    <span id="loopCountVal" class="text-xs font-bold text-red-500">3</span>
                </div>
                <!-- 스테이지 표시 -->
                <div class="bg-black/40 backdrop-blur-md px-2 py-1 rounded-md border border-white/10 flex items-center">
                    <span id="stageLabel" class="text-[9px] text-green-400 font-bold tracking-wider">STAGE 1</span>
                </div>
            </div>
        </div>

        <!-- 체력 바 및 라이프 -->
        <div class="flex flex-col items-end gap-1">
            <div class="flex gap-2 items-center pointer-events-auto">
                <!-- HUD 내 전용 사운드 토글 -->
                <button id="hudSoundToggle" class="p-1.5 rounded-lg bg-black/60 border border-white/10 text-yellow-400 active:scale-95 transition hover:bg-black/85">
                    <span id="hudSoundIcon">🔊</span>
                </button>
                <div class="bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-lg border border-white/10 flex items-center gap-2">
                    <span class="text-[10px] text-gray-400 font-bold uppercase">ARMOR</span>
                    <div class="w-24 h-3 bg-gray-800 rounded-full overflow-hidden border border-black p-0.5">
                        <div id="healthBar" class="h-full bg-gradient-to-r from-red-500 to-green-500 rounded-full transition-all duration-150" style="width: 100%;"></div>
                    </div>
                </div>
            </div>
            <!-- 소유 생명 개수 -->
            <div id="livesContainer" class="flex gap-1 mt-1"></div>
        </div>
    </div>

    <!-- 모바일 전용 조작 버튼 영역 -->
    <div id="mobileControls" class="absolute bottom-6 right-6 left-6 flex justify-between items-center pointer-events-none z-10 hidden">
        <div></div>
        <!-- 회피 버튼 -->
        <button id="mobileLoopBtn" class="w-16 h-16 rounded-full bg-red-600/40 border-2 border-red-500/80 active:bg-red-500/80 active:scale-95 text-white font-bold text-sm pointer-events-auto flex items-center justify-center shadow-lg backdrop-blur-sm select-none">
            LOOP
        </button>
    </div>

    <!-- 게임오버 / 결과 오버레이 -->
    <div id="gameOverScreen" class="absolute inset-0 flex flex-col justify-center items-center p-6 bg-black/90 z-10 transition-opacity duration-300 hidden">
        <h2 id="resultTitle" class="text-4xl font-retro text-red-500 mb-2 tracking-wide neon-text-red">GAME OVER</h2>
        <p id="resultSub" class="text-xs text-gray-400 mb-8 font-semibold uppercase tracking-widest">MISSION FAILED</p>
        
        <div class="w-full max-w-xs space-y-3 bg-gray-900/60 p-5 rounded-xl border border-gray-800 mb-8 backdrop-blur-sm text-center">
            <div class="flex justify-between text-sm border-b border-gray-800 pb-2">
                <span class="text-gray-400">최종 점수:</span>
                <span id="finalScore" class="font-retro text-yellow-400">0</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-gray-400">격추한 적:</span>
                <span id="finalKills" class="font-semibold text-blue-400">0</span>
            </div>
        </div>

        <button id="restartButton" class="w-full max-w-xs py-4 bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 active:scale-95 text-white font-retro text-md rounded-xl shadow-lg border-b-4 border-blue-800 transition transform duration-100 uppercase tracking-wider">
            RETRY MISSION
        </button>
    </div>

    <!-- 스테이지 클리어 인트로 배너 -->
    <div id="stageBanner" class="absolute top-1/3 left-0 right-0 flex flex-col items-center justify-center py-6 bg-black/80 border-y-2 border-yellow-500/80 pointer-events-none z-20 scale-0 transition-transform duration-500 select-none">
        <h3 id="bannerTitle" class="text-2xl md:text-3xl font-retro text-yellow-400 uppercase tracking-widest">STAGE 1</h3>
        <p id="bannerSub" class="text-xs text-gray-300 mt-2 tracking-wide">MIDWAY ISLANDS</p>
    </div>

</div>

<script>
// Web Audio API를 이용한 복고풍 아케이드 사운드 합성 엔진 (이전 버전에서 소외된 재생 함수들을 100% 원상 복구)
const AudioEngine = {
    ctx: null,
    muted: localStorage.getItem('1942_muted') === 'true', // 로컬스토리지 기반 뮤트 상태 로드

    init() {
        if (!AudioEngine.ctx) {
            AudioEngine.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (AudioEngine.ctx && AudioEngine.ctx.state === 'suspended') {
            AudioEngine.ctx.resume();
        }
    },

    toggleMute() {
        AudioEngine.init(); // 상호작용 시 컨텍스트 초기화 유도
        AudioEngine.muted = !AudioEngine.muted;
        localStorage.setItem('1942_muted', AudioEngine.muted ? 'true' : 'false');
        AudioEngine.updateButtons();
        
        // 음소거 해제 시 컨텍스트가 정지되어 있다면 안전하게 재개
        if (!AudioEngine.muted && AudioEngine.ctx && AudioEngine.ctx.state === 'suspended') {
            AudioEngine.ctx.resume();
        }
    },

    updateButtons() {
        const startIcon = document.getElementById('startSoundIcon');
        const startText = document.getElementById('startSoundText');
        const startToggleBtn = document.getElementById('startSoundToggle');
        const hudIcon = document.getElementById('hudSoundIcon');

        const icon = AudioEngine.muted ? '🔇' : '🔊';
        const text = AudioEngine.muted ? 'SOUND OFF' : 'SOUND ON';
        const colorClass = AudioEngine.muted ? 'text-gray-400' : 'text-yellow-400';

        if (startIcon) startIcon.innerText = icon;
        if (startText) startText.innerText = text;
        if (startToggleBtn) {
            startToggleBtn.classList.remove('text-yellow-400', 'text-gray-400');
            startToggleBtn.classList.add(colorClass);
        }
        if (hudIcon) hudIcon.innerText = icon;
    },

    // 레이저 발사음
    playShoot() {
        if (AudioEngine.muted) return;
        AudioEngine.init();
        if (!AudioEngine.ctx) return;
        const now = AudioEngine.ctx.currentTime;
        const osc = AudioEngine.ctx.createOscillator();
        const gain = AudioEngine.ctx.createGain();

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.12);

        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);

        osc.connect(gain);
        gain.connect(AudioEngine.ctx.destination);

        osc.start(now);
        osc.stop(now + 0.13);
    },

    // 소형 적 폭발음
    playExplodeSmall() {
        if (AudioEngine.muted) return;
        AudioEngine.init();
        if (!AudioEngine.ctx) return;
        const now = AudioEngine.ctx.currentTime;
        const osc = AudioEngine.ctx.createOscillator();
        const gain = AudioEngine.ctx.createGain();

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(180, now);
        osc.frequency.exponentialRampToValueAtTime(30, now + 0.25);

        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);

        const filter = AudioEngine.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(400, now);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(AudioEngine.ctx.destination);

        osc.start(now);
        osc.stop(now + 0.26);
    },

    // 대형 폭격기/보스 파괴음
    playExplodeLarge() {
        if (AudioEngine.muted) return;
        AudioEngine.init();
        if (!AudioEngine.ctx) return;
        const now = AudioEngine.ctx.currentTime;
        
        const osc = AudioEngine.ctx.createOscillator();
        const gain = AudioEngine.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(90, now);
        osc.frequency.linearRampToValueAtTime(10, now + 0.6);
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
        
        const filter = AudioEngine.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(150, now);
        
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(AudioEngine.ctx.destination);
        
        osc.start(now);
        osc.stop(now + 0.65);
    },

    // 플레이어 피격음
    playPlayerHit() {
        if (AudioEngine.muted) return;
        AudioEngine.init();
        if (!AudioEngine.ctx) return;
        const now = AudioEngine.ctx.currentTime;
        const osc = AudioEngine.ctx.createOscillator();
        const gain = AudioEngine.ctx.createGain();

        osc.type = 'square';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.setValueAtTime(110, now + 0.08);

        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.16);

        osc.connect(gain);
        gain.connect(AudioEngine.ctx.destination);

        osc.start(now);
        osc.stop(now + 0.18);
    },

    // 아이템 파워업 획득음
    playPowerup() {
        if (AudioEngine.muted) return;
        AudioEngine.init();
        if (!AudioEngine.ctx) return;
        const now = AudioEngine.ctx.currentTime;
        
        const notes = [261.63, 329.63, 392.00, 523.25, 659.25];
        notes.forEach((freq, idx) => {
            const osc = AudioEngine.ctx.createOscillator();
            const gain = AudioEngine.ctx.createGain();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, now + idx * 0.06);
            
            gain.gain.setValueAtTime(0.12, now + idx * 0.06);
            gain.gain.exponentialRampToValueAtTime(0.005, now + idx * 0.06 + 0.12);
            
            osc.connect(gain);
            gain.connect(AudioEngine.ctx.destination);
            
            osc.start(now + idx * 0.06);
            osc.stop(now + idx * 0.06 + 0.15);
        });
    },

    // 플레이어 360 회전 루프 사운드
    playLoopEvade() {
        if (AudioEngine.muted) return;
        AudioEngine.init();
        if (!AudioEngine.ctx) return;
        const now = AudioEngine.ctx.currentTime;
        const osc = AudioEngine.ctx.createOscillator();
        const gain = AudioEngine.ctx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(900, now + 0.3);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.8);

        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);

        osc.connect(gain);
        gain.connect(AudioEngine.ctx.destination);

        osc.start(now);
        osc.stop(now + 0.82);
    }
};

// 최초 동기화 및 바인딩
AudioEngine.updateButtons();

// 첫 상호작용 발생 시 AudioContext를 부드럽게 초기화시키는 범용 리스너 등록 (자동 재생 무력화 우회)
function resumeAudioOnGesture() {
    AudioEngine.init();
    window.removeEventListener('click', resumeAudioOnGesture);
    window.removeEventListener('keydown', resumeAudioOnGesture);
    window.removeEventListener('touchstart', resumeAudioOnGesture);
}
window.addEventListener('click', resumeAudioOnGesture);
window.addEventListener('keydown', resumeAudioOnGesture);
window.addEventListener('touchstart', resumeAudioOnGesture);

// 이벤트 리스너 바인딩 (사운드 토글이 확실하게 동작하도록 제한 및 클릭 시 포커스 해제)
document.getElementById('startSoundToggle').addEventListener('click', (e) => {
    e.stopPropagation();
    e.currentTarget.blur(); // 스페이스바 간섭 차단
    AudioEngine.toggleMute();
});
document.getElementById('hudSoundToggle').addEventListener('click', (e) => {
    e.stopPropagation();
    e.currentTarget.blur(); // 스페이스바 간섭 차단
    AudioEngine.toggleMute();
});
document.getElementById('startButton').addEventListener('click', (e) => {
    e.currentTarget.blur(); // 스페이스바 간섭 차단
});
document.getElementById('restartButton').addEventListener('click', (e) => {
    e.currentTarget.blur(); // 스페이스바 간섭 차단
});
document.getElementById('mobileLoopBtn').addEventListener('click', (e) => {
    e.currentTarget.blur(); // 스페이스바 간섭 차단
});

// 게임 전체 상태 및 프레임 조절
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 게임 가상 해상도 설정
const GAME_WIDTH = 600;
const GAME_HEIGHT = 800;

let scaleX = 1;
let scaleY = 1;

// 해상도 조절용 견고화된 캔버스 스케일링 기법
function resizeCanvas() {
    const parent = canvas.parentElement;
    if (!parent) return;
    
    const rect = parent.getBoundingClientRect();
    let w = rect.width;
    let h = rect.height;
    
    if (w === 0 || h === 0) {
        w = parent.clientWidth || window.innerWidth;
        h = parent.clientHeight || window.innerHeight;
        if (h === 0) h = w * (4 / 3);
    }
    
    canvas.width = w;
    canvas.height = h;
    scaleX = w / GAME_WIDTH;
    scaleY = h / GAME_HEIGHT;
}

window.addEventListener('resize', resizeCanvas);
window.addEventListener('DOMContentLoaded', resizeCanvas);
window.addEventListener('load', resizeCanvas);
resizeCanvas();

// 게임 상태 변수
let gameState = 'START';
let score = 0;
let highScore = parseInt(localStorage.getItem('1942_highscore') || '0', 10);
let killCount = 0;
let currentStage = 1;
let stageProgress = 0;

// 총 10개 스테이지
const STAGE_DATA = {
    1: { name: "MIDWAY ISLANDS", duration: 1500, bossHp: 120, spawnRate: 1.0 },
    2: { name: "CORAL SEA", duration: 1600, bossHp: 200, spawnRate: 1.15 },
    3: { name: "OKINAWA BEACH", duration: 1700, bossHp: 300, spawnRate: 1.3 },
    4: { name: "IWO JIMA FORTRESS", duration: 1800, bossHp: 420, spawnRate: 1.45 },
    5: { name: "TOKYO GULF EX", duration: 1900, bossHp: 560, spawnRate: 1.6 },
    6: { name: "ORBITAL NEBULA", duration: 2000, bossHp: 720, spawnRate: 1.75 },
    7: { name: "STRATOSPHERE ESCAPE", duration: 2100, bossHp: 900, spawnRate: 1.9 },
    8: { name: "ASTEROID BELT", duration: 2200, bossHp: 1100, spawnRate: 2.05 },
    9: { name: "NEBULA GATE", duration: 2300, bossHp: 1350, spawnRate: 2.2 },
    10: { name: "THE FINAL FRONTIER", duration: 2600, bossHp: 1650, spawnRate: 2.4 }
};

document.getElementById('bestScoreText').innerText = highScore.toLocaleString();

// 입력 상태 트래킹
const keys = {};
window.addEventListener('keydown', (e) => {
    // 스페이스바가 눌렸을 때 화면 스크롤 및 포커스된 버튼 클릭 동작 방지 (가장 중요)
    if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
    }

    keys[e.key] = true;
    keys[e.code] = true;
    
    if ((e.key === 'Enter' || e.code === 'Enter') && gameState === 'START') {
        startGame();
    }
    if ((e.key === 'Enter' || e.code === 'Enter') && gameState === 'GAMEOVER') {
        startGame();
    }
    if ((e.key === 'c' || e.key === 'v' || e.key === 'C' || e.key === 'V') && gameState === 'PLAYING') {
        player.triggerLoop();
    }
});
window.addEventListener('keyup', (e) => {
    if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
    }
    keys[e.key] = false;
    keys[e.code] = false;
});

// 모바일 터치 상태 트래킹
let touchActive = false;
let lastTouchX = 0;
let lastTouchY = 0;

canvas.addEventListener('touchstart', (e) => {
    if (gameState !== 'PLAYING') return;
    touchActive = true;
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    lastTouchX = (touch.clientX - rect.left) / scaleX;
    lastTouchY = (touch.clientY - rect.top) / scaleY;
    AudioEngine.init();
});

canvas.addEventListener('touchmove', (e) => {
    if (!touchActive || gameState !== 'PLAYING') return;
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const currentX = (touch.clientX - rect.left) / scaleX;
    const currentY = (touch.clientY - rect.top) / scaleY;

    const dx = currentX - lastTouchX;
    const dy = currentY - lastTouchY;

    player.x += dx;
    player.y += dy;

    if (player.x < player.r) player.x = player.r;
    if (player.x > GAME_WIDTH - player.r) player.x = GAME_WIDTH - player.r;
    if (player.y < player.r) player.y = player.r;
    if (player.y > GAME_HEIGHT - player.r) player.y = GAME_HEIGHT - player.r;

    lastTouchX = currentX;
    lastTouchY = currentY;
    e.preventDefault();
}, { passive: false });

});

// 1. 플레이어 클래스
class Player {
    constructor() {
        this.x = GAME_WIDTH / 2;
        this.y = GAME_HEIGHT * 0.8;
        this.r = 20;
        this.speed = 5.5;
        this.hp = 100;
        this.maxHp = 100;
        this.lives = 3;
        this.loopsLeft = 3;
        
        this.weaponLevel = 1;
        this.shield = 0;
        
        this.isLooping = false;
        this.loopProgress = 0;
        this.loopDuration = 55;
        this.shootCooldown = 0;
        
        this.propellerAngle = 0;
        this.invincibleTimer = 0;
    }

    update() {
        this.propellerAngle += 0.5;

        if (this.invincibleTimer > 0) this.invincibleTimer--;
        if (this.shootCooldown > 0) this.shootCooldown--;

        if (this.isLooping) {
            this.loopProgress += 1 / this.loopDuration;
            if (this.loopProgress >= 1) {
                this.isLooping = false;
                this.loopProgress = 0;
            }
            return;
        }

        let dx = 0;
        let dy = 0;
        if (keys['w'] || keys['ArrowUp'] || keys['KeyW']) dy -= 1;
        if (keys['s'] || keys['ArrowDown'] || keys['KeyS']) dy += 1;
        if (keys['a'] || keys['ArrowLeft'] || keys['KeyA']) dx -= 1;
        if (keys['d'] || keys['ArrowRight'] || keys['KeyD']) dx += 1;

        if (dx !== 0 && dy !== 0) {
            const length = Math.sqrt(dx*dx + dy*dy);
            dx /= length;
            dy /= length;
        }

        this.x += dx * this.speed;
        this.y += dy * this.speed;

        if (this.x < this.r) this.x = this.r;
        if (this.x > GAME_WIDTH - this.r) this.x = GAME_WIDTH - this.r;
        if (this.y < this.r) this.y = this.r;
        if (this.y > GAME_HEIGHT - this.r) this.y = GAME_HEIGHT - this.r;

        if (keys[' '] || keys['Space'] || touchActive) {
            this.shoot();
        }
    }

    triggerLoop() {
        if (this.isLooping || this.loopsLeft <= 0) return;
        this.isLooping = true;
        this.loopProgress = 0;
        this.loopsLeft--;
        document.getElementById('loopCountVal').innerText = this.loopsLeft;
        AudioEngine.playLoopEvade();
    }

    shoot() {
        if (this.shootCooldown > 0) return;
        
        AudioEngine.playShoot();

        const baseDmg = 15;
        if (this.weaponLevel === 1) {
            bullets.push(new Bullet(this.x, this.y - 15, 0, -12, baseDmg));
            this.shootCooldown = 9;
        } else if (this.weaponLevel === 2) {
            bullets.push(new Bullet(this.x - 10, this.y - 12, 0, -13, baseDmg));
            bullets.push(new Bullet(this.x + 10, this.y - 12, 0, -13, baseDmg));
            this.shootCooldown = 8;
        } else if (this.weaponLevel >= 3) {
            bullets.push(new Bullet(this.x, this.y - 15, 0, -14, baseDmg));
            bullets.push(new Bullet(this.x - 12, this.y - 10, -2.5, -13, baseDmg * 0.9));
            bullets.push(new Bullet(this.x + 12, this.y - 10, 2.5, -13, baseDmg * 0.9));
            
            if (this.weaponLevel >= 4) {
                bullets.push(new Bullet(this.x - 32, this.y, 0, -15, baseDmg * 0.5));
                bullets.push(new Bullet(this.x + 32, this.y, 0, -15, baseDmg * 0.5));
                this.shootCooldown = 7;
            } else {
                this.shootCooldown = 8;
            }
        }
    }

    damage(amount) {
        if (this.isLooping || this.invincibleTimer > 0) return;

        if (this.shield > 0) {
            this.shield -= amount;
            if (this.shield < 0) {
                this.hp += this.shield;
                this.shield = 0;
            }
        } else {
            this.hp -= amount;
        }
        
        AudioEngine.playPlayerHit();
        createExplosion(this.x, this.y, '#ff4444', 10);

        if (this.hp <= 0) {
            this.lives--;
            this.hp = this.maxHp;
            this.weaponLevel = Math.max(1, this.weaponLevel - 1);
            this.invincibleTimer = 120;
            updateHeartsUI();
            
            if (this.lives <= 0) {
                triggerGameOver(false);
            }
        }
        updateHUD();
    }

    draw() {
        ctx.save();

        if (this.invincibleTimer > 0) {
            if (Math.floor(this.invincibleTimer / 4) % 2 === 0) {
                ctx.globalAlpha = 0.35;
            }
        }

        ctx.translate(this.x, this.y);

        if (this.isLooping) {
            const rotAngle = this.loopProgress * Math.PI * 2;
            const sizeScale = 1.0 + Math.sin(this.loopProgress * Math.PI) * 0.5;
            ctx.scale(sizeScale, sizeScale);
            ctx.rotate(rotAngle);
        }

        if (this.weaponLevel >= 4 && !this.isLooping) {
            ctx.fillStyle = '#b0bec5';
            ctx.strokeStyle = '#37474f';
            ctx.beginPath();
            ctx.arc(-32, 10, 5, 0, Math.PI*2);
            ctx.fill(); ctx.stroke();
            ctx.beginPath();
            ctx.arc(32, 10, 5, 0, Math.PI*2);
            ctx.fill(); ctx.stroke();
        }

        ctx.fillStyle = '#cfd8dc';
        ctx.strokeStyle = '#455a64';
        ctx.lineWidth = 2;

        ctx.fillRect(-16, -18, 5, 28);
        ctx.fillRect(11, -18, 5, 28);
        ctx.strokeRect(-16, -18, 5, 28);
        ctx.strokeRect(11, -18, 5, 28);

        ctx.beginPath();
        ctx.ellipse(0, 0, 8, 18, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#0284c7';
        ctx.beginPath();
        ctx.ellipse(0, -4, 4, 8, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#b0bec5';
        ctx.beginPath();
        ctx.moveTo(-40, -4);
        ctx.lineTo(40, -4);
        ctx.lineTo(25, 4);
        ctx.lineTo(-25, 4);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.arc(-32, 0, 3, 0, Math.PI*2);
        ctx.arc(32, 0, 3, 0, Math.PI*2);
        ctx.fill();

        ctx.lineWidth = 1.5;
        ctx.fillStyle = '#90a4ae';
        ctx.fillRect(-15, 10, 2, 14);
        ctx.fillRect(13, 10, 2, 14);
        ctx.fillRect(-15, 22, 30, 2);

        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.save();
        ctx.translate(-13.5, -18);
        ctx.rotate(this.propellerAngle);
        ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(10, 0); ctx.stroke();
        ctx.restore();
        ctx.save();
        ctx.translate(13.5, -18);
        ctx.rotate(this.propellerAngle);
        ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(10, 0); ctx.stroke();
        ctx.restore();

        if (this.shield > 0) {
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.7)';
            ctx.shadowColor = 'rgba(56, 189, 248, 0.9)';
            ctx.shadowBlur = 10;
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(0, 0, this.r + 5, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        ctx.restore();
    }
}

// 2. 아군 탄환
class Bullet {
    constructor(x, y, vx, vy, damage) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.r = 3.5;
        this.damage = damage;
        this.active = true;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.y < -10 || this.x < -10 || this.x > GAME_WIDTH + 10) {
            this.active = false;
        }
    }

    draw() {
        ctx.save();
        ctx.fillStyle = '#facc15';
        ctx.shadowColor = '#eab308';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

// 4. 일반/정예 적 기체
class Enemy {
    constructor(type, x, y) {
        this.type = type;
        this.x = x;
        this.y = y;
        this.active = true;
        
        this.angle = 0;
        this.propellerAngle = 0;
        
        if (type === 'scout') {
            this.r = 13;
            this.hp = 12;
            this.speed = 3;
            this.scoreVal = 100;
            this.pattern = 'straight';
        } else if (type === 'fighter') {
            this.r = 15;
            this.hp = 25;
            this.speed = 2.4;
            this.scoreVal = 200;
            this.pattern = 'sine';
        } else if (type === 'bomber') {
            this.r = 24;
            this.hp = 90;
            this.speed = 1.2;
            this.scoreVal = 500;
            this.pattern = 'down_shoot';
        } else if (type === 'red_leader') {
            this.r = 14;
            this.hp = 20;
            this.speed = 2.8;
            this.scoreVal = 300;
            this.pattern = 'loop_fly';
            this.isRed = true;
        }

        this.fireCooldown = Math.random() * 140 + 90;
    }

    update() {
        this.propellerAngle += 0.4;
        this.angle += 0.04;

        if (this.pattern === 'straight') {
            this.y += this.speed;
        } else if (this.pattern === 'sine') {
            this.y += this.speed;
            this.x += Math.sin(this.angle * 1.5) * 3;
        } else if (this.pattern === 'down_shoot') {
            this.y += this.speed;
            this.x += Math.cos(this.angle * 0.5) * 1.5;
        } else if (this.pattern === 'loop_fly') {
            this.y += this.speed;
            this.x += Math.cos(this.angle * 2.5) * 4;
        }

        if (this.pattern !== 'loop_fly') {
            this.fireCooldown--;
            if (this.fireCooldown <= 0) {
                this.shoot();
                this.fireCooldown = this.type === 'bomber' ? 170 : 280 + Math.random() * 120;
            }
        }

        if (this.y > GAME_HEIGHT + 30) {
            this.active = false;
        }
    }

    shoot() {
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist === 0) return;

        const bSpeed = 4.2 + (currentStage * 0.3);
        const vx = (dx / dist) * bSpeed;
        const vy = (dy / dist) * bSpeed;

        if (this.type === 'bomber') {
            enemyBullets.push(new EnemyBullet(this.x, this.y + 20, vx, vy));
            const angle1 = Math.atan2(vy, vx) + 0.25;
            const angle2 = Math.atan2(vy, vx) - 0.25;
            enemyBullets.push(new EnemyBullet(this.x, this.y + 20, Math.cos(angle1) * bSpeed, Math.sin(angle1) * bSpeed));
            enemyBullets.push(new EnemyBullet(this.x, this.y + 20, Math.cos(angle2) * bSpeed, Math.sin(angle2) * bSpeed));
        } else {
            enemyBullets.push(new EnemyBullet(this.x, this.y + 10, vx, vy));
        }
    }

    damage(amount) {
        this.hp -= amount;
        if (this.hp <= 0) {
            this.active = false;
            killCount++;
            score += this.scoreVal;
            updateHUD();
            AudioEngine.playExplodeSmall();
            createExplosion(this.x, this.y, this.isRed ? '#f87171' : '#fb923c', 12);
            
            if (this.isRed) {
                if (Math.random() < 0.35) spawnPowerup(this.x, this.y);
            } else if (Math.random() < 0.08) {
                spawnPowerup(this.x, this.y);
            }
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);

        if (this.pattern === 'sine') {
            ctx.rotate(Math.sin(this.angle * 1.5) * 0.15);
        }

        const planeColor = this.isRed ? '#dc2626' : (this.type === 'bomber' ? '#334155' : '#15803d');
        const wingColor = this.isRed ? '#ef4444' : (this.type === 'bomber' ? '#475569' : '#16a34a');
        const decalColor = '#ef4444';

        ctx.fillStyle = planeColor;
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 1.5;

        if (this.type === 'bomber') {
            ctx.beginPath();
            ctx.ellipse(0, 0, 16, 26, 0, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();

            ctx.fillStyle = wingColor;
            ctx.beginPath();
            ctx.moveTo(-52, -6);
            ctx.lineTo(52, -6);
            ctx.lineTo(30, 8);
            ctx.lineTo(-30, 8);
            ctx.closePath();
            ctx.fill(); ctx.stroke();

            ctx.fillStyle = '#475569';
            ctx.fillRect(-22, -14, 5, 14);
            ctx.fillRect(17, -14, 5, 14);

            ctx.fillStyle = decalColor;
            ctx.beginPath();
            ctx.arc(-42, 0, 4, 0, Math.PI*2);
            ctx.arc(42, 0, 4, 0, Math.PI*2);
            ctx.fill();
        } else {
            ctx.beginPath();
            ctx.ellipse(0, 0, 8, 16, 0, 0, Math.PI*2);
            ctx.fill(); ctx.stroke();

            ctx.fillStyle = wingColor;
            ctx.beginPath();
            ctx.moveTo(-32, -3);
            ctx.lineTo(32, -3);
            ctx.lineTo(16, 4);
            ctx.lineTo(-16, 4);
            ctx.closePath();
            ctx.fill(); ctx.stroke();

            if (!this.isRed) {
                ctx.fillStyle = decalColor;
                ctx.beginPath();
                ctx.arc(-24, 0, 3, 0, Math.PI*2);
                ctx.arc(24, 0, 3, 0, Math.PI*2);
                ctx.fill();
            }
        }

        ctx.strokeStyle = '#cbd5e1';
        ctx.save();
        ctx.translate(0, -14);
        ctx.rotate(-this.propellerAngle);
        ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(8, 0); ctx.stroke();
        ctx.restore();

        ctx.restore();
    }
}

// 5. 보스 기체 클래스
class BossShip {
    constructor(hp) {
        this.x = GAME_WIDTH / 2;
        this.y = -100;
        this.targetY = 140;
        this.r = 60;
        this.hp = hp;
        this.maxHp = hp;
        
        this.active = true;
        this.moveAngle = 0;
        this.shootPatternTimer = 0;
        this.shootPhase = 1;

        this.propellerAngle = 0;
    }

    update() {
        this.propellerAngle += 0.6;
        
        if (this.y < this.targetY) {
            this.y += 1.2;
            return;
        }

        this.moveAngle += 0.015;
        this.x = GAME_WIDTH / 2 + Math.sin(this.moveAngle) * 160;

        this.shootPatternTimer++;
        if (this.shootPatternTimer % 180 === 0) {
            this.shootPhase = this.shootPhase === 1 ? 2 : 1;
        }

        if (this.shootPatternTimer % 45 === 0) {
            this.shoot();
        }
    }

    shoot() {
        if (this.shootPhase === 1) {
            const startAngle = Math.random() * 0.5;
            const bulletsCount = 5 + currentStage * 1;
            for (let i = 0; i < bulletsCount; i++) {
                const angle = startAngle + (i * Math.PI * 2) / bulletsCount;
                const speed = 3.4;
                enemyBullets.push(new EnemyBullet(this.x, this.y + 15, Math.cos(angle) * speed, Math.sin(angle) * speed));
            }
        } else {
            const dx = player.x - this.x;
            const dy = player.y - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 0) {
                const vx = (dx / dist) * 3.8;
                const vy = (dy / dist) * 3.8;
                enemyBullets.push(new EnemyBullet(this.x - 30, this.y + 10, vx, vy));
                enemyBullets.push(new EnemyBullet(this.x + 30, this.y + 10, vx, vy));
            }
        }
    }

    damage(amount) {
        this.hp -= amount;
        
        if (Math.random() < 0.4) {
            createExplosion(this.x + (Math.random()*60 - 30), this.y + (Math.random()*40 - 20), '#facc15', 3);
        }

        if (this.hp <= 0) {
            this.active = false;
            activeBoss = null;
            score += 5000 * currentStage;
            updateHUD();

            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    AudioEngine.playExplodeLarge();
                    createExplosion(this.x + (Math.random()*80 - 40), this.y + (Math.random()*60 - 30), '#ef4444', 25);
                }, i * 150);
            }

            setTimeout(() => {
                stageClearTransition();
            }, 1200);
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);

        ctx.fillStyle = '#1e293b';
        ctx.strokeStyle = '#0f172a';
        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.ellipse(0, 0, 42, 65, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();

        ctx.fillStyle = '#334155';
        ctx.beginPath();
        ctx.moveTo(-110, -10);
        ctx.lineTo(110, -10);
        ctx.lineTo(50, 25);
        ctx.lineTo(-50, 25);
        ctx.closePath();
        ctx.fill(); ctx.stroke();

        ctx.fillStyle = '#1e293b';
        ctx.fillRect(-45, 45, 90, 8);
        ctx.strokeRect(-45, 45, 90, 8);

        ctx.fillStyle = '#dc2626';
        ctx.beginPath();
        ctx.arc(-80, 5, 10, 0, Math.PI*2);
        ctx.arc(80, 5, 10, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#475569';
        const enginesX = [-60, -25, 25, 60];
        enginesX.forEach((ex) => {
            ctx.fillRect(ex - 4, -20, 8, 16);
            ctx.strokeRect(ex - 4, -20, 8, 16);
            
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1.2;
            ctx.save();
            ctx.translate(ex, -20);
            ctx.rotate(this.propellerAngle);
            ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(15, 0); ctx.stroke();
            ctx.restore();
        });

        const hpPercent = this.hp / this.maxHp;
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(-50, -85, 100 * hpPercent, 6);
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 1;
        ctx.strokeRect(-50, -85, 100, 6);

        ctx.restore();
    }
}

// 6. 파워업 아이템
class PowerUp {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.r = 13;
        this.type = type;
        this.vy = 1.8;
        this.vx = (Math.random() - 0.5) * 1.5;
        this.active = true;
        this.pulse = 0;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.pulse += 0.1;

        if (this.x < this.r || this.x > GAME_WIDTH - this.r) {
            this.vx = -this.vx;
        }

        if (this.y > GAME_HEIGHT + 30) {
            this.active = false;
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);

        const currentScale = 1 + Math.sin(this.pulse) * 0.12;
        ctx.scale(currentScale, currentScale);

        ctx.fillStyle = '#ea580c';
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2.5;

        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        let label = 'P';
        if (this.type === 'POW_DOUBLE') label = 'D';
        if (this.type === 'POW_TRIPLE') label = 'T';
        if (this.type === 'SHIELD') label = 'S';
        if (this.type === 'LOOP_ADD') label = 'L';

        ctx.fillText(label, 0, 0);

        ctx.restore();
    }
}

// 7. 폭발 파티클
class Particle {
    constructor(x, y, color, size, vx, vy) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = size;
        this.vx = vx;
        this.vy = vy;
        this.life = 1.0;
        this.decay = 0.02 + Math.random() * 0.04;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.96;
        this.vy *= 0.96;
        this.life -= this.decay;
    }

    draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
        ctx.restore();
    }
}

function spawnPowerup(x, y) {
    const pool = ['POW_DOUBLE', 'POW_TRIPLE', 'SHIELD', 'LOOP_ADD'];
    let choice = pool[Math.floor(Math.random() * pool.length)];
    if (player.weaponLevel === 1) choice = 'POW_DOUBLE';
    powerups.push(new PowerUp(x, y, choice));
}

function createExplosion(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const velocity = 1 + Math.random() * 5.5;
        const vx = Math.cos(angle) * velocity;
        const vy = Math.sin(angle) * velocity;
        const size = 3 + Math.random() * 5;
        particles.push(new Particle(x, y, color, size, vx, vy));
    }
}

function updateHeartsUI() {
    const container = document.getElementById('livesContainer');
    container.innerHTML = '';
    for (let i = 0; i < player.lives; i++) {
        const lifeIcon = document.createElement('div');
        lifeIcon.className = 'w-4 h-4 bg-gray-300 rounded-sm border border-gray-600 shadow-md transform rotate-45 flex items-center justify-center';
        lifeIcon.innerHTML = `<div class="w-1.5 h-1.5 bg-red-500 rounded-full"></div>`;
        container.appendChild(lifeIcon);
    }
}

function updateHUD() {
    document.getElementById('scoreVal').innerText = score.toString().padStart(6, '0');
    
    const hpPercent = Math.max(0, player.hp / player.maxHp) * 100;
    const hpBar = document.getElementById('healthBar');
    hpBar.style.width = `${hpPercent}%`;
    
    if (hpPercent > 50) {
        hpBar.className = "h-full bg-gradient-to-r from-emerald-500 to-green-400 rounded-full transition-all duration-150";
    } else if (hpPercent > 25) {
        hpBar.className = "h-full bg-gradient-to-r from-amber-500 to-orange-400 rounded-full transition-all duration-150";
    } else {
        hpBar.className = "h-full bg-gradient-to-r from-red-600 to-rose-400 rounded-full transition-all duration-150";
    }
}

let spawnTimer = 0;

function handleEnemySpawning() {
    if (activeBoss) return;
    
    const stageInfo = STAGE_DATA[currentStage];
    stageProgress++;

    if (stageProgress >= stageInfo.duration) {
        activeBoss = new BossShip(stageInfo.bossHp);
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                AudioEngine.playPlayerHit();
            }, i * 300);
        }
        return;
    }

    spawnTimer++;
    const spawnPeriod = Math.max(22, Math.floor(75 / stageInfo.spawnRate));

    if (spawnTimer % spawnPeriod === 0) {
        const patternChoice = Math.random();
        
        if (patternChoice < 0.4) {
            const count = 5;
            const startX = 60 + Math.random() * (GAME_WIDTH - 220);
            const isRedSquad = Math.random() < 0.35;
            
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    if (gameState !== 'PLAYING' || activeBoss) return;
                    const offsetIndex = Math.abs(i - 2); 
                    const spawnX = startX + (i * 28);
                    const spawnY = -40 - (offsetIndex * 30);
                    
                    const enemyType = isRedSquad ? 'red_leader' : 'scout';
                    enemies.push(new Enemy(enemyType, spawnX, spawnY));
                }, i * 180);
            }
        } else if (patternChoice < 0.75) {
            const spawnX = 50 + Math.random() * (GAME_WIDTH - 100);
            enemies.push(new Enemy('fighter', spawnX, -30));
        } else {
            const spawnX = 80 + Math.random() * (GAME_WIDTH - 160);
            enemies.push(new Enemy('bomber', spawnX, -50));
        }
    }
}

function handleCollisions() {
    for (let b of bullets) {
        if (!b.active) continue;

        if (activeBoss && activeBoss.active) {
            const dist = Math.hypot(b.x - activeBoss.x, b.y - activeBoss.y);
            if (dist < activeBoss.r + b.r) {
                activeBoss.damage(b.damage);
                b.active = false;
                continue;
            }
        }

        for (let e of enemies) {
            if (!e.active) continue;
            const dist = Math.hypot(b.x - e.x, b.y - e.y);
            if (dist < e.r + b.r) {
                e.damage(b.damage);
                b.active = false;
                break;
            }
        }
    }

    if (!player.isLooping && player.invincibleTimer <= 0) {
        for (let eb of enemyBullets) {
            if (!eb.active) continue;
            const dist = Math.hypot(player.x - eb.x, player.y - eb.y);
            if (dist < player.r + eb.r) {
                player.damage(15);
                eb.active = false;
            }
        }

        for (let e of enemies) {
            if (!e.active) continue;
            const dist = Math.hypot(player.x - e.x, player.y - e.y);
            if (dist < player.r + e.r) {
                player.damage(25);
                e.damage(100);
            }
        }

        if (activeBoss && activeBoss.active) {
            const dist = Math.hypot(player.x - activeBoss.x, player.y - activeBoss.y);
            if (dist < player.r + activeBoss.r) {
                player.damage(35);
            }
        }
    }

    for (let p of powerups) {
        if (!p.active) continue;
        const dist = Math.hypot(player.x - p.x, player.y - p.y);
        if (dist < player.r + p.r) {
            p.active = false;
            applyPowerUp(p.type);
        }
    }
}

function applyPowerUp(type) {
    AudioEngine.playPowerup();
    if (type === 'POW_DOUBLE') {
        player.weaponLevel = Math.max(2, player.weaponLevel);
        if (player.weaponLevel === 2) score += 500;
    } else if (type === 'POW_TRIPLE') {
        player.weaponLevel = Math.min(4, Math.max(3, player.weaponLevel + 1));
    } else if (type === 'SHIELD') {
        player.shield = Math.min(60, player.shield + 30);
    } else if (type === 'LOOP_ADD') {
        player.loopsLeft = Math.min(6, player.loopsLeft + 1);
        document.getElementById('loopCountVal').innerText = player.loopsLeft;
    }
    createExplosion(player.x, player.y, '#38bdf8', 12);
    updateHUD();
}

function startGame() {
    AudioEngine.init();
    
    score = 0;
    killCount = 0;
    currentStage = 1;
    stageProgress = 0;
    gameState = 'PLAYING';

    player = new Player();
    player.invincibleTimer = 90;
    bullets = [];
    enemyBullets = [];
    enemies = [];
    powerups = [];
    particles = [];
    activeBoss = null;

    setupBackground();

    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('gameHUD').classList.remove('hidden');
    
    updateHeartsUI();
    updateHUD();
    showStageBanner();
}

function stageClearTransition() {
    gameState = 'STAGE_CLEAR';
    
    bullets = [];
    enemyBullets = [];
    enemies = [];
    powerups = [];

    if (STAGE_DATA[currentStage + 1]) {
        currentStage++;
        stageProgress = 0;
        setupBackground();
        setTimeout(() => {
            player.x = GAME_WIDTH / 2;
            player.y = GAME_HEIGHT * 0.8;
            player.invincibleTimer = 120;

            gameState = 'PLAYING';
            showStageBanner();
        }, 3000);
    } else {
        triggerGameOver(true);
    }
}

function triggerGameOver(isVictory) {
    gameState = 'GAMEOVER';
    
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('1942_highscore', highScore);
        document.getElementById('bestScoreText').innerText = highScore.toLocaleString();
    }

    const title = document.getElementById('resultTitle');
    const subtitle = document.getElementById('resultSub');
    const finalScore = document.getElementById('finalScore');
    const finalKills = document.getElementById('finalKills');

    if (isVictory) {
        title.innerText = "VICTORY!";
        title.className = "text-4xl font-retro text-green-400 mb-2 tracking-wide neon-text-blue";
        subtitle.innerText = "CAMPAIGN COMPLETED";
    } else {
        title.innerText = "GAME OVER";
        title.className = "text-4xl font-retro text-red-500 mb-2 tracking-wide neon-text-red";
        subtitle.innerText = "MISSION FAILED";
    }

    finalScore.innerText = score.toLocaleString();
    finalKills.innerText = killCount;

    document.getElementById('gameOverScreen').classList.remove('hidden');
}

function showStageBanner() {
    const banner = document.getElementById('stageBanner');
    const bTitle = document.getElementById('bannerTitle');
    const bSub = document.getElementById('bannerSub');

    bTitle.innerText = `STAGE 0${currentStage}`;
    bSub.innerText = STAGE_DATA[currentStage]?.name || "UNKNOWN THEATER";

    document.getElementById('stageLabel').innerText = `STAGE ${currentStage}`;

    banner.classList.remove('scale-0');
    banner.classList.add('scale-100');

    setTimeout(() => {
        banner.classList.remove('scale-100');
        banner.classList.add('scale-0');
    }, 2400);
}

document.getElementById('startButton').addEventListener('click', startGame);
document.getElementById('restartButton').addEventListener('click', startGame);

let lastTime = 0;

function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = timestamp - lastTime;
    lastTime = timestamp;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.scale(scaleX, scaleY);

    ctx.fillStyle = '#03030c';
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

    for (let star of stars) {
        if (gameState === 'PLAYING' || gameState === 'STAGE_CLEAR') {
            star.y += star.speed;
        }
        if (star.y > GAME_HEIGHT) {
            star.y = -5;
            star.x = Math.random() * GAME_WIDTH;
        }
        ctx.fillStyle = `rgba(240, 240, 255, ${star.opacity})`;
        ctx.fillRect(star.x, star.y, star.size, star.size);
    }

    if (gameState === 'PLAYING') {
        player.update();
        handleEnemySpawning();

        bullets.forEach(b => b.update());
        enemyBullets.forEach(eb => eb.update());
        enemies.forEach(e => e.update());
        powerups.forEach(p => p.update());
        particles.forEach(pt => pt.update());

        if (activeBoss) {
            activeBoss.update();
        }

        handleCollisions();

        bullets = bullets.filter(b => b.active);
        enemyBullets = enemyBullets.filter(eb => eb.active);
        enemies = enemies.filter(e => e.active);
        powerups = powerups.filter(p => p.active);
        particles = particles.filter(pt => pt.life > 0);
    } else if (gameState === 'STAGE_CLEAR') {
        player.propellerAngle += 0.8;
        player.y -= 3.5;
        particles.forEach(pt => pt.update());
        particles = particles.filter(pt => pt.life > 0);
    }

    powerups.forEach(p => p.draw());
    enemyBullets.forEach(eb => eb.draw());
    bullets.forEach(b => b.draw());
    enemies.forEach(e => e.draw());
    
    if (activeBoss) {
        activeBoss.draw();
    }

    if (gameState === 'PLAYING' || gameState === 'STAGE_CLEAR') {
        player.draw();
    }

    particles.forEach(pt => pt.draw());

    ctx.restore();

    requestAnimationFrame(gameLoop);
}

resizeCanvas();
requestAnimationFrame(gameLoop);
</script>
