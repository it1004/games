<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>토끼와 거북이 - 인터랙티브 프리미엄 동화책</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Noto Sans, Gaegu) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- CSS 스타일링 및 책장 애니메이션 효과 -->
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: radial-gradient(circle, #2c1b18 0%, #110908 100%);
        }
        .fairytale-title {
            font-family: 'Gaegu', cursive;
        }
        /* 고급 양장본 느낌을 위한 입체 그림자 및 책 척추 효과 */
        .book-container {
            perspective: 1500px;
        }
        .book-body {
            background: #fdfaf2;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0,0,0,0.06);
            transition: transform 0.6s cubic-bezier(0.15, 0.9, 0.34, 1);
        }
        /* 실제 고급 책 속지 느낌의 질감 마스크 */
        .paper-texture {
            background-color: #fdfaf2;
            background-image: radial-gradient(#ece4db 1px, transparent 1px);
            background-size: 24px 24px;
        }
        /* 페이지가 전환될 때의 3D 회전 애니메이션 */
        .page-turn-left {
            animation: turnLeft 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .page-turn-right {
            animation: turnRight 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes turnLeft {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(-10deg) scale(0.98); }
            100% { transform: rotateY(0deg); }
        }
        @keyframes turnRight {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(10deg) scale(0.98); }
            100% { transform: rotateY(0deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between text-gray-800 overflow-x-hidden select-none">

    <header class="w-full py-4 px-6 bg-[#251512]/90 border-b border-[#3d2622] flex justify-between items-center shadow-lg z-10 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <span class="text-3xl animate-bounce">🐢</span>
            <h1 class="fairytale-title text-2xl md:text-3xl font-extrabold text-amber-100 tracking-wide drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">
                토끼와 거북이 이야기
            </h1>
            <span class="text-3xl animate-bounce" style="animation-delay: 0.3s">🐰</span>
        </div>
        
        <!-- 목소리 & 속도 조절 등 프리미엄 TTS 컨트롤 센터 -->
        <div class="flex items-center gap-3 bg-[#3d2622] px-4 py-2 rounded-full border border-amber-900/40 shadow-inner">
            <button id="btn-toggle-voice" class="text-amber-200 hover:text-white transition-colors focus:outline-none flex items-center gap-2" title="목소리 선택">
                <i class="fa-solid fa-volume-high text-lg"></i>
                <span id="voice-status-text" class="text-xs font-semibold hidden md:inline text-amber-100">동화 목소리</span>
            </button>
            <select id="select-voice" class="bg-[#1e0e0c] text-amber-100 border border-amber-900/60 rounded-full text-xs px-2.5 py-1 focus:outline-none cursor-pointer">
                <option value="ko-KR">기본 한국어 목소리</option>
            </select>
            <div class="h-4 w-[1px] bg-amber-900/50 mx-1"></div>
            <!-- 어린이 낭독 배속 선택기 -->
            <label class="text-[10px] font-bold text-amber-300 uppercase">속도</label>
            <select id="select-speed" class="bg-[#1e0e0c] text-amber-100 border border-amber-900/60 rounded-full text-xs px-2 py-0.5 focus:outline-none cursor-pointer">
                <option value="0.8">0.8배속 (천천히)</option>
                <option value="0.95" selected>0.95배속 (추천)</option>
                <option value="1.1">1.1배속 (조금 빠르게)</option>
            </select>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 md:p-8 book-container">
        <!-- 책의 메인 프레임: 양장본 가죽 겉표지 느낌 재현 -->
        <div id="book-body-wrapper" class="book-body max-w-5xl w-full rounded-2xl border-[12px] border-[#3a1d17] overflow-hidden flex flex-col md:flex-row min-h-[550px] relative">
            
            <!-- 왼쪽 페이지: 일러스트 + 실시간 특수효과 캔버스 -->
            <div class="w-full md:w-1/2 bg-gradient-to-br from-[#122c15] to-[#041208] p-6 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-[#3a1d17] min-h-[300px] md:min-h-[450px] relative overflow-hidden shadow-inner">
                
                <!-- 일러스트 SVG 컨테이너 (그라데이션 및 입체 필터가 강조된 고퀄리티 벡터 그래픽) -->
                <div id="illustration-container" class="w-full h-full max-h-[340px] flex items-center justify-center z-10 transition-transform duration-500 hover:scale-105">
                    <!-- 페이지별 럭셔리 일러스트 로드 -->
                </div>

                <!-- 실시간 화면 연출 전용 캔버스 (바람, 나뭇잎, 꽃가루, 눈부심, Zzz 등의 입체 파티클 가동) -->
                <canvas id="effect-canvas" class="absolute inset-0 w-full h-full pointer-events-none z-20"></canvas>
                
                <!-- 일러스트 무드 배경 무늬 조명 광 효과 -->
                <div class="absolute inset-0 bg-radial-gradient from-white/10 via-transparent to-transparent opacity-60 mix-blend-overlay"></div>
            </div>

            <!-- 오른쪽 페이지: 고급 백색 마스크 페이퍼 및 낭독 타이포그래피 -->
            <div class="w-full md:w-1/2 p-8 md:p-10 flex flex-col justify-between paper-texture relative">
                
                <!-- 페이지 북 바인더 센터 척추 음영선 효과 -->
                <div class="absolute top-0 left-0 bottom-0 w-8 bg-gradient-to-r from-black/15 to-transparent hidden md:block pointer-events-none"></div>

                <!-- 페이지 정보 및 훈장 배지 -->
                <div class="flex justify-between items-center mb-4 z-10">
                    <span class="text-xs font-bold text-amber-900 bg-amber-200/80 border border-amber-300 px-3 py-1 rounded-full uppercase tracking-wider shadow-sm" id="page-badge">
                        표지
                    </span>
                    <span class="text-sm font-bold text-amber-800/70" id="page-counter">
                        0 / 10
                    </span>
                </div>

                <div class="flex-grow flex flex-col justify-center my-4 z-10">
                    <h2 class="fairytale-title text-3xl md:text-4xl font-black text-[#422115] mb-5 leading-tight tracking-wide drop-shadow-sm" id="story-title">
                        토끼와 거북이
                    </h2>
                    <p class="text-base md:text-xl leading-relaxed text-[#51362e] font-medium whitespace-pre-line" id="story-text">
                        이야기 속으로 들어가는 중입니다...
                    </p>
                </div>

                <!-- 하단 이야기 재생 제어 패널 -->
                <div class="mt-6 flex flex-col gap-4 z-10">
                    
                    <div class="flex items-center justify-between p-3.5 bg-amber-100/40 border border-amber-900/10 rounded-2xl shadow-sm transition-all duration-300" id="continuous-container">
                        <div class="flex flex-col">
                            <span class="text-sm font-extrabold text-amber-950 flex items-center gap-1.5">
                                <span class="flex h-2.5 w-2.5 rounded-full bg-amber-400 animate-pulse" id="continuous-indicator"></span>
                                처음부터 끝까지 연속 재생
                            </span>
                            <span class="text-xs text-amber-800 font-medium" id="continuous-desc">한 장을 다 읽으면 다음 장으로 알아서 넘어가요</span>
                        </div>
                        
                        <!-- 확실한 색상 대비와 텍스트(ON/OFF) 피드백을 지닌 안전 스위치 -->
                        <label class="relative inline-flex items-center cursor-pointer select-none">
                            <input type="checkbox" id="toggle-continuous" class="sr-only peer">
                            <div class="w-24 h-9 bg-gray-300 rounded-full peer peer-focus:outline-none transition-all duration-300 relative flex items-center justify-between px-2.5 shadow-inner peer-checked:bg-emerald-500">
                                <span class="text-[10px] font-black text-gray-500 transition-all duration-300 select-none" id="label-off">꺼짐 ⏸️</span>
                                <span class="text-[10px] font-black text-white opacity-0 transition-all duration-300 select-none absolute right-3" id="label-on">▶️ 켜짐</span>
                                <!-- 스위치 휠 토글러 -->
                                <div class="absolute top-[3px] left-[3px] w-8 h-8 bg-white rounded-full transition-all duration-300 shadow-md flex items-center justify-center peer-checked:translate-x-[54px]" id="toggle-ball">
                                    <i id="toggle-thumb-icon" class="fa-solid fa-circle-pause text-gray-400 transition-colors"></i>
                                </div>
                            </div>
                        </label>
                    </div>

                    <!-- 낭독 음성 진행바 -->
                    <div id="tts-progress" class="w-full h-2 bg-amber-200/50 rounded-full overflow-hidden hidden">
                        <div id="tts-progress-bar" class="w-0 h-full bg-gradient-to-r from-amber-500 to-amber-600 transition-all duration-300"></div>
                    </div>

                    <!-- 제어 버튼 (재생, 정지) -->
                    <div class="flex items-center justify-between gap-4">
                        <button id="btn-speak" class="flex-1 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-white font-extrabold py-3 px-5 rounded-2xl flex items-center justify-center gap-2.5 transition-all shadow-md transform active:scale-95 text-base">
                            <i class="fa-solid fa-play" id="speak-icon"></i>
                            <span id="speak-btn-text">구연 동화 듣기</span>
                        </button>

                        <button id="btn-stop-speak" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold p-3.5 rounded-2xl flex items-center justify-center transition-all hidden" title="낭독 멈춤">
                            <i class="fa-solid fa-stop text-lg"></i>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="w-full py-5 px-6 bg-[#251512]/95 border-t border-[#3d2622] flex flex-col sm:flex-row items-center justify-between gap-4 z-10 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <!-- 이전 버튼 -->
        <button id="btn-prev" class="w-full sm:w-auto px-6 py-3.5 bg-gradient-to-b from-[#4d2f2a] to-[#3a201c] hover:from-[#5d3b35] hover:to-[#462823] border border-amber-900/30 rounded-2xl font-black text-amber-100 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-md disabled:opacity-35 disabled:pointer-events-none">
            <i class="fa-solid fa-circle-chevron-left text-lg"></i>
            <span>이전 쪽</span>
        </button>

        <!-- 정교한 전면 진행도 트랙 바 -->
        <div class="flex-grow max-w-lg w-full px-4 hidden md:block">
            <div class="w-full bg-[#1e0e0c] h-3.5 rounded-full p-0.5 border border-amber-900/20 shadow-inner">
                <div id="story-progress" class="bg-gradient-to-r from-amber-400 to-amber-500 h-full rounded-full transition-all duration-500" style="width: 0%;"></div>
            </div>
        </div>

        <!-- 다음 버튼 -->
        <button id="btn-next" class="w-full sm:w-auto px-7 py-3.5 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-black rounded-2xl active:scale-95 transition-all flex items-center justify-center gap-2.5 shadow-lg">
            <span>다음 쪽</span>
            <i class="fa-solid fa-circle-chevron-right text-lg"></i>
        </button>
    </footer>

    <!-- 알림 모달 (브라우저 내장 alert 대체) -->
    <div id="modal-alert" class="fixed inset-0 bg-black/75 flex items-center justify-center z-50 hidden transition-opacity duration-300 opacity-0 backdrop-blur-sm">
        <div class="bg-white p-7 rounded-3xl max-w-sm w-11/12 text-center shadow-2xl transform scale-90 transition-transform duration-300 border-4 border-amber-900/20">
            <div class="text-amber-500 text-5xl mb-4">
                <i class="fa-solid fa-circle-info"></i>
            </div>
            <h3 class="text-2xl font-black text-amber-950 mb-2">알림</h3>
            <p id="modal-message" class="text-gray-700 font-medium mb-6 leading-relaxed">메시지 내용</p>
            <button id="btn-modal-close" class="bg-gradient-to-r from-amber-600 to-amber-700 hover:from-amber-700 hover:to-amber-800 text-white font-extrabold px-6 py-3 rounded-2xl w-full transition-all shadow-md">
                확인
            </button>
        </div>
    </div>

    <script>
        /*
          [고화질 프리미엄 10페이지 SVG 일러스트 데이터 정의]
          아이들이 직관적이고 직관적으로 이해할 수 있도록 명도 대비와 만화적 표정을 극대화한 신규 럭셔리 일러스트를 삽입했습니다.
        */
        const storyPages = [
            {
                page: 0,
                badge: "표지",
                title: "토끼와 거북이",
                text: "느릿느릿 엉금엉금 기어가는 거북이와,\n폴짝폴짝 누구보다 빠른 토끼가 살고 있었어요.\n두 친구의 특별하고 교훈 가득한 달리기 경주를 시작합니다!\n\n오른쪽 아래 '다음 쪽' 버튼을 눌러 이야기를 펼쳐보세요.",
                effect: "floating_dust", // 커버 특수효과
                illustration: `
                <svg viewBox="0 0 400 400" class="w-full h-full max-w-[300px]">
                    <defs>
                        <!-- 럭셔리 구형 필터 효과 및 입체 선명 그라데이션 -->
                        <linearGradient id="sky0" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#0284c7"/>
                            <stop offset="50%" stop-color="#38bdf8"/>
                            <stop offset="100%" stop-color="#bae6fd"/>
                        </linearGradient>
                        <linearGradient id="grass0" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#4ade80"/>
                            <stop offset="100%" stop-color="#15803d"/>
                        </linearGradient>
                        <linearGradient id="rabbitShade" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#ffffff"/>
                            <stop offset="70%" stop-color="#e2e8f0"/>
                            <stop offset="100%" stop-color="#94a3b8"/>
                        </linearGradient>
                        <linearGradient id="shellShade" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#15803d"/>
                            <stop offset="50%" stop-color="#166534"/>
                            <stop offset="100%" stop-color="#14532d"/>
                        </linearGradient>
                        <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
                            <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity="0.3"/>
                        </filter>
                    </defs>
                    <rect width="400" height="400" fill="url(#sky0)" rx="40"/>
                    <circle cx="200" cy="540" r="340" fill="url(#grass0)" filter="url(#soft-shadow)"/>
                    <circle cx="340" cy="70" r="30" fill="#facc15" opacity="0.9" filter="url(#soft-shadow)"/>
                    
                    <!-- 입체 토끼 -->
                    <g transform="translate(120, 200)" filter="url(#soft-shadow)">
                        <!-- 귀 -->
                        <ellipse cx="-15" cy="-60" rx="11" ry="28" fill="url(#rabbitShade)"/>
                        <ellipse cx="-15" cy="-57" rx="6" ry="20" fill="#fda4af"/>
                        <ellipse cx="15" cy="-60" rx="11" ry="28" fill="url(#rabbitShade)"/>
                        <ellipse cx="15" cy="-57" rx="6" ry="20" fill="#fda4af"/>
                        <!-- 머리 -->
                        <circle cx="0" cy="-18" r="38" fill="url(#rabbitShade)"/>
                        <!-- 눈동자 디테일 하이라이트 -->
                        <ellipse cx="-11" cy="-24" rx="4" ry="6" fill="#0f172a"/>
                        <circle cx="-13" cy="-26" r="1.5" fill="#fff"/>
                        <ellipse cx="11" cy="-24" rx="4" ry="6" fill="#0f172a"/>
                        <circle cx="9" cy="-26" r="1.5" fill="#fff"/>
                        <polygon points="0,-12 -4,-17 4,-17" fill="#f43f5e"/>
                        <path d="M-6,-6 Q0,0 6,-6" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                        <!-- 볼터치 -->
                        <circle cx="-22" cy="-14" r="6" fill="#fecdd3" opacity="0.8"/>
                        <circle cx="22" cy="-14" r="6" fill="#fecdd3" opacity="0.8"/>
                        <!-- 몸통 및 발 -->
                        <ellipse cx="0" cy="28" rx="26" ry="32" fill="url(#rabbitShade)"/>
                        <ellipse cx="0" cy="28" rx="14" ry="20" fill="#ffffff"/>
                        <ellipse cx="-16" cy="60" rx="11" ry="6" fill="#cbd5e1"/>
                        <ellipse cx="16" cy="60" rx="11" ry="6" fill="#cbd5e1"/>
                    </g>

                    <!-- 입체 거북이 -->
                    <g transform="translate(270, 240)" filter="url(#soft-shadow)">
                        <rect x="-30" y="20" width="13" height="18" rx="5" fill="#34d399"/>
                        <rect x="15" y="20" width="13" height="18" rx="5" fill="#34d399"/>
                        <path d="M-40,15 L-52,18 L-38,24 Z" fill="#34d399"/>
                        <!-- 등껍질 볼륨 조명 -->
                        <path d="M-38,22 C-38,-18 38,-18 38,22 Z" fill="url(#shellShade)"/>
                        <!-- 등 무늬 디테일 -->
                        <polygon points="0,-10 -15,0 -10,15 10,15 15,0" fill="#10b981" opacity="0.75"/>
                        <polygon points="-25,5 -35,20 -15,20" fill="#10b981" opacity="0.6"/>
                        <polygon points="25,5 35,20 15,20" fill="#10b981" opacity="0.6"/>
                        <!-- 머리 -->
                        <circle cx="48" cy="-10" r="18" fill="#6ee7b7"/>
                        <circle cx="52" cy="-14" r="2.5" fill="#0f172a"/>
                        <circle cx="53" cy="-15" r="1" fill="#fff"/>
                        <path d="M44,-5 Q49,-1 54,-6" stroke="#047857" stroke-width="2" fill="none" stroke-linecap="round"/>
                    </g>
                </svg>
                `
            },
            {
                page: 1,
                badge: "1쪽",
                title: "숲속의 말썽꾸러기 토끼",
                text: "아주 평화롭고 아름다운 초록빛 숲속마을에 발이 아주 빠른 토끼가 살고 있었어요.\n토끼는 자기가 얼마나 빠른지 매일 숲속 친구들에게 뽐내는 걸 정말 좋아했어요.\n\"얘들아, 나만큼 빠른 동물이 있으면 나와 봐! 다들 너무 느려!\" 토끼는 매일 뻐기며 다녔답니다.",
                effect: "wind_leaves", // 낙엽 날리기
                illustration: `
                <svg viewBox="0 0 400 400" class="w-full h-full max-w-[300px]">
                    <defs>
                        <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#bae6fd"/>
                            <stop offset="100%" stop-color="#f0fdf4"/>
                        </linearGradient>
                        <linearGradient id="rabbitShade" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#ffffff"/>
                            <stop offset="100%" stop-color="#cbd5e1"/>
                        </linearGradient>
                        <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
                            <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
                        </filter>
                    </defs>
                    <rect width="400" height="400" fill="url(#sky1)" rx="40"/>
                    <path d="M-50,400 Q150,280 450,400 Z" fill="#22c55e" filter="url(#soft-shadow)"/>
                    
                    <!-- 뻐기는 거만한 포즈의 토끼 -->
                    <g transform="translate(200, 210)" filter="url(#soft-shadow)">
                        <ellipse cx="-18" cy="-60" rx="9" ry="25" fill="url(#rabbitShade)" transform="rotate(-15)"/>

                        <polygon points="0,-16 3,-9 10,-9 5,-4 7,3 0,0 -7,3 -5,-4 -10,-9 -3,-9" fill="#fff" transform="translate(0, -1) scale(0.7)"/>
                        <!-- V 승리 포즈 팔 디자인 -->
                        <path d="M-36,-5 L-56,-25" stroke="#10b981" stroke-width="11" stroke-linecap="round"/>
                        <path d="M36,-5 L56,-25" stroke="#10b981" stroke-width="11" stroke-linecap="round"/>
                    </g>
                </svg>
                `
            }
        ];

        const SoundFX = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            playPageTurn() {
                this.init();
                const now = this.ctx.currentTime;
                // 책장을 파르르 넘기는 바스락 저주파 소리 합성
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.4);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000, now);
                filter.frequency.linearRampToValueAtTime(100, now + 0.4);

                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.4);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);

                osc.start(now);
                osc.stop(now + 0.4);
            },
            playVictory() {
                this.init();
                const now = this.ctx.currentTime;
                const notes = [261.63, 329.63, 392.00, 523.25]; // 도-미-솔-도 메이저 화음
                
                notes.forEach((freq, idx) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.1);
                    
                    gain.gain.setValueAtTime(0.12, now + idx * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.1 + 0.4);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    osc.start(now + idx * 0.1);
                    osc.stop(now + idx * 0.1 + 0.4);
                });
            }
        };

        const EffectEngine = {
            canvas: null,
            ctx: null,
            animId: null,
            particles: [],
            currentEffect: null,

            init(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
            },

            resize() {
                if (this.canvas) {
                    const rect = this.canvas.parentNode.getBoundingClientRect();
                    this.canvas.width = rect.width;
                    this.canvas.height = rect.height;
                }
            },

            start(effectName) {
                this.currentEffect = effectName;
                this.particles = [];
                if (this.animId) {
                    cancelAnimationFrame(this.animId);
                }
                
                // 페이지 효과 유형별 기초 파티클 구성
                if (effectName === "floating_dust") {
                    for (let i = 0; i < 20; i++) {
                        this.particles.push({
                            x: Math.random() * this.canvas.width,
                            y: Math.random() * this.canvas.height,
                            r: Math.random() * 2 + 1,
                            vy: -(Math.random() * 0.5 + 0.2),
                            vx: Math.random() * 0.4 - 0.2,
                            alpha: Math.random() * 0.6 + 0.2
                        });
                    }
                } else if (effectName === "wind_leaves") {
                    for (let i = 0; i < 15; i++) {
                        this.particles.push({
                            x: -20,
                            y: Math.random() * this.canvas.height,
                            w: Math.random() * 8 + 6,
                            h: Math.random() * 5 + 4,
                            vx: Math.random() * 1.5 + 1.0,
                            vy: Math.random() * 0.8 - 0.2,
                            rot: Math.random() * Math.PI * 2,
                            vRot: Math.random() * 0.05 + 0.02,
                            color: ["#f59e0b", "#10b981", "#15803d", "#f59e0b"][Math.floor(Math.random() * 4)]
                        });
                    }
                } else if (effectName === "confetti" || effectName === "confetti_gold") {
                    const isGold = effectName === "confetti_gold";
                    for (let i = 0; i < 40; i++) {
                        this.particles.push({
                            x: Math.random() * this.canvas.width,
                            y: -10,
                            w: Math.random() * 6 + 4,
                            h: Math.random() * 6 + 4,
                            vy: Math.random() * 2 + 1.5,
                            vx: Math.random() * 1 - 0.5,
                            rot: Math.random() * 360,
                            vRot: Math.random() * 4 - 2,
                            color: isGold ? `hsl(${Math.random() * 15 + 45}, 100%, ${Math.random() * 20 + 50}%)` : `hsl(${Math.random() * 360}, 90%, 65%)`
                        });
                    }
                } else if (effectName === "speed_lines") {
                    for (let i = 0; i < 12; i++) {
                        this.particles.push({
                            x: Math.random() * this.canvas.width + this.canvas.width,
                            y: Math.random() * this.canvas.height * 0.8,
                            len: Math.random() * 60 + 40,
                            speed: Math.random() * 12 + 8,
                            stroke: Math.random() * 2 + 1
                        });
                    }
                } else if (effectName === "sleeping_zzz") {
                    this.timer = 0;
                } else if (effectName === "sweating") {
                    for (let i = 0; i < 6; i++) {
                        this.particles.push({
                            x: this.canvas.width * 0.6,
                            y: this.canvas.height * 0.5,
                            r: Math.random() * 2 + 2,
                            vx: Math.random() * 1.5 + 0.5,
                            vy: Math.random() * 1 - 2,
                            grav: 0.12,
                            alpha: 1.0
                        });
                    }
                } else if (effectName === "shock_pulses") {
                    this.particles.push({
                        x: this.canvas.width * 0.5,
                        y: this.canvas.height * 0.5,
                        r: 10,
                        maxR: this.canvas.width * 0.4,
                        alpha: 1.0
                    });
                }

                this.loop();
            },

            loop() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const w = this.canvas.width;
                const h = this.canvas.height;

                if (this.currentEffect === "floating_dust") {
                    this.particles.forEach(p => {
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        this.ctx.fillStyle = `rgba(254, 240, 138, ${p.alpha})`;
                        this.ctx.shadowBlur = 10;
                        this.ctx.shadowColor = "#fef08a";
                        this.ctx.fill();
                        this.ctx.shadowBlur = 0;

                        p.y += p.vy;
                        p.x += p.vx;
                        if (p.y < -5) {
                            p.y = h + 5;
                            p.x = Math.random() * w;
                        }
                    });
                }
                
                else if (this.currentEffect === "wind_leaves") {
                    this.particles.forEach(p => {
                        this.ctx.save();
                        this.ctx.translate(p.x, p.y);
                        this.ctx.rotate(p.rot);
                        this.ctx.fillStyle = p.color;
                        this.ctx.beginPath();
                        this.ctx.ellipse(0, 0, p.w, p.h, 0, 0, Math.PI * 2);
                        this.ctx.fill();
                        this.ctx.restore();

                        p.x += p.vx;
                        p.y += p.vy;
                        p.rot += p.vRot;

                        if (p.x > w + 10) {
                            p.x = -20;
                            p.y = Math.random() * h;
                        }
                    });
                }

                else if (this.currentEffect === "confetti" || this.currentEffect === "confetti_gold") {
                    this.particles.forEach(p => {
                        this.ctx.save();
                        this.ctx.translate(p.x, p.y);
                        this.ctx.rotate(p.rot * Math.PI / 180);
                        this.ctx.fillStyle = p.color;
                        this.ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                        this.ctx.restore();

                        p.y += p.vy;
                        p.x += p.vx;
                        p.rot += p.vRot;

                        if (p.y > h + 10) {
                            p.y = -10;
                            p.x = Math.random() * w;
                        }
                    });
                }

                else if (this.currentEffect === "speed_lines") {
                    this.ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
                    this.particles.forEach(p => {
                        this.ctx.beginPath();
                        this.ctx.lineWidth = p.stroke;
                        this.ctx.moveTo(p.x, p.y);
                        this.ctx.lineTo(p.x - p.len, p.y);
                        this.ctx.stroke();

                        p.x -= p.speed;
                        if (p.x < -p.len) {
                            p.x = w + Math.random() * 100;
                            p.y = Math.random() * h * 0.8;
                        }
                    });
                }

                else if (this.currentEffect === "sleeping_zzz") {
                    this.timer = (this.timer || 0) + 1;
                    if (this.timer % 60 === 0) {
                        this.particles.push({
                            x: w * 0.45,
                            y: h * 0.72,
                            size: Math.random() * 10 + 14,
                            vx: Math.random() * 0.5 - 0.8,
                            vy: -(Math.random() * 0.6 + 0.6),
                            alpha: 1.0
                        });
                    }
                    this.particles.forEach((p, idx) => {
                        this.ctx.fillStyle = `rgba(16, 185, 129, ${p.alpha})`;
                        this.ctx.font = `bold ${p.size}px Gaegu`;
                        this.ctx.fillText("z", p.x, p.y);
                        p.x += p.vx;
                        p.y += p.vy;
                        p.alpha -= 0.006;
                        if (p.alpha <= 0) {
                            this.particles.splice(idx, 1);
                        }
                    });
                }

                else if (this.currentEffect === "sweating") {
                    this.particles.forEach((p, idx) => {
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                        this.ctx.fillStyle = `rgba(56, 189, 248, ${p.alpha})`;
                        this.ctx.fill();

                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += p.grav;
                        p.alpha -= 0.02;

                        if (p.alpha <= 0) {
                            p.x = w * 0.5;
                            p.y = h * 0.55;
                            p.vy = Math.random() * 1 - 2.5;
                            p.vx = Math.random() * 2 + 0.5;
                            p.alpha = 1.0;
                        }
                    });
                }

                else if (this.currentEffect === "shock_pulses") {
                    this.particles.forEach((p, idx) => {
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        this.ctx.strokeStyle = `rgba(239, 68, 68, ${p.alpha})`;
                        this.ctx.lineWidth = 3;
                        this.ctx.stroke();

                        p.r += 3.5;
                        p.alpha -= 0.015;

                        if (p.alpha <= 0) {
                            p.r = 10;
                            p.alpha = 1.0;
                        }
                    });
                }

                this.animId = requestAnimationFrame(() => this.loop());
            }
        };

        let currentPageIndex = 0;
        let isSpeaking = false;
        let isContinuousPlay = false; // 연속 자동 재생 여부
        let currentUtterance = null;
        let voicesList = [];
        let progressInterval = null;
        let nextPageTimeout = null;

        // DOM 참조 바인딩
        const elIllustrationContainer = document.getElementById('illustration-container');
        const elStoryTitle = document.getElementById('story-title');
        const elStoryText = document.getElementById('story-text');
        const elPageBadge = document.getElementById('page-badge');
        const elPageCounter = document.getElementById('page-counter');
        const elStoryProgress = document.getElementById('story-progress');
        
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnSpeak = document.getElementById('btn-speak');
        const btnStopSpeak = document.getElementById('btn-stop-speak');
        const btnToggleVoice = document.getElementById('btn-toggle-voice');
        const selectVoice = document.getElementById('select-voice');
        const selectSpeed = document.getElementById('select-speed');
        const voiceStatusText = document.getElementById('voice-status-text');
        const toggleContinuous = document.getElementById('toggle-continuous');
        
        const ttsProgress = document.getElementById('tts-progress');
        const ttsProgressBar = document.getElementById('tts-progress-bar');
        const bookWrapper = document.getElementById('book-body-wrapper');

        // 알림 모달 바인딩
        const modalAlert = document.getElementById('modal-alert');
        const modalMessage = document.getElementById('modal-message');
        const btnModalClose = document.getElementById('btn-modal-close');

        function showAlert(message) {
            modalMessage.textContent = message;
            modalAlert.classList.remove('hidden');
            setTimeout(() => {
                modalAlert.classList.add('opacity-100');
                modalAlert.querySelector('div').classList.remove('scale-90');
            }, 10);
        }

        btnModalClose.addEventListener('click', () => {
            modalAlert.classList.remove('opacity-100');
            modalAlert.querySelector('div').classList.add('scale-90');
            setTimeout(() => {
                modalAlert.classList.add('hidden');
            }, 300);
        });

        btnToggleVoice.addEventListener('click', () => {
            selectVoice.focus();
        });

        // TTS 한국어 음성 스캔 및 '구글 한국어' 매칭 로직
        function loadVoices() {
            if (typeof speechSynthesis === 'undefined') return;
            voicesList = window.speechSynthesis.getVoices();
            selectVoice.innerHTML = '';
            
            const koreanVoices = voicesList.filter(voice => voice.lang.includes('ko') || voice.lang.includes('KO'));
            
            if (koreanVoices.length > 0) {
                // "Google" 또는 "구글" 명칭이 들어간 한국어 목소리를 최우선 탐색
                let defaultIndex = koreanVoices.findIndex(voice => 
                    voice.name.includes('Google') || voice.name.includes('구글')
                );
                
                if (defaultIndex === -1) {
                    defaultIndex = koreanVoices.findIndex(voice => voice.default);
                }
                if (defaultIndex === -1) {
                    defaultIndex = 0;
                }

                koreanVoices.forEach((voice, index) => {
                    const option = document.createElement('option');
                    option.value = voice.name;
                    option.textContent = `${voice.name} (${voice.lang})`;
                    if (index === defaultIndex) {
                        option.selected = true;
                    }
                    selectVoice.appendChild(option);
                });
                voiceStatusText.textContent = "구연 보이스 매칭";
            } else {
                const option = document.createElement('option');
                option.value = 'default';
                option.textContent = '기본 한국어 목소리';
                selectVoice.appendChild(option);
            }
        }

        if (typeof speechSynthesis !== 'undefined' && window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
        loadVoices();

        function renderPage(index, direction = 'next') {
            if (index < 0 || index >= storyPages.length) return;
            
            currentPageIndex = index;
            const currentPageData = storyPages[index];

            // 책장 전용 오디오 사운드 합성 출력
            SoundFX.playPageTurn();

            // 3D 덤블링 롤링 효과 가동 (클래스 토글링)
            bookWrapper.classList.remove('page-turn-left', 'page-turn-right');
            void bookWrapper.offsetWidth; // 리플로우 트리거
            bookWrapper.classList.add(direction === 'next' ? 'page-turn-left' : 'page-turn-right');

            // 실제 컨텐츠 전환 지연 처리
            setTimeout(() => {
                elStoryTitle.textContent = currentPageData.title;
                elStoryText.textContent = currentPageData.text;
                elPageBadge.textContent = currentPageData.badge;
                elPageCounter.textContent = `${index} / 10`;
                elIllustrationContainer.innerHTML = currentPageData.illustration;

                // 하단 트랙 진행도 업데이트
                const progressPercent = (index / (storyPages.length - 1)) * 100;
                elStoryProgress.style.width = `${progressPercent}%`;

                // 사운드 보너스 (10쪽 도달 시 팡파레 효과음 재생)
                if (index === 10) {
                    SoundFX.playVictory();
                }

                // 실시간 특수효과 캔버스 재조정 가동
                EffectEngine.start(currentPageData.effect);

                // 이전/다음 버튼 속성 분기
                if (index === 0) {
                    btnPrev.disabled = true;
                    btnNext.innerHTML = `<span>이야기 시작</span> <i class="fa-solid fa-book-open"></i>`;
                } else if (index === storyPages.length - 1) {
                    btnPrev.disabled = false;
                    btnNext.innerHTML = `<span>다시 읽기</span> <i class="fa-solid fa-rotate-right"></i>`;
                } else {
                    btnPrev.disabled = false;
                    btnNext.innerHTML = `<span>다음 쪽</span> <i class="fa-solid fa-chevron-right"></i>`;
                }
            }, 100);
        }

        // 낭독 일시정지 및 정지 처리 함수
        function stopSpeaking(clearContinuous = false) {
            if (clearContinuous) {
                isContinuousPlay = false;
                toggleContinuous.checked = false;
                updateToggleUI();
            }
            if (nextPageTimeout) {
                clearTimeout(nextPageTimeout);
                nextPageTimeout = null;
            }
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
            if (typeof speechSynthesis !== 'undefined') {
                window.speechSynthesis.cancel();
            }
            
            isSpeaking = false;
            btnStopSpeak.classList.add('hidden');
            
            const speakIcon = document.getElementById('speak-icon');
            const speakBtnText = document.getElementById('speak-btn-text');
            speakIcon.className = "fa-solid fa-play";
            speakBtnText.textContent = isContinuousPlay ? "연속 자동 재생 중..." : "구연 동화 듣기";
            
            ttsProgress.classList.add('hidden');
            ttsProgressBar.style.width = "0%";
        }

        function speakCurrentPage() {
            if (typeof speechSynthesis === 'undefined') {
                showAlert("사용 환경이 음성 합성(TTS) 오디오를 지원하지 않는 브라우저입니다.");
                return;
            }

            if (isSpeaking) {
                stopSpeaking(true);
                return;
            }

            const currentData = storyPages[currentPageIndex];
            let speakText = `${currentData.title}. \n ${currentData.text}`;
            if (currentPageIndex === 0) {
                speakText = `${currentData.title} 표지입니다. ${currentData.text}`;
            }

            currentUtterance = new SpeechSynthesisUtterance(speakText);
            currentUtterance.lang = 'ko-KR';
            currentUtterance.volume = 1.0;
            currentUtterance.pitch = 1.05; // 맑고 또렷한 동화구연용 하이 피치 톤

            // 어린이 맞춤 선택 배속 속도 바인딩
            currentUtterance.rate = parseFloat(selectSpeed.value);

            // 지정 보이스 바인딩
            if (selectVoice.value && selectVoice.value !== 'default') {
                const targetVoice = voicesList.find(voice => voice.name === selectVoice.value);
                if (targetVoice) currentUtterance.voice = targetVoice;
            }

            currentUtterance.onstart = function() {
                isSpeaking = true;
                btnStopSpeak.classList.remove('hidden');
                
                const speakIcon = document.getElementById('speak-icon');
                const speakBtnText = document.getElementById('speak-btn-text');
                speakIcon.className = "fa-solid fa-pause";
                speakBtnText.textContent = isContinuousPlay ? "자동 넘김 중지" : "일시정지";

                ttsProgress.classList.remove('hidden');
                animateFakeProgress(speakText.length);
            };

            currentUtterance.onend = function() {
                if (isContinuousPlay && currentPageIndex < storyPages.length - 1) {
                    stopSpeaking(false);
                    nextPageTimeout = setTimeout(() => {
                        renderPage(currentPageIndex + 1, 'next');
                        speakCurrentPage();
                    }, 1500); // 1.5초 후 자연스러운 책장 넘기기
                } else {
                    stopSpeaking(true);
                }
            };

            currentUtterance.onerror = function() {
                stopSpeaking(true);
            };

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(currentUtterance);
        }

        // 오디오 낭독 프로그레스바 예측 게이지
        function animateFakeProgress(textLength) {
            if (progressInterval) clearInterval(progressInterval);
            let width = 0;
            ttsProgressBar.style.width = "0%";
            
            const currentSpeed = parseFloat(selectSpeed.value);
            const baseDuration = textLength * 230; // 글자당 소요 밀리초
            const estimatedDuration = baseDuration / currentSpeed;
            const stepTime = estimatedDuration / 100;

            progressInterval = setInterval(() => {
                if (!isSpeaking) {
                    clearInterval(progressInterval);
                    return;
                }
                width += 1;
                if (width >= 100) {
                    width = 100;
                    clearInterval(progressInterval);
                }
                ttsProgressBar.style.width = `${width}%`;
            }, stepTime);
        }

        // 연속 재생 스위치 상태 동적 업데이트 전담 함수
        function updateToggleUI() {
            const container = document.getElementById('continuous-container');
            const desc = document.getElementById('continuous-desc');
            const thumbIcon = document.getElementById('toggle-thumb-icon');
            const indicator = document.getElementById('continuous-indicator');
            const labelOff = document.getElementById('label-off');
            const labelOn = document.getElementById('label-on');
            const ball = document.getElementById('toggle-ball');

            if (isContinuousPlay) {
                // 초록색 ON 상태 비주얼 활성화
                container.classList.remove('bg-amber-100/40', 'border-amber-900/10');
                container.classList.add('bg-emerald-50', 'border-emerald-400');
                
                desc.textContent = "지금은 끝까지 알아서 연속 재생 중이에요!";
                desc.classList.remove('text-amber-800');
                desc.classList.add('text-emerald-800');

                indicator.classList.remove('bg-amber-400');
                indicator.classList.add('bg-emerald-500');

                thumbIcon.className = "fa-solid fa-circle-play text-emerald-500";
                
                // 순수 텍스트 라벨 노출 조정
                labelOff.classList.add('opacity-0', 'text-transparent');
                labelOn.classList.remove('opacity-0', 'text-transparent');
                labelOn.classList.add('opacity-100');
            } else {
                // 회색/앰버색 OFF 상태 비주얼 회복
                container.classList.remove('bg-emerald-50', 'border-emerald-400');
                container.classList.add('bg-amber-100/40', 'border-amber-900/10');
                
                desc.textContent = "동화 한 쪽을 다 읽으면 멈춰요 (한 장씩 읽기)";
                desc.classList.remove('text-emerald-800');
                desc.classList.add('text-amber-800');

                indicator.classList.remove('bg-emerald-500');
                indicator.classList.add('bg-amber-400');

                thumbIcon.className = "fa-solid fa-circle-pause text-gray-400";

                labelOn.classList.add('opacity-0', 'text-transparent');
                labelOff.classList.remove('opacity-0', 'text-transparent');
                labelOff.classList.add('opacity-100');
            }
        }

        // 제스쳐 스와이프 리스너 연계
        let touchStartX = 0;
        let touchEndX = 0;
        function handleGesture() {
            if (touchStartX - touchEndX > 75) {
                if (currentPageIndex < storyPages.length - 1) {
                    stopSpeaking(false);
                    renderPage(currentPageIndex + 1, 'next');
                    if (isContinuousPlay) speakCurrentPage();
                }
            }
            if (touchEndX - touchStartX > 75) {
                if (currentPageIndex > 0) {
                    stopSpeaking(false);
                    renderPage(currentPageIndex - 1, 'prev');
                    if (isContinuousPlay) speakCurrentPage();
                }
            }
        }

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleGesture();
        }, { passive: true });

        // 이벤트 리스너 연결
        toggleContinuous.addEventListener('change', (e) => {
            isContinuousPlay = e.target.checked;
            updateToggleUI();
            
            if (!isContinuousPlay && nextPageTimeout) {
                clearTimeout(nextPageTimeout);
            }
            if (isContinuousPlay && !isSpeaking) {
                speakCurrentPage();
            }
        });

        btnPrev.addEventListener('click', () => {
            if (currentPageIndex > 0) {
                stopSpeaking(false);
                renderPage(currentPageIndex - 1, 'prev');
                if (isContinuousPlay) speakCurrentPage();
            }
        });

        btnNext.addEventListener('click', () => {
            stopSpeaking(false);
            if (currentPageIndex < storyPages.length - 1) {
                renderPage(currentPageIndex + 1, 'next');
                if (isContinuousPlay) speakCurrentPage();
            } else {
                renderPage(0, 'prev');
            }
        });

        btnSpeak.addEventListener('click', speakCurrentPage);
        btnStopSpeak.addEventListener('click', () => stopSpeaking(true));

        // 초기화 진입부
        window.onload = function() {
            EffectEngine.init('effect-canvas');
            renderPage(0);
            updateToggleUI();
            setTimeout(loadVoices, 1000);
        };
    </script>
</body>
</html>
