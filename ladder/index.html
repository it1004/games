<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 사다리타기 게임</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-x-hidden">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 px-4 py-3">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-violet-500 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <i class="fa-solid fa-route text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-lg tracking-tight bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">Premium Ladder Climber</h1>
                    <p class="text-xs text-slate-400">일대일 매칭 보장 사다리타기</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="muteBtn" class="w-10 h-10 rounded-xl bg-slate-800 hover:bg-slate-750 border border-slate-700 flex items-center justify-center transition-all">
                    <i id="muteIcon" class="fa-solid fa-volume-high text-indigo-400"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl w-full mx-auto px-4 py-6 flex flex-col gap-6">
        
        <!-- Game Settings Card -->
        <section class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl flex flex-col gap-4">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                    <label class="text-sm font-semibold text-slate-300">참가자 수</label>
                    <div class="flex items-center gap-1 bg-slate-800 p-1 rounded-xl border border-slate-700">
                        <button onclick="changePlayerCount(-1)" class="w-8 h-8 rounded-lg bg-slate-700 hover:bg-slate-600 flex items-center justify-center transition-all font-bold text-lg">-</button>
                        <span id="playerCountLabel" class="w-10 text-center font-bold text-lg text-indigo-400">6</span>
                        <button onclick="changePlayerCount(1)" class="w-8 h-8 rounded-lg bg-slate-700 hover:bg-slate-600 flex items-center justify-center transition-all font-bold text-lg">+</button>
                    </div>
                </div>

                <!-- Templates -->
                <div class="flex flex-wrap items-center gap-2">
                    <span class="text-xs font-semibold text-slate-400">추천 템플릿:</span>
                    <button onclick="applyTemplate('coffee')" class="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-indigo-900/40 hover:border-indigo-500/50 border border-slate-700 text-xs font-medium transition-all">☕ 커피 내기</button>
                    <button onclick="applyTemplate('role')" class="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-indigo-900/40 hover:border-indigo-500/50 border border-slate-700 text-xs font-medium transition-all">🤝 역할 분담</button>
                    <button onclick="applyTemplate('penalty')" class="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-indigo-900/40 hover:border-indigo-500/50 border border-slate-700 text-xs font-medium transition-all">💥 벌칙 룰렛</button>
                    <button onclick="applyTemplate('clear')" class="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 text-xs font-medium transition-all text-slate-400">초기화</button>
                </div>
            </div>

            <!-- Custom Setup Inputs (Names & Results) -->
            <div id="inputsContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 pt-2">
                <!-- Dynamically injected via JS -->
            </div>
            
            <!-- Controls -->
            <div class="flex flex-wrap items-center justify-between gap-4 pt-2 border-t border-slate-800/80">
                <p class="text-xs text-slate-500"><i class="fa-solid fa-circle-info mr-1 text-indigo-400/80"></i> 이름을 클릭하여 한 명씩 개별 출발할 수도 있습니다!</p>
                <div class="flex items-center gap-3">
                    <button id="buildBtn" onclick="generateLadder()" class="px-5 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700 text-sm font-semibold transition-all">
                        <i class="fa-solid fa-shuffle mr-1.5"></i> 사다리 재배치
                    </button>
                    <button id="startBtn" onclick="startAllPaths()" class="px-6 py-2.5 rounded-xl bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 text-sm font-bold shadow-lg shadow-indigo-500/20 transition-all flex items-center gap-2">
                        <i class="fa-solid fa-play"></i> 전체 시작
                    </button>
                </div>
            </div>
        </section>

        <!-- Canvas Board Wrapper -->
        <section class="flex-grow bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-xl flex flex-col items-center relative overflow-hidden min-h-[450px]">
            <!-- Interactive Board -->
            <div class="w-full h-full flex-grow flex flex-col justify-between" style="min-height: 400px;">
                <!-- Top Player Names -->
                <div id="boardTopNames" class="flex justify-between px-4 pb-2 select-none">
                    <!-- Dynamic -->
                </div>

                <!-- Main Canvas Game Area -->
                <div class="relative w-full flex-grow" id="canvasContainer">
                    <canvas id="ladderCanvas" class="w-full h-full block rounded-lg"></canvas>
                </div>

                <!-- Bottom Goal Results -->
                <div id="boardBottomResults" class="flex justify-between px-4 pt-2 select-none">
                    <!-- Dynamic -->
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800 bg-slate-950/50 py-4 text-center text-xs text-slate-500">
        <div class="max-w-5xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-2">
            <p>© 2026 Premium Ladder. 1:1 대칭 완벽 보장 & 딜레이 애니메이션 탑재.</p>
            <p class="flex items-center gap-1.5">
                <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                Web Audio Synth Activated
            </p>
        </div>
    </footer>

    <!-- Audio Synthesis Logic & Game Script -->
    <script>
        // --- 1. Sound effects synth using Web Audio API ---
        let audioCtx = null;
        let isMuted = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (isMuted) return;
            initAudio();
            if (!audioCtx) return;

            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                const now = audioCtx.currentTime;

                if (type === 'start') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(261.63, now); // C4
                    osc.frequency.exponentialRampToValueAtTime(523.25, now + 0.15); // C5
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                } else if (type === 'bridge') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(659.25, now); // E5
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                    osc.start(now);
                    osc.stop(now + 0.08);
                } else if (type === 'win') {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);

                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.08); // E5
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);

                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(783.99, now + 0.08); // G5
                    osc2.frequency.setValueAtTime(1046.50, now + 0.16); // C6
                    gain2.gain.setValueAtTime(0.1, now);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.4);

                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + 0.3);
                    osc2.stop(now + 0.4);
                }
            } catch (e) {
                console.error("Audio error: ", e);
            }
        }

        // Toggle mute
        const muteBtn = document.getElementById('muteBtn');
        const muteIcon = document.getElementById('muteIcon');
        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            if (isMuted) {
                muteIcon.className = "fa-solid fa-volume-xmark text-rose-400";
            } else {
                muteIcon.className = "fa-solid fa-volume-high text-indigo-400";
                playSound('start');
            }
        });


        // --- 2. Game Core State ---
        let playerCount = 6;
        const emojis = ['🐱', '🐶', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐸', '🐵', '🐷', '🐰'];
        
        let playerNames = [];
        let goalResults = [];
        let isGenerated = false;

        let ladderData = {
            numCols: 6,
            numRows: 14, 
            bridges: [], 
            paths: []    
        };

        let traceProgress = []; 
        let activePaths = [];   
        let animationFrameId = null;
        let finishedCount = 0;

        function initGame() {
            playerNames = Array.from({length: playerCount}, (_, i) => `참가자${i + 1}`);
            goalResults = Array.from({length: playerCount}, (_, i) => `${i + 1}번`);
            
            renderInputs();
            generateLadder();
        }

        function changePlayerCount(diff) {
            const next = playerCount + diff;
            if (next >= 2 && next <= 12) {
                playerCount = next;
                document.getElementById('playerCountLabel').innerText = playerCount;
                
                const oldNames = [...playerNames];
                const oldGoals = [...goalResults];
                
                playerNames = Array.from({length: playerCount}, (_, i) => oldNames[i] || `참가자${i + 1}`);
                goalResults = Array.from({length: playerCount}, (_, i) => oldGoals[i] || `결과${i + 1}`);
                
                renderInputs();
                generateLadder();
            }
        }

        function applyTemplate(key) {
            if (key === 'coffee') {
                playerNames = Array.from({length: playerCount}, (_, i) => `인원 ${i + 1}`);
                goalResults = Array.from({length: playerCount}, (_, i) => i === 0 ? '☕ 당첨 (커피쏘기!)' : '통과');
                shuffleArray(goalResults);
            } else if (key === 'role') {
                const roles = ['팀장', '기획', '개발', '디자인', '서기', '발표', '자료조사', '피드백', '커피구매', '정리정돈', '서포터', '감수'];
                playerNames = Array.from({length: playerCount}, (_, i) => `멤버 ${i + 1}`);
                goalResults = Array.from({length: playerCount}, (_, i) => roles[i % roles.length]);
            } else if (key === 'penalty') {
                const penalties = ['엽기 표정 짓기', '편의점 심부름', '노래 한 소절', '엉덩이로 이름쓰기', '물 한 컵 원샷', '통과', '통과', '통과', '통과', '통과', '통과', '통과'];
                playerNames = Array.from({length: playerCount}, (_, i) => `생존자 ${i + 1}`);
                goalResults = Array.from({length: playerCount}, (_, i) => penalties[i % penalties.length]);
                shuffleArray(goalResults);
            } else {
                playerNames = Array.from({length: playerCount}, (_, i) => `참가자${i + 1}`);
                goalResults = Array.from({length: playerCount}, (_, i) => `결과${i + 1}`);
            }
            renderInputs();
            generateLadder();
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function renderInputs() {
            const container = document.getElementById('inputsContainer');
            container.innerHTML = '';

            for (let i = 0; i < playerCount; i++) {
                const card = document.createElement('div');
                card.className = "flex flex-col gap-1.5 p-3 rounded-xl bg-slate-950 border border-slate-800 hover:border-slate-700 transition-all";
                
                const emoji = emojis[i % emojis.length];

                card.innerHTML = `
                    <div class="flex items-center gap-1.5 border-b border-slate-800 pb-1.5 mb-1">
                        <span class="text-base">${emoji}</span>
                        <span class="text-xs font-bold text-slate-400">참가자 ${i+1}</span>
                    </div>
                    <input type="text" value="${playerNames[i]}" oninput="updateName(${i}, this.value)" 
                        class="px-2 py-1 text-xs font-semibold rounded bg-slate-800 border border-slate-700 focus:outline-none focus:border-indigo-500 text-white placeholder-slate-500" placeholder="이름">
                    <input type="text" value="${goalResults[i]}" oninput="updateGoal(${i}, this.value)" 
                        class="px-2 py-1 text-xs rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-violet-500 text-indigo-300 placeholder-slate-600 mt-1" placeholder="결과">
                `;
                container.appendChild(card);
            }
            
            updateBoardLabels();
        }

        function updateName(index, val) {
            playerNames[index] = val;
            updateBoardLabels();
        }

        function updateGoal(index, val) {
            goalResults[index] = val;
            updateBoardLabels();
        }

        function updateBoardLabels() {
            const topNames = document.getElementById('boardTopNames');
            const bottomResults = document.getElementById('boardBottomResults');

            topNames.innerHTML = '';
            bottomResults.innerHTML = '';

            for (let i = 0; i < playerCount; i++) {
                const emoji = emojis[i % emojis.length];
                
                const startNode = document.createElement('button');
                startNode.onclick = () => startSinglePathAnimation(i);
                startNode.className = "flex flex-col items-center justify-center gap-1 group cursor-pointer focus:outline-none transition-transform active:scale-95";
                startNode.style.width = `${100 / playerCount}%`;
                startNode.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-slate-800 group-hover:bg-indigo-600 group-hover:ring-4 group-hover:ring-indigo-500/20 flex items-center justify-center text-lg shadow-md border border-slate-700 transition-all relative">
                        <span id="charEmoji-${i}">${emoji}</span>
                        <span class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 rounded-full bg-slate-700 border-2 border-slate-900 group-hover:bg-emerald-500 text-[8px] flex items-center justify-center">▶</span>
                    </div>
                    <span class="text-xs font-bold text-slate-300 group-hover:text-white truncate max-w-[70px] text-center">${playerNames[i]}</span>
                `;
                topNames.appendChild(startNode);

                const goalNode = document.createElement('div');
                goalNode.className = "flex flex-col items-center justify-center gap-1 transition-all duration-300";
                goalNode.style.width = `${100 / playerCount}%`;
                goalNode.innerHTML = `
                    <div class="w-8 h-8 rounded-lg bg-slate-950 border border-slate-800 flex items-center justify-center text-[10px] text-slate-400 font-semibold shadow-inner">
                        🏁
                    </div>
                    <span class="text-xs font-bold text-slate-400 truncate max-w-[70px] text-center" id="goalLabel-${i}">${goalResults[i]}</span>
                `;
                bottomResults.appendChild(goalNode);
            }
        }

        function generateLadder() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            const numCols = playerCount;
            const numRows = 14; 

            const bridges = [];
            for (let r = 0; r < numRows; r++) {
                bridges[r] = [];
                for (let c = 0; c < numCols - 1; c++) {
                    if (c > 0 && bridges[r][c - 1]) {
                        bridges[r][c] = false;
                    } else {
                        bridges[r][c] = Math.random() < 0.42;
                    }
                }
            }

            ladderData = {
                numCols: numCols,
                numRows: numRows,
                bridges: bridges,
                paths: []
            };

            traceProgress = Array(numCols).fill(undefined);
            activePaths = Array(numCols).fill(false);
            finishedCount = 0;
            isGenerated = true;

            calculateAllPaths();
            resizeCanvas();
        }

        function getCanvasCoords(col, row) {
            const canvas = document.getElementById('ladderCanvas');
            const w = canvas.width;
            const h = canvas.height;

            const colWidth = w / playerCount;
            const rowHeight = h / (ladderData.numRows + 1);

            const x = (col * colWidth) + (colWidth / 2);
            const y = (row + 1) * rowHeight;

            return { x, y };
        }

        function calculateAllPaths() {
            ladderData.paths = [];

            for (let startCol = 0; startCol < playerCount; startCol++) {
                const path = [];
                let currentCol = startCol;

                let initialNode = getCanvasCoords(currentCol, -0.5);
                path.push({ x: initialNode.x, y: initialNode.y, col: currentCol, row: -0.5, isBridge: false });

                for (let r = 0; r < ladderData.numRows; r++) {
                    const rowTop = getCanvasCoords(currentCol, r);
                    path.push({ x: rowTop.x, y: rowTop.y, col: currentCol, row: r, isBridge: false });

                    let crossed = false;
                    let targetCol = currentCol;

                    if (currentCol > 0 && ladderData.bridges[r][currentCol - 1]) {
                        targetCol = currentCol - 1;
                        crossed = true;
                    } else if (currentCol < playerCount - 1 && ladderData.bridges[r][currentCol]) {
                        targetCol = currentCol + 1;
                        crossed = true;
                    }

                    if (crossed) {
                        const rowTarget = getCanvasCoords(targetCol, r);
                        path.push({ x: rowTarget.x, y: rowTarget.y, col: targetCol, row: r, isBridge: true });
                        currentCol = targetCol;
                    }
                }

                let finalNode = getCanvasCoords(currentCol, ladderData.numRows - 0.5);
                path.push({ x: finalNode.x, y: finalNode.y, col: currentCol, row: ladderData.numRows - 0.5, isBridge: false });

                ladderData.paths.push(path);
            }
        }

        const canvas = document.getElementById('ladderCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = document.getElementById('canvasContainer');
            canvas.width = container.clientWidth * window.devicePixelRatio;
            canvas.height = container.clientHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            
            canvas.style.width = container.clientWidth + "px";
            canvas.style.height = container.clientHeight + "px";

            calculateAllPaths();
            drawLadder();
        }

        window.addEventListener('resize', resizeCanvas);

        function drawLadder() {
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;

            ctx.clearRect(0, 0, w, h);

            const verticalLineColor = '#334155'; 
            const bridgeLineColor = '#475569';   

            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            for (let c = 0; c < playerCount; c++) {
                const top = getCanvasCoords(c, -0.5);
                const bottom = getCanvasCoords(c, ladderData.numRows - 0.5);
                
                ctx.beginPath();
                ctx.strokeStyle = verticalLineColor;
                ctx.moveTo(top.x, top.y);
                ctx.lineTo(bottom.x, bottom.y);
                ctx.stroke();
            }

            ctx.lineWidth = 5;
            for (let r = 0; r < ladderData.numRows; r++) {
                for (let c = 0; c < playerCount - 1; c++) {
                    if (ladderData.bridges[r][c]) {
                        const start = getCanvasCoords(c, r);
                        const end = getCanvasCoords(c + 1, r);

                        ctx.beginPath();
                        ctx.strokeStyle = bridgeLineColor;
                        ctx.moveTo(start.x, start.y);
                        ctx.lineTo(end.x, end.y);
                        ctx.stroke();
                    }
                }
            }

            ctx.shadowBlur = 10;
            ctx.lineWidth = 6;
            for (let i = 0; i < playerCount; i++) {
                if (traceProgress[i] === undefined) continue;

                const path = ladderData.paths[i];
                const currentPos = getPositionOnPath(path, traceProgress[i]);

                ctx.beginPath();
                ctx.strokeStyle = getNeonThemeColor(i);
                ctx.shadowColor = getNeonThemeColor(i);

                ctx.moveTo(path[0].x, path[0].y);

                const segmentIndex = getCurrentSegmentIndex(path, traceProgress[i]);
                for (let step = 0; step <= segmentIndex; step++) {
                    ctx.lineTo(path[step].x, path[step].y);
                }
                ctx.lineTo(currentPos.x, currentPos.y);
                ctx.stroke();
            }
            ctx.shadowBlur = 0; 

            for (let i = 0; i < playerCount; i++) {
                if (traceProgress[i] === undefined) continue;

                const path = ladderData.paths[i];
                const pos = getPositionOnPath(path, traceProgress[i]);
                const emoji = emojis[i % emojis.length];

                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 18, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(30, 41, 59, 0.95)';
                ctx.strokeStyle = getNeonThemeColor(i);
                ctx.lineWidth = 3;
                ctx.shadowColor = getNeonThemeColor(i);
                ctx.shadowBlur = 8;
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.font = "16px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(emoji, pos.x, pos.y + 1);
            }
        }

        function getNeonThemeColor(index) {
            const colors = [
                '#60a5fa', 
                '#a78bfa', 
                '#f472b6', 
                '#34d399', 
                '#fbbf24', 
                '#f87171', 
                '#22d3ee', 
                '#fb923c', 
                '#c084fc', 
                '#a3e635'  
            ];
            return colors[index % colors.length];
        }

        function getPositionOnPath(path, progress) {
            if (progress <= 0) return { x: path[0].x, y: path[0].y };
            if (progress >= 1) return { x: path[path.length - 1].x, y: path[path.length - 1].y };

            const totalSegments = path.length - 1;
            const targetPos = progress * totalSegments;
            const index = Math.floor(targetPos);
            const factor = targetPos - index;

            const fromNode = path[index];
            const toNode = path[index + 1];

            return {
                x: fromNode.x + factor * (toNode.x - fromNode.x),
                y: fromNode.y + factor * (toNode.y - fromNode.y)
            };
        }

        function getCurrentSegmentIndex(path, progress) {
            const totalSegments = path.length - 1;
            return Math.min(totalSegments - 1, Math.floor(progress * totalSegments));
        }

        function startSinglePathAnimation(i) {
            if (!isGenerated) return;
            initAudio();

            // 기존에 해당 인덱스 결과의 하이라이트가 있었다면 초기화
            resetGoalHighlights();

            traceProgress[i] = 0.0;
            activePaths[i] = true;
            playSound('start');

            if (!animationFrameId) {
                animationFrameId = requestAnimationFrame(animationLoop);
            }
        }

        function startAllPaths() {
            if (!isGenerated) return;
            initAudio();

            resetGoalHighlights();

            traceProgress = Array(playerCount).fill(undefined);
            activePaths = Array(playerCount).fill(false);
            finishedCount = 0;

            for (let i = 0; i < playerCount; i++) {
                setTimeout(() => {
                    traceProgress[i] = 0.0;
                    activePaths[i] = true;
                    playSound('start');

                    if (!animationFrameId) {
                        animationFrameId = requestAnimationFrame(animationLoop);
                    }
                }, i * 450); 
            }
        }

        function animationLoop() {
            let active = false;
            const speed = 0.0035; 

            for (let i = 0; i < playerCount; i++) {
                if (traceProgress[i] !== undefined && traceProgress[i] < 1.0) {
                    const oldProgress = traceProgress[i];
                    traceProgress[i] += speed;
                    active = true;

                    const path = ladderData.paths[i];
                    const oldSeg = getCurrentSegmentIndex(path, oldProgress);
                    const newSeg = getCurrentSegmentIndex(path, traceProgress[i]);

                    if (newSeg > oldSeg && path[newSeg].isBridge) {
                        playSound('bridge');
                    }

                    if (traceProgress[i] >= 1.0) {
                        traceProgress[i] = 1.0;
                        activePaths[i] = false;
                        handlePathFinish(i);
                    }
                }
            }

            drawLadder();

            if (active) {
                animationFrameId = requestAnimationFrame(animationLoop);
            } else {
                animationFrameId = null;
            }
        }

        function handlePathFinish(startCol) {
            playSound('win');
            
            const path = ladderData.paths[startCol];
            const endCol = path[path.length - 1].col;

            finishedCount++;

            // 결과 도달 시 하단 결과 레이블을 강조합니다.
            const goalLabel = document.getElementById(`goalLabel-${endCol}`);
            if (goalLabel) {
                goalLabel.className = "text-xs font-extrabold text-indigo-400 bg-indigo-950/80 px-2 py-1 rounded-xl border border-indigo-500/30 text-center animate-pulse scale-110 duration-300";
            }
        }

        function resetGoalHighlights() {
            for (let i = 0; i < playerCount; i++) {
                const label = document.getElementById(`goalLabel-${i}`);
                if (label) {
                    label.className = "text-xs font-bold text-slate-400 truncate max-w-[70px] text-center";
                }
            }
        }

        window.onload = function() {
            initGame();
        };
    </script>
</body>
</html>
