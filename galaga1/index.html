<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VIBE GALAGA</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(8, 16, 29, 0.72);
      --cyan: #41e8ff;
      --gold: #ffd166;
      --rose: #ff4d6d;
      --green: #6df58a;
      --ink: #e9fbff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 22% 18%, rgba(65, 232, 255, 0.18), transparent 26%),
        radial-gradient(circle at 82% 72%, rgba(255, 209, 102, 0.13), transparent 24%),
        linear-gradient(180deg, #030711 0%, #081225 55%, #030611 100%);
      color: var(--ink);
      font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .shell {
      width: min(100%, 1100px);
      height: min(100%, 760px);
      display: grid;
      grid-template-columns: minmax(300px, 1fr) 280px;
      gap: 16px;
      align-items: stretch;
    }

    .stage-wrap {
      position: relative;
      min-height: 520px;
      border: 1px solid rgba(93, 224, 255, 0.32);
      border-radius: 8px;
      overflow: hidden;
      background: #020713;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .hud {
      display: grid;
      align-content: start;
      gap: 12px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .title {
      margin: 0;
      font-size: 26px;
      line-height: 1;
      color: #fff;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 0 0 6px;
      color: rgba(233, 251, 255, 0.72);
      font-size: 13px;
      line-height: 1.5;
    }

    .readout {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px 12px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      font-variant-numeric: tabular-nums;
    }

    .readout span:nth-child(odd) {
      color: rgba(233, 251, 255, 0.66);
    }

    .readout span:nth-child(even) {
      color: #fff;
      font-weight: 700;
    }

    .controls {
      display: grid;
      gap: 8px;
      margin: 4px 0;
      color: rgba(233, 251, 255, 0.8);
      font-size: 13px;
      line-height: 1.45;
    }

    .key {
      display: inline-grid;
      min-width: 28px;
      height: 24px;
      place-items: center;
      margin-right: 5px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-bottom-color: rgba(0, 0, 0, 0.5);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .music-row {
      display: grid;
      grid-template-columns: 1fr;
    }

    .difficulty {
      display: grid;
      gap: 8px;
    }

    .difficulty-label {
      color: rgba(233, 251, 255, 0.72);
      font-size: 13px;
      font-weight: 700;
    }

    .difficulty-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
    }

    .difficulty-row button {
      height: 34px;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(233, 251, 255, 0.74);
    }

    .difficulty-row button.active {
      border-color: rgba(65, 232, 255, 0.56);
      background: rgba(65, 232, 255, 0.18);
      color: #fff;
      box-shadow: 0 0 18px rgba(65, 232, 255, 0.18);
    }

    button {
      height: 42px;
      border: 0;
      border-radius: 8px;
      background: var(--cyan);
      color: #04111d;
      font: 800 14px/1 "Segoe UI", sans-serif;
      cursor: pointer;
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .status {
      min-height: 44px;
      color: var(--gold);
      font-weight: 700;
      line-height: 1.35;
    }

    @media (max-width: 820px) {
      body {
        padding: 8px;
      }

      .shell {
        height: 100%;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 8px;
      }

      .stage-wrap {
        min-height: 0;
      }

      .hud {
        grid-template-columns: 1fr;
        align-items: start;
        gap: 8px;
        padding: 8px;
      }

      .title-block,
      .controls,
      .status {
        display: none;
      }

      .readout {
        grid-template-columns: repeat(6, auto);
        justify-content: space-between;
        gap: 4px 7px;
        padding: 8px;
        font-size: 12px;
      }

      .difficulty {
        display: grid;
      }

      .button-row {
        grid-template-columns: 1fr 1fr;
      }

      button {
        height: 38px;
      }

      .difficulty-row button {
        height: 32px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="stage-wrap" aria-label="게임 화면">
      <canvas id="game" width="900" height="680"></canvas>
    </section>

    <aside class="hud">
      <div class="title-block">
        <h1 class="title">VIBE GALAGA</h1>
        <p class="subtitle">적 편대를 격파하고 급강하 공격을 피하세요.</p>
      </div>

      <div class="readout" aria-live="polite">
        <span>점수</span><span id="score">0</span>
        <span>최고</span><span id="best">0</span>
        <span>스테이지</span><span id="wave">1</span>
        <span>목숨</span><span id="lives">3</span>
        <span>파워</span><span id="power">1</span>
        <span>난이도</span><span id="difficultyReadout">중</span>
      </div>

      <div class="difficulty" aria-label="난이도 선택">
        <div class="difficulty-label">난이도</div>
        <div class="difficulty-row">
          <button type="button" class="difficulty-btn" data-difficulty="easy">하</button>
          <button type="button" class="difficulty-btn active" data-difficulty="normal">중</button>
          <button type="button" class="difficulty-btn" data-difficulty="hard">상</button>
        </div>
      </div>

      <div class="button-row">
        <button id="startBtn">시작</button>
        <button id="pauseBtn" class="secondary">일시정지</button>
      </div>

      <div class="music-row">
        <button id="musicBtn" class="secondary" type="button">음악 켜기</button>
      </div>

      <div class="controls">
        <div><span class="key">←</span><span class="key">→</span><span class="key">A</span><span class="key">D</span> 이동</div>
        <div><span class="key">Space</span> 또는 <span class="key">↑</span> 발사</div>
        <div><span class="key">P</span> 일시정지 · <span class="key">R</span> 재시작</div>
      </div>

      <div id="status" class="status">시작을 누르거나 Space를 눌러 출격하세요. 모바일은 화면을 좌우로 드래그하면 이동하고 자동 발사됩니다.</div>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const waveEl = document.getElementById("wave");
    const livesEl = document.getElementById("lives");
    const powerEl = document.getElementById("power");
    const difficultyReadoutEl = document.getElementById("difficultyReadout");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const musicBtn = document.getElementById("musicBtn");
    const difficultyButtons = [...document.querySelectorAll(".difficulty-btn")];

    const W = canvas.width;
    const H = canvas.height;
    const keys = new Set();
    const touch = { left: false, right: false, fire: false, dragging: false, targetX: 450 };
    const rand = (min, max) => Math.random() * (max - min) + min;
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const bestKey = "codex-galaga-best";
    const difficultyKey = "codex-galaga-difficulty";
    const musicKey = "codex-galaga-music";
    const difficulties = {
      easy: {
        label: "하",
        enemySpeed: 0.78,
        diveRate: 0.72,
        fireRate: 0.62,
        bulletSpeed: 0.82,
        bossHp: 0
      },
      normal: {
        label: "중",
        enemySpeed: 1,
        diveRate: 1,
        fireRate: 1,
        bulletSpeed: 1,
        bossHp: 0
      },
      hard: {
        label: "상",
        enemySpeed: 1.28,
        diveRate: 1.45,
        fireRate: 1.55,
        bulletSpeed: 1.22,
        bossHp: 1
      }
    };

    let bestScore = Number(localStorage.getItem(bestKey) || 0);
    let selectedDifficulty = localStorage.getItem(difficultyKey) || "normal";
    if (!difficulties[selectedDifficulty]) selectedDifficulty = "normal";
    let musicEnabled = localStorage.getItem(musicKey) === "on";
    let audioCtx;
    let musicTimer;
    let beatIndex = 0;
    let state;
    let lastTime = 0;
    let starfield = makeStars();
    let dragPointerId = null;

    bestEl.textContent = bestScore;

    function isMobileLayout() {
      return window.matchMedia("(max-width: 820px)").matches;
    }

    function syncMusicButton() {
      musicBtn.textContent = musicEnabled ? "음악 끄기" : "음악 켜기";
      musicBtn.classList.toggle("secondary", !musicEnabled);
      musicBtn.setAttribute("aria-pressed", String(musicEnabled));
    }

    function ensureAudio() {
      if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return null;
        audioCtx = new AudioContext();
      }
      return audioCtx;
    }

    function playTone(frequency, duration, type, gainValue, when = 0) {
      const ctxAudio = ensureAudio();
      if (!ctxAudio) return;
      const startAt = ctxAudio.currentTime + when;
      const oscillator = ctxAudio.createOscillator();
      const gain = ctxAudio.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startAt);
      gain.gain.setValueAtTime(0.0001, startAt);
      gain.gain.exponentialRampToValueAtTime(gainValue, startAt + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
      oscillator.connect(gain);
      gain.connect(ctxAudio.destination);
      oscillator.start(startAt);
      oscillator.stop(startAt + duration + 0.03);
    }

    function playSweep(fromFrequency, toFrequency, duration, gainValue, when = 0) {
      const ctxAudio = ensureAudio();
      if (!ctxAudio) return;
      const startAt = ctxAudio.currentTime + when;
      const oscillator = ctxAudio.createOscillator();
      const gain = ctxAudio.createGain();
      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(fromFrequency, startAt);
      oscillator.frequency.exponentialRampToValueAtTime(toFrequency, startAt + duration);
      gain.gain.setValueAtTime(0.0001, startAt);
      gain.gain.exponentialRampToValueAtTime(gainValue, startAt + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
      oscillator.connect(gain);
      gain.connect(ctxAudio.destination);
      oscillator.start(startAt);
      oscillator.stop(startAt + duration + 0.03);
    }

    function tickMusic() {
      if (!musicEnabled || !audioCtx) return;
      const bass = [82.41, 0, 110, 0, 123.47, 0, 110, 0, 98, 0, 123.47, 0, 146.83, 0, 123.47, 0];
      const lead = [659.25, 783.99, 987.77, 783.99, 659.25, 0, 587.33, 659.25, 523.25, 659.25, 783.99, 659.25, 493.88, 0, 587.33, 523.25];
      const step = beatIndex % lead.length;
      if (bass[step]) playTone(bass[step], 0.07, "square", 0.05);
      if (lead[step]) {
        playTone(lead[step], 0.055, step % 4 === 2 ? "sawtooth" : "square", 0.03, 0.012);
        if (step % 4 === 0) playTone(lead[step] * 1.5, 0.035, "triangle", 0.015, 0.058);
      }
      if (step % 8 === 0) playSweep(1760, 330, 0.12, 0.018);
      if (step % 4 === 2) playTone(55, 0.035, "sawtooth", 0.018);
      beatIndex += 1;
    }

    async function startMusic() {
      if (!musicEnabled) return;
      const ctxAudio = ensureAudio();
      if (!ctxAudio) return;
      if (ctxAudio.state === "suspended") await ctxAudio.resume();
      if (!musicTimer) {
        tickMusic();
        musicTimer = setInterval(tickMusic, 145);
      }
    }

    function stopMusic() {
      if (musicTimer) {
        clearInterval(musicTimer);
        musicTimer = null;
      }
    }

    function toggleMusic() {
      musicEnabled = !musicEnabled;
      localStorage.setItem(musicKey, musicEnabled ? "on" : "off");
      syncMusicButton();
      if (musicEnabled) {
        startMusic();
      } else {
        stopMusic();
      }
    }

    function freshState() {
      return {
        mode: "ready",
        difficulty: selectedDifficulty,
        score: 0,
        wave: 1,
        lives: 3,
        power: 1,
        time: 0,
        shake: 0,
        bullets: [],
        enemyBullets: [],
        enemies: [],
        particles: [],
        texts: [],
        pickups: [],
        player: {
          x: W / 2,
          y: H - 70,
          w: 46,
          h: 48,
          speed: selectedDifficulty === "hard" ? 430 : 410,
          cooldown: 0,
          invincible: 0,
          twinTimer: 0
        },
        formation: { x: 0, dir: 1, speed: 28, swoopTimer: 1.7 }
      };
    }

    function makeStars() {
      return Array.from({ length: 140 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 2.4 + 0.4,
        speed: Math.random() * 72 + 18,
        color: Math.random() > 0.82 ? "#ffd166" : "#b9f8ff"
      }));
    }

    function spawnWave() {
      state.enemies = [];
      const difficulty = difficulties[state.difficulty];
      const rows = Math.min(5, 3 + Math.floor(state.wave / 2));
      const cols = 10;
      const startX = 128;
      const startY = 68;
      const gapX = 64;
      const gapY = 46;
      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          const type = row === 0 ? "boss" : row < 3 ? "wasp" : "scout";
          state.enemies.push({
            type,
            homeX: startX + col * gapX,
            homeY: startY + row * gapY,
            x: startX + col * gapX,
            y: startY + row * gapY - 260,
            w: type === "boss" ? 44 : 34,
            h: type === "boss" ? 34 : 30,
            hp: type === "boss" ? 2 + Math.floor(state.wave / 3) + difficulty.bossHp : 1,
            points: type === "boss" ? 320 : type === "wasp" ? 160 : 100,
            phase: rand(0, Math.PI * 2),
            mode: "enter",
            diveT: 0,
            diveSeed: rand(-90, 90),
            shotTimer: rand(1.8, 5.5) / difficulty.fireRate
          });
        }
      }
      state.formation = {
        x: 0,
        dir: 1,
        speed: (24 + state.wave * 4) * difficulty.enemySpeed,
        swoopTimer: Math.max(0.7, 2.3 - state.wave * 0.12) / difficulty.diveRate
      };
      statusEl.textContent = `스테이지 ${state.wave} 출격!`;
    }

    function startGame() {
      state = freshState();
      state.mode = "playing";
      spawnWave();
      statusEl.textContent = "적 편대 접근 중";
      pauseBtn.textContent = "일시정지";
      startMusic();
      updateHud();
    }

    function togglePause() {
      if (!state || state.mode === "ready" || state.mode === "gameover") return;
      state.mode = state.mode === "paused" ? "playing" : "paused";
      statusEl.textContent = state.mode === "paused" ? "일시정지" : "전투 재개";
      pauseBtn.textContent = state.mode === "paused" ? "계속" : "일시정지";
    }

    function updateHud() {
      scoreEl.textContent = state.score;
      bestEl.textContent = bestScore;
      waveEl.textContent = state.wave;
      livesEl.textContent = state.lives;
      powerEl.textContent = state.power;
      difficultyReadoutEl.textContent = difficulties[state.difficulty].label;
    }

    function syncDifficultyButtons() {
      difficultyButtons.forEach((button) => {
        const active = button.dataset.difficulty === selectedDifficulty;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", String(active));
      });
      if (state && state.mode === "ready") {
        state.difficulty = selectedDifficulty;
        updateHud();
      }
    }

    function setDifficulty(nextDifficulty) {
      if (!difficulties[nextDifficulty]) return;
      selectedDifficulty = nextDifficulty;
      localStorage.setItem(difficultyKey, selectedDifficulty);
      syncDifficultyButtons();
      if (state && state.mode !== "playing") {
        state.difficulty = selectedDifficulty;
        updateHud();
      }
      statusEl.textContent = `난이도 ${difficulties[selectedDifficulty].label} 선택 - 시작하면 적용됩니다.`;
    }

    function fire() {
      const p = state.player;
      if (p.cooldown > 0 || state.mode !== "playing") return;
      const spread = state.power >= 3 ? 12 : state.power === 2 ? 8 : 0;
      const ships = p.twinTimer > 0 ? [p.x - 24, p.x + 24] : [p.x];
      for (const shipX of ships) {
        state.bullets.push({ x: shipX, y: p.y - 28, vx: 0, vy: -620, r: 4 });
        if (state.power >= 2) {
          state.bullets.push({ x: shipX - 13, y: p.y - 18, vx: -spread, vy: -590, r: 3 });
          state.bullets.push({ x: shipX + 13, y: p.y - 18, vx: spread, vy: -590, r: 3 });
        }
        if (state.power >= 4) {
          state.bullets.push({ x: shipX - 23, y: p.y - 10, vx: -35, vy: -560, r: 3 });
          state.bullets.push({ x: shipX + 23, y: p.y - 10, vx: 35, vy: -560, r: 3 });
        }
      }
      p.cooldown = Math.max(0.1, 0.25 - state.power * 0.025);
    }

    function rectHit(a, b, pad = 0) {
      return Math.abs(a.x - b.x) < (a.w + b.w) / 2 + pad && Math.abs(a.y - b.y) < (a.h + b.h) / 2 + pad;
    }

    function circleRectHit(c, r) {
      const dx = Math.abs(c.x - r.x);
      const dy = Math.abs(c.y - r.y);
      return dx < r.w / 2 + c.r && dy < r.h / 2 + c.r;
    }

    function explode(x, y, color, count = 18) {
      for (let i = 0; i < count; i += 1) {
        const angle = rand(0, Math.PI * 2);
        const speed = rand(60, 280);
        state.particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: rand(0.35, 0.85),
          maxLife: 0.85,
          size: rand(2, 5),
          color
        });
      }
    }

    function floatingText(text, x, y, color = "#ffd166") {
      state.texts.push({ text, x, y, life: 0.9, color });
    }

    function damagePlayer() {
      const p = state.player;
      if (p.invincible > 0) return;
      state.lives -= 1;
      state.power = Math.max(1, state.power - 1);
      p.twinTimer = 0;
      p.invincible = 2.0;
      state.shake = 0.45;
      explode(p.x, p.y, "#41e8ff", 30);
      if (state.lives <= 0) {
        state.mode = "gameover";
        statusEl.textContent = "게임 오버 - R 또는 시작으로 다시 도전";
        bestScore = Math.max(bestScore, state.score);
        localStorage.setItem(bestKey, String(bestScore));
      } else {
        statusEl.textContent = "피격! 무적 시간 동안 재정비";
      }
      updateHud();
    }

    function update(dt) {
      if (!state || state.mode !== "playing") return;
      state.time += dt;
      state.shake = Math.max(0, state.shake - dt);
      const p = state.player;
      const difficulty = difficulties[state.difficulty];

      let dir = 0;
      if (keys.has("ArrowLeft") || keys.has("a") || keys.has("A") || touch.left) dir -= 1;
      if (keys.has("ArrowRight") || keys.has("d") || keys.has("D") || touch.right) dir += 1;
      const playerMinX = p.twinTimer > 0 ? 58 : 34;
      const playerMaxX = p.twinTimer > 0 ? W - 58 : W - 34;
      if (isMobileLayout() && touch.dragging) {
        p.x += (touch.targetX - p.x) * Math.min(1, dt * 18);
        p.x = clamp(p.x, playerMinX, playerMaxX);
      } else {
        p.x = clamp(p.x + dir * p.speed * dt, playerMinX, playerMaxX);
      }
      p.cooldown = Math.max(0, p.cooldown - dt);
      p.invincible = Math.max(0, p.invincible - dt);
      p.twinTimer = Math.max(0, p.twinTimer - dt);
      if (keys.has(" ") || keys.has("ArrowUp") || touch.fire || isMobileLayout()) fire();

      for (const star of starfield) {
        star.y += star.speed * dt * (1 + state.wave * 0.04);
        if (star.y > H) {
          star.y = -4;
          star.x = Math.random() * W;
        }
      }

      state.formation.x += state.formation.dir * state.formation.speed * dt;
      const minHome = Math.min(...state.enemies.map(e => e.homeX + state.formation.x), W);
      const maxHome = Math.max(...state.enemies.map(e => e.homeX + state.formation.x), 0);
      if (minHome < 70 || maxHome > W - 70) state.formation.dir *= -1;

      state.formation.swoopTimer -= dt;
      if (state.formation.swoopTimer <= 0) {
        const candidates = state.enemies.filter(e => e.mode === "formation");
        const attacker = candidates[Math.floor(Math.random() * candidates.length)];
        if (attacker) {
          attacker.mode = "dive";
          attacker.diveT = 0;
          attacker.diveSeed = rand(-120, 120);
        }
        state.formation.swoopTimer = Math.max(0.5, rand(1.1, 2.4) - state.wave * 0.08) / difficulty.diveRate;
      }

      for (const enemy of state.enemies) {
        enemy.phase += dt * 4;
        enemy.shotTimer -= dt;
        if (enemy.mode === "enter") {
          enemy.y += (enemy.homeY - enemy.y) * Math.min(1, dt * 2.6);
          enemy.x += ((enemy.homeX + state.formation.x) - enemy.x) * Math.min(1, dt * 3);
          if (Math.abs(enemy.y - enemy.homeY) < 2) enemy.mode = "formation";
        } else if (enemy.mode === "formation") {
          enemy.x = enemy.homeX + state.formation.x + Math.sin(enemy.phase) * 5;
          enemy.y = enemy.homeY + Math.cos(enemy.phase * 0.9) * 4;
        } else if (enemy.mode === "dive") {
          enemy.diveT += dt;
          enemy.y += (165 + state.wave * 16) * difficulty.enemySpeed * dt;
          enemy.x += Math.sin(enemy.diveT * 5) * (90 + state.wave * 5) * difficulty.enemySpeed * dt + enemy.diveSeed * difficulty.enemySpeed * dt;
          if (enemy.y > H + 40) {
            enemy.mode = "formation";
            enemy.y = enemy.homeY - 180;
            enemy.x = enemy.homeX + state.formation.x;
          }
        }

        const fireChance = (enemy.type === "boss" ? 0.45 : 0.2) * difficulty.fireRate;
        if (enemy.shotTimer <= 0 && Math.random() < fireChance) {
          const angle = Math.atan2(p.y - enemy.y, p.x - enemy.x);
          const speed = (180 + state.wave * 18) * difficulty.bulletSpeed;
          state.enemyBullets.push({
            x: enemy.x,
            y: enemy.y + 14,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            r: enemy.type === "boss" ? 5 : 4
          });
          enemy.shotTimer = rand(2.0, 5.2) / ((1 + state.wave * 0.06) * difficulty.fireRate);
        }
      }

      for (const b of state.bullets) {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
      }
      for (const b of state.enemyBullets) {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
      }
      state.bullets = state.bullets.filter(b => b.y > -20 && b.x > -30 && b.x < W + 30);
      state.enemyBullets = state.enemyBullets.filter(b => b.y < H + 25 && b.x > -30 && b.x < W + 30);

      for (const bullet of state.bullets) {
        if (bullet.dead) continue;
        for (const enemy of state.enemies) {
          if (enemy.dead || !circleRectHit(bullet, enemy)) continue;
          bullet.dead = true;
          enemy.hp -= 1;
          explode(bullet.x, bullet.y, "#ffd166", 7);
          if (enemy.hp <= 0) {
            enemy.dead = true;
            state.score += enemy.points;
            bestScore = Math.max(bestScore, state.score);
            const dropRoll = Math.random();
            const twinChance = enemy.type === "boss" ? 0.18 : 0.045;
            if (dropRoll < twinChance) {
              state.pickups.push({ x: enemy.x, y: enemy.y, w: 28, h: 22, vy: 88, kind: "twin" });
            } else if (dropRoll < twinChance + 0.08) {
              state.pickups.push({ x: enemy.x, y: enemy.y, w: 20, h: 20, vy: 95, kind: "power" });
            }
            explode(enemy.x, enemy.y, enemy.type === "boss" ? "#ff4d6d" : "#6df58a", enemy.type === "boss" ? 28 : 16);
            floatingText(`+${enemy.points}`, enemy.x, enemy.y);
          }
          break;
        }
      }

      state.bullets = state.bullets.filter(b => !b.dead);
      state.enemies = state.enemies.filter(e => !e.dead);

      for (const enemy of state.enemies) {
        if (rectHit(enemy, p, -6)) {
          enemy.dead = true;
          damagePlayer();
        }
      }
      state.enemies = state.enemies.filter(e => !e.dead);

      for (const bullet of state.enemyBullets) {
        if (!bullet.dead && circleRectHit(bullet, p)) {
          bullet.dead = true;
          damagePlayer();
        }
      }
      state.enemyBullets = state.enemyBullets.filter(b => !b.dead);

      for (const pickup of state.pickups) {
        pickup.y += pickup.vy * dt;
        if (rectHit(pickup, p, 5)) {
          pickup.dead = true;
          if (pickup.kind === "twin") {
            p.twinTimer = 18;
            floatingText("TWIN FIGHTERS", p.x, p.y - 42, "#ff4dff");
            explode(p.x - 24, p.y, "#ff4dff", 12);
            explode(p.x + 24, p.y, "#41e8ff", 12);
          } else {
            state.power = Math.min(5, state.power + 1);
            floatingText("POWER UP", p.x, p.y - 42, "#41e8ff");
          }
        }
      }
      state.pickups = state.pickups.filter(pickup => !pickup.dead && pickup.y < H + 30);

      for (const particle of state.particles) {
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        particle.vx *= 0.98;
        particle.vy *= 0.98;
        particle.life -= dt;
      }
      for (const text of state.texts) {
        text.y -= 42 * dt;
        text.life -= dt;
      }
      state.particles = state.particles.filter(particle => particle.life > 0);
      state.texts = state.texts.filter(text => text.life > 0);

      if (state.enemies.length === 0) {
        state.wave += 1;
        state.power = Math.min(5, state.power + 1);
        spawnWave();
      }

      updateHud();
    }

    function drawShip(x, y, invincible) {
      ctx.save();
      ctx.translate(x, y);
      if (invincible > 0 && Math.floor(state.time * 16) % 2 === 0) ctx.globalAlpha = 0.45;

      const flame = 1 + Math.sin(state.time * 32) * 0.18;
      const hull = ctx.createLinearGradient(0, -34, 0, 30);
      hull.addColorStop(0, "#ffffff");
      hull.addColorStop(0.28, "#7cf4ff");
      hull.addColorStop(0.72, "#1888d8");
      hull.addColorStop(1, "#0a3269");
      const wing = ctx.createLinearGradient(-36, -5, 36, 26);
      wing.addColorStop(0, "#0c47a1");
      wing.addColorStop(0.5, "#41e8ff");
      wing.addColorStop(1, "#0c47a1");

      ctx.shadowColor = "rgba(65, 232, 255, 0.55)";
      ctx.shadowBlur = 18;

      ctx.fillStyle = "#ff7a2f";
      ctx.beginPath();
      ctx.moveTo(-8, 23);
      ctx.lineTo(0, 48 * flame);
      ctx.lineTo(8, 23);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#ffd166";
      ctx.beginPath();
      ctx.moveTo(-4, 23);
      ctx.lineTo(0, 36 * flame);
      ctx.lineTo(4, 23);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 10;
      ctx.fillStyle = wing;
      ctx.beginPath();
      ctx.moveTo(0, -8);
      ctx.lineTo(36, 12);
      ctx.lineTo(25, 25);
      ctx.lineTo(8, 18);
      ctx.lineTo(0, 31);
      ctx.lineTo(-8, 18);
      ctx.lineTo(-25, 25);
      ctx.lineTo(-36, 12);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#0d1c3f";
      ctx.fillRect(-26, 14, 11, 7);
      ctx.fillRect(15, 14, 11, 7);

      ctx.fillStyle = hull;
      ctx.beginPath();
      ctx.moveTo(0, -34);
      ctx.bezierCurveTo(11, -18, 14, 2, 11, 20);
      ctx.lineTo(0, 35);
      ctx.lineTo(-11, 20);
      ctx.bezierCurveTo(-14, 2, -11, -18, 0, -34);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.fillStyle = "#04111d";
      ctx.beginPath();
      ctx.ellipse(0, -12, 6, 12, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
      ctx.beginPath();
      ctx.ellipse(-2, -16, 2, 5, 0.45, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255, 255, 255, 0.72)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -30);
      ctx.lineTo(0, 24);
      ctx.stroke();

      ctx.strokeStyle = "#ff4d6d";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-20, 16);
      ctx.lineTo(-30, 10);
      ctx.moveTo(20, 16);
      ctx.lineTo(30, 10);
      ctx.stroke();
      ctx.restore();
    }

    function drawEnemy(enemy) {
      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      if (enemy.mode === "dive") ctx.rotate(Math.sin(enemy.diveT * 4) * 0.24);
      const flap = Math.sin(enemy.phase * 2) * 5;
      if (enemy.type === "boss") {
        const bossHull = ctx.createLinearGradient(0, -22, 0, 24);
        bossHull.addColorStop(0, "#ffe3eb");
        bossHull.addColorStop(0.25, "#ff4d6d");
        bossHull.addColorStop(1, "#710026");
        ctx.shadowColor = "rgba(255, 77, 109, 0.55)";
        ctx.shadowBlur = 14;
        ctx.fillStyle = "#5d1230";
        ctx.beginPath();
        ctx.moveTo(0, -21);
        ctx.lineTo(34, -3 + flap);
        ctx.lineTo(27, 16);
        ctx.lineTo(10, 11);
        ctx.lineTo(0, 24);
        ctx.lineTo(-10, 11);
        ctx.lineTo(-27, 16);
        ctx.lineTo(-34, -3 - flap);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = bossHull;
        ctx.beginPath();
        ctx.moveTo(0, -24);
        ctx.bezierCurveTo(16, -11, 17, 13, 0, 23);
        ctx.bezierCurveTo(-17, 13, -16, -11, 0, -24);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#ffd166";
        ctx.fillRect(-15, -9, 30, 8);
        ctx.fillStyle = "#130715";
        ctx.fillRect(-9, -6, 18, 4);
        ctx.fillStyle = "#41e8ff";
        ctx.fillRect(-25, 10, 8, 5);
        ctx.fillRect(17, 10, 8, 5);
      } else if (enemy.type === "wasp") {
        const waspHull = ctx.createLinearGradient(0, -18, 0, 18);
        waspHull.addColorStop(0, "#fff4a8");
        waspHull.addColorStop(0.45, "#ffd166");
        waspHull.addColorStop(1, "#a85700");
        ctx.shadowColor = "rgba(255, 209, 102, 0.45)";
        ctx.shadowBlur = 10;
        ctx.fillStyle = "#7b3c00";
        ctx.beginPath();
        ctx.moveTo(0, -17);
        ctx.lineTo(25, -1 + flap);
        ctx.lineTo(16, 15);
        ctx.lineTo(5, 9);
        ctx.lineTo(0, 19);
        ctx.lineTo(-5, 9);
        ctx.lineTo(-16, 15);
        ctx.lineTo(-25, -1 - flap);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = waspHull;
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.bezierCurveTo(10, -8, 11, 9, 0, 18);
        ctx.bezierCurveTo(-11, 9, -10, -8, 0, -18);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#04111d";
        ctx.fillRect(-6, -8, 12, 8);
        ctx.fillStyle = "#ff4d6d";
        ctx.fillRect(-18, 8, 7, 4);
        ctx.fillRect(11, 8, 7, 4);
      } else {
        const scoutHull = ctx.createLinearGradient(0, -16, 0, 18);
        scoutHull.addColorStop(0, "#d7ffdf");
        scoutHull.addColorStop(0.4, "#6df58a");
        scoutHull.addColorStop(1, "#0f7c43");
        ctx.shadowColor = "rgba(109, 245, 138, 0.45)";
        ctx.shadowBlur = 9;
        ctx.fillStyle = "#0c5f3a";
        ctx.beginPath();
        ctx.moveTo(0, -17);
        ctx.lineTo(22, 5 + flap);
        ctx.lineTo(8, 16);
        ctx.lineTo(0, 11);
        ctx.lineTo(-8, 16);
        ctx.lineTo(-22, 5 - flap);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = scoutHull;
        ctx.beginPath();
        ctx.moveTo(0, -16);
        ctx.lineTo(10, 2);
        ctx.lineTo(0, 18);
        ctx.lineTo(-10, 2);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#07130f";
        ctx.fillRect(-5, -3, 10, 6);
        ctx.fillStyle = "#ffd166";
        ctx.fillRect(-13, 8, 5, 4);
        ctx.fillRect(8, 8, 5, 4);
      }
      ctx.restore();
    }

    function draw() {
      ctx.save();
      ctx.clearRect(0, 0, W, H);
      if (state && state.shake > 0) {
        ctx.translate(rand(-5, 5) * state.shake * 3, rand(-5, 5) * state.shake * 3);
      }

      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, "#020818");
      sky.addColorStop(0.6, "#07162c");
      sky.addColorStop(1, "#02050d");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      for (const star of starfield) {
        ctx.globalAlpha = 0.55 + star.size / 5;
        ctx.fillStyle = star.color;
        ctx.fillRect(star.x, star.y, star.size, star.size);
      }
      ctx.globalAlpha = 1;

      if (!state) state = freshState();
      for (const enemy of state.enemies) drawEnemy(enemy);

      ctx.fillStyle = "#41e8ff";
      for (const b of state.bullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(b.x - 1, b.y + 2, 2, 14);
      }

      ctx.fillStyle = "#ff4d6d";
      for (const b of state.enemyBullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const pickup of state.pickups) {
        ctx.save();
        ctx.translate(pickup.x, pickup.y);
        ctx.rotate(state.time * 4);
        if (pickup.kind === "twin") {
          ctx.shadowColor = "rgba(255, 77, 255, 0.65)";
          ctx.shadowBlur = 14;
          ctx.fillStyle = "#ff4dff";
          ctx.beginPath();
          ctx.moveTo(-13, -9);
          ctx.lineTo(-3, 0);
          ctx.lineTo(-13, 9);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#41e8ff";
          ctx.beginPath();
          ctx.moveTo(13, -9);
          ctx.lineTo(3, 0);
          ctx.lineTo(13, 9);
          ctx.closePath();
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(-2, -2, 4, 4);
        } else {
          ctx.fillStyle = "#41e8ff";
          ctx.fillRect(-10, -10, 20, 20);
          ctx.fillStyle = "#04111d";
          ctx.fillRect(-3, -9, 6, 18);
          ctx.fillRect(-9, -3, 18, 6);
        }
        ctx.restore();
      }

      if (state.player.twinTimer > 0) {
        drawShip(state.player.x - 24, state.player.y, state.player.invincible);
        drawShip(state.player.x + 24, state.player.y, state.player.invincible);
      } else {
        drawShip(state.player.x, state.player.y, state.player.invincible);
      }

      for (const particle of state.particles) {
        ctx.globalAlpha = Math.max(0, particle.life / particle.maxLife);
        ctx.fillStyle = particle.color;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.textAlign = "center";
      ctx.font = "700 18px Segoe UI, sans-serif";
      for (const text of state.texts) {
        ctx.globalAlpha = Math.max(0, text.life);
        ctx.fillStyle = text.color;
        ctx.fillText(text.text, text.x, text.y);
      }
      ctx.globalAlpha = 1;

      if (state.mode === "ready" || state.mode === "paused" || state.mode === "gameover") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.48)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.font = "800 48px Segoe UI, sans-serif";
        const headline = state.mode === "gameover" ? "GAME OVER" : state.mode === "paused" ? "PAUSED" : "VIBE GALAGA";
        ctx.fillText(headline, W / 2, H / 2 - 28);
        ctx.font = "600 18px Segoe UI, sans-serif";
        ctx.fillStyle = "#ffd166";
        ctx.fillText(isMobileLayout() ? "시작 버튼 또는 화면 터치로 출격" : "Space 또는 시작 버튼으로 출격", W / 2, H / 2 + 18);
        if (isMobileLayout()) {
          ctx.font = "600 15px Segoe UI, sans-serif";
          ctx.fillStyle = "rgba(233, 251, 255, 0.82)";
          ctx.fillText("좌우로 드래그 이동 · 총알 자동 발사", W / 2, H / 2 + 48);
        }
      }

      ctx.restore();
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - lastTime) / 1000 || 0);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (event) => {
      if (["ArrowLeft", "ArrowRight", "ArrowUp", " "].includes(event.key)) event.preventDefault();
      if (event.key === " " && (!state || state.mode === "ready" || state.mode === "gameover")) startGame();
      if (event.key === "p" || event.key === "P") togglePause();
      if (event.key === "r" || event.key === "R") startGame();
      keys.add(event.key);
    });

    window.addEventListener("keyup", (event) => keys.delete(event.key));
    difficultyButtons.forEach((button) => {
      button.addEventListener("click", () => setDifficulty(button.dataset.difficulty));
    });
    startBtn.addEventListener("click", startGame);
    pauseBtn.addEventListener("click", togglePause);
    musicBtn.addEventListener("click", toggleMusic);

    function updateDragTarget(event) {
      const rect = canvas.getBoundingClientRect();
      const ratio = W / rect.width;
      touch.targetX = clamp((event.clientX - rect.left) * ratio, 34, W - 34);
    }

    canvas.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      dragPointerId = event.pointerId;
      touch.dragging = true;
      updateDragTarget(event);
      canvas.setPointerCapture(event.pointerId);
      if (isMobileLayout() && (!state || state.mode === "ready" || state.mode === "gameover")) startGame();
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!touch.dragging || event.pointerId !== dragPointerId) return;
      event.preventDefault();
      updateDragTarget(event);
    });

    function endDrag(event) {
      if (event.pointerId !== dragPointerId) return;
      touch.dragging = false;
      dragPointerId = null;
    }

    canvas.addEventListener("pointerup", endDrag);
    canvas.addEventListener("pointercancel", endDrag);
    canvas.addEventListener("lostpointercapture", () => {
      touch.dragging = false;
      dragPointerId = null;
    });

    state = freshState();
    syncDifficultyButtons();
    syncMusicButton();
    updateHud();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
